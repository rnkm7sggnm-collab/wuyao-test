<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>多模型回答整理工作流</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #627083;
      --line: #d8dee8;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 32px auto;
    }

    header {
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field,
    .result {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }

    .field.full,
    .result {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 15px;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color: var(--text);
      background: #fbfcfe;
    }

    #goal,
    #preference {
      min-height: 110px;
    }

    #output {
      min-height: 280px;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 18px 0;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--accent-dark);
    }

    button.secondary {
      background: #334155;
    }

    button.secondary:hover {
      background: #1f2937;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 20px, 1120px);
        margin: 18px auto;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>多模型回答整理工作流</h1>
      <p class="hint">把多个 AI 的回答贴进来，生成一份统一的 Markdown 输入稿，之后交给 Codex 继续整理成最终文档。</p>
    </header>

    <section class="grid" aria-label="输入区">
      <div class="field full">
        <label for="goal">我的问题 / 任务目标</label>
        <textarea id="goal" placeholder="例如：帮我整理一个短视频系列策划，主题是未来城市里的普通人。"></textarea>
      </div>

      <div class="field">
        <label for="chatgpt">ChatGPT 回答</label>
        <textarea id="chatgpt" placeholder="粘贴 ChatGPT 的回答"></textarea>
      </div>

      <div class="field">
        <label for="gemini">Gemini 回答</label>
        <textarea id="gemini" placeholder="粘贴 Gemini 的回答"></textarea>
      </div>

      <div class="field">
        <label for="deepseek">DeepSeek 回答</label>
        <textarea id="deepseek" placeholder="粘贴 DeepSeek 的回答"></textarea>
      </div>

      <div class="field">
        <label for="other">其他 AI 回答，可选</label>
        <textarea id="other" placeholder="粘贴其他模型或工具的回答，可留空"></textarea>
      </div>

      <div class="field full">
        <label for="preference">我的偏好 / 创作方向</label>
        <textarea id="preference" placeholder="例如：偏实用、不要太理论化；适合长期创作；输出要能直接拿来改成脚本、Prompt、游戏设定或 App 方案。"></textarea>
      </div>
    </section>

    <div class="actions">
      <button id="generate">生成整理文本</button>
      <button id="copy" class="secondary">复制整理文本</button>
      <button id="download" class="secondary">下载 input.md</button>
    </div>
    <div class="status" id="status" role="status" aria-live="polite"></div>

    <section class="result">
      <label for="output">整理后的 Markdown</label>
      <textarea id="output" readonly placeholder="点击“生成整理文本”后，这里会显示 Markdown。"></textarea>
    </section>
  </main>

  <script>
    const fields = {
      goal: document.getElementById("goal"),
      chatgpt: document.getElementById("chatgpt"),
      gemini: document.getElementById("gemini"),
      deepseek: document.getElementById("deepseek"),
      other: document.getElementById("other"),
      preference: document.getElementById("preference"),
      output: document.getElementById("output"),
      status: document.getElementById("status")
    };

    function clean(value) {
      return value.trim() || "未填写";
    }

    function buildMarkdown() {
      const today = new Date().toLocaleDateString("zh-CN");
      return `# 多模型回答整理输入稿

生成日期：${today}

## 我的问题 / 任务目标

${clean(fields.goal.value)}

## 我的偏好 / 创作方向

${clean(fields.preference.value)}

## ChatGPT 回答

${clean(fields.chatgpt.value)}

## Gemini 回答

${clean(fields.gemini.value)}

## DeepSeek 回答

${clean(fields.deepseek.value)}

## 其他 AI 回答

${clean(fields.other.value)}

## 希望 Codex 完成的整理任务

请对以上不同 AI 的回答进行对比、去重、融合和重写：

- 总结每个回答的核心观点
- 对比各回答的优点和不足
- 去掉重复、空泛、冲突或不可执行的内容
- 保留最有创作价值、最可执行的部分
- 融合成一个新的最终版本
- 输出结构清晰、可直接使用的 Markdown
- 如有需要，生成 Word 文档并保存到 \`multi_model_workbench/output/\`
`;
    }

    function setStatus(message) {
      fields.status.textContent = message;
    }

    document.getElementById("generate").addEventListener("click", () => {
      fields.output.value = buildMarkdown();
      setStatus("已生成整理文本。");
    });

    document.getElementById("copy").addEventListener("click", async () => {
      if (!fields.output.value.trim()) {
        fields.output.value = buildMarkdown();
      }

      try {
        await navigator.clipboard.writeText(fields.output.value);
        setStatus("已复制整理文本。");
      } catch (error) {
        fields.output.select();
        document.execCommand("copy");
        setStatus("已尝试复制。如浏览器限制剪贴板，请手动复制。");
      }
    });

    document.getElementById("download").addEventListener("click", () => {
      if (!fields.output.value.trim()) {
        fields.output.value = buildMarkdown();
      }

      const blob = new Blob([fields.output.value], { type: "text/markdown;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "input.md";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
      setStatus("已下载 input.md。请把文件放到 multi_model_workbench/ 目录后交给 Codex 处理。");
    });
  </script>
</body>
</html>
