<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=prototype/wuyao_chapter1_v0_3.html">
  <title>《雾窑》试玩入口</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --text: #f1eee6;
      --muted: rgba(241,238,230,.55);
      --line: rgba(255,255,255,.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(520px, calc(100% - 40px));
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      letter-spacing: .18em;
      font-weight: 700;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.7;
    }

    a {
      display: inline-block;
      padding: 12px 22px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      text-decoration: none;
      background: rgba(255,255,255,.06);
    }

    a:hover {
      background: rgba(255,255,255,.12);
    }
  </style>
</head>
<body>
  <main>
    <h1>雾窑</h1>
    <p>正在进入《雾窑》第一章试玩原型。</p>
    <a href="prototype/wuyao_chapter1_v0_3.html">进入试玩</a>
  </main>
</body>
</html>
