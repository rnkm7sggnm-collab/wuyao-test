<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>《雾窑》v0.4 全剧情文本试玩版</title>
  <style>
    :root {
      --bg: #121313;
      --panel: #1d1f1f;
      --panel-2: #252827;
      --text: #f1eee6;
      --muted: #aaa399;
      --line: #3b3f3d;
      --accent: #d2a45f;
      --accent-2: #87b7a5;
      --danger: #c97062;
      --ok: #82b88b;
      --shadow: rgba(0, 0, 0, .35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
      padding-bottom: 104px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 22px;
      background: rgba(18, 19, 19, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: 20px; margin-bottom: 2px; }
    h2 { font-size: 24px; margin-bottom: 4px; }
    h3 { font-size: 15px; color: var(--accent); margin: 18px 0 8px; }
    ul { padding-left: 20px; }

    main {
      width: min(1380px, calc(100% - 32px));
      margin: 18px auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px 340px;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 32px var(--shadow);
      padding: 18px;
    }

    .scene-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }

    .tag {
      flex: 0 0 auto;
      padding: 4px 10px;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .small { color: var(--muted); font-size: 13px; }

    .header-stack {
      min-width: 0;
      flex: 1;
    }

    .header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid rgba(255,255,255,.08);
      margin-top: 6px;
      padding-top: 6px;
    }

    .header-meta button {
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--accent);
      font-size: inherit;
      text-align: left;
    }

    .header-progress-wrap {
      margin-top: 8px;
      padding-top: 2px;
    }

    .header-progress-track {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
      position: relative;
    }

    .header-progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(212,168,90,.72), rgba(235,197,116,.98));
      box-shadow: 0 0 10px rgba(212,168,90,.28);
      transition: width .55s ease;
    }

    .header-progress-label {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }

    .description,
    .dialogue,
    .feedback,
    .status-card,
    .ending-box,
    .deduction-box {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .asset-placeholder {
      position: relative;
      border: 1px dashed rgba(210, 164, 95, .45);
      background: rgba(210, 164, 95, .06);
      border-radius: 10px;
      padding: 12px 14px;
      margin: 14px 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .asset-placeholder::after {
      content: "开发占位";
      position: absolute;
      right: 12px;
      top: 10px;
      color: rgba(241,238,230,.36);
      font-size: 11px;
      letter-spacing: .08em;
    }

    .asset-placeholder strong {
      display: block;
      color: var(--accent);
      margin-bottom: 6px;
      padding-right: 76px;
    }

    .asset-placeholder p {
      margin: 3px 0;
    }

    .asset-file-list {
      display: grid;
      gap: 7px;
      margin-top: 7px;
    }

    .asset-file-item {
      border-top: 1px solid rgba(255,255,255,.08);
      padding-top: 7px;
    }

    .asset-placeholder code {
      color: var(--text);
      background: rgba(255,255,255,.06);
      border-radius: 4px;
      padding: 1px 4px;
    }

    .asset-media {
      border: 1px solid rgba(210, 164, 95, .26);
      background: rgba(255,255,255,.035);
      border-radius: 10px;
      padding: 12px;
      margin: 14px 0;
    }

    .asset-media strong {
      display: block;
      color: var(--accent);
      margin-bottom: 8px;
      font-size: 13px;
    }

    .asset-media img,
    .asset-media video {
      display: block;
      width: 100%;
      max-height: 360px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.1);
      background: #0b0c0c;
    }

    .asset-media audio {
      width: 100%;
      margin-top: 8px;
    }

    .dialogue p { margin: 0 0 10px; }
    .dialogue p:last-child { margin-bottom: 0; }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .clickable-card {
      min-width: 0;
      display: grid;
      grid-template-rows: 58px 1fr;
      min-height: 202px;
    }

    .clickable-card button {
      width: 100%;
      min-height: 58px;
      overflow: hidden;
    }

    .clickable-card.is-clicked button {
      opacity: .82;
      border-color: rgba(210, 164, 95, .58);
      background: #262a28;
    }

    .item-hint {
      margin-top: 7px;
      padding: 9px 10px;
      border: 1px solid rgba(135, 183, 165, .28);
      border-left: 3px solid var(--accent-2);
      border-radius: 7px;
      background: rgba(32, 35, 34, .86);
      min-height: 136px;
      max-height: 136px;
      overflow: auto;
    }

    .item-hint b {
      display: block;
      color: var(--accent);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .item-hint p {
      margin: 0 0 6px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.58;
    }

    .item-hint .hint-meta {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #303331;
      color: var(--text);
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    button:hover:not(:disabled) {
      border-color: var(--accent);
      background: #3a3c39;
    }

    button:disabled {
      opacity: .48;
      cursor: not-allowed;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #191511;
      font-weight: 700;
      text-align: center;
    }

    button.secondary { text-align: center; }
    button.choice { display: block; width: 100%; margin: 8px 0; }
    button.choice strong { display: block; margin-bottom: 4px; }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .feedback {
      margin-top: 14px;
      min-height: 54px;
      border-left: 3px solid var(--accent-2);
    }

    .next-row {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .side {
      position: sticky;
      top: 92px;
      align-self: start;
      max-height: calc(100vh - 120px);
      overflow: auto;
    }

    .progress {
      height: 9px;
      background: #333734;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--accent);
    }

    .evidence-group {
      border: 1px solid var(--line);
      border-radius: 8px;
      margin: 10px 0;
      overflow: hidden;
    }

    .evidence-group summary {
      padding: 9px 10px;
      cursor: pointer;
      color: var(--accent);
      font-weight: 700;
    }

    .evidence-item {
      padding: 8px 10px;
      border-top: 1px solid var(--line);
    }

    .evidence-item b { display: block; }
    .evidence-item p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

    .evidence-stats {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .evidence-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .evidence-filter {
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 999px;
      text-align: center;
    }

    .evidence-filter.is-active {
      border-color: var(--accent);
      color: #181511;
      background: var(--accent);
      font-weight: 700;
    }

    .evidence-pool {
      display: grid;
      gap: 8px;
    }

    .evidence-card {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      background: rgba(255,255,255,.035);
      padding: 9px 10px;
    }

    .evidence-card summary {
      cursor: pointer;
      list-style: none;
    }

    .evidence-card summary::-webkit-details-marker { display: none; }

    .evidence-type {
      display: inline-block;
      font-size: 11px;
      color: var(--muted);
      margin-right: 6px;
    }

    .evidence-name {
      font-weight: 700;
    }

    .evidence-brief,
    .evidence-detail {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .right-stack {
      position: sticky;
      top: 92px;
      align-self: start;
      display: grid;
      gap: 16px;
      max-height: calc(100vh - 120px);
      overflow: auto;
    }

    .deduction-panel,
    .record-panel {
      min-width: 0;
    }

    .deduction-panel {
      max-height: 42vh;
      overflow: auto;
    }

    .record-panel {
      max-height: 38vh;
      overflow: auto;
    }

    .deduction-stage {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .deduction-list {
      display: grid;
      gap: 10px;
    }

    .deduction-card {
      border-left: 2px solid rgba(210, 164, 95, .55);
      padding: 9px 0 9px 12px;
      color: #d8d0c3;
      font-size: 14px;
      line-height: 1.7;
    }

    .deduction-locked {
      margin-top: 12px;
      padding: 10px;
      border: 1px dashed rgba(255,255,255,.18);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .deduction-section {
      margin-top: 12px;
    }

    .deduction-section-title {
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      margin: 0 0 6px;
    }

    .deduction-section ul {
      margin: 0;
      padding-left: 18px;
      color: #d8d0c3;
      font-size: 13px;
      line-height: 1.65;
    }

    .deduction-toggle {
      width: 100%;
      margin-top: 12px;
      justify-content: center;
    }

    .combination-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .combination-button {
      width: 100%;
      text-align: left;
      border-color: rgba(210, 164, 95, .28);
      background: rgba(210, 164, 95, .08);
    }

    .combination-button.is-done {
      border-color: rgba(130, 184, 139, .34);
      background: rgba(130, 184, 139, .07);
    }

    .combination-button strong,
    .combination-button span {
      display: block;
    }

    .combination-result {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid rgba(255,255,255,.08);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.6;
    }

    .record-item {
      width: 100%;
      margin-bottom: 8px;
      padding: 8px 9px;
      border-radius: 8px;
      background: rgba(255,255,255,.035);
      font-size: 12px;
    }

    .record-item strong { display: block; color: var(--text); font-size: 12px; }

    .record-item span {
      display: block;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 2px;
    }

    .review-banner {
      border: 1px solid rgba(135, 183, 165, .32);
      border-left: 3px solid var(--accent-2);
      background: rgba(135, 183, 165, .08);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .review-banner button { padding: 7px 10px; }

    .log-list {
      max-height: 180px;
      overflow: auto;
    }

    .vars-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      background: rgba(18, 19, 19, .96);
      border-top: 1px solid var(--line);
      padding: 10px 14px;
      backdrop-filter: blur(10px);
    }

    .vars-grid {
      width: min(1200px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(8, minmax(88px, 1fr));
      gap: 8px;
    }

    .var-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 8px;
      min-width: 0;
      position: relative;
    }

    .var-card span { display: block; color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .var-card b { font-size: 20px; }

    .var-card:hover::after {
      content: attr(data-hint);
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      z-index: 20;
      width: 230px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #252827;
      color: var(--text);
      font-size: 12px;
      line-height: 1.5;
      box-shadow: 0 12px 24px var(--shadow);
      white-space: normal;
    }

    .intro-panel {
      min-height: 520px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      cursor: pointer;
    }

    .intro-kicker {
      color: var(--accent);
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .intro-text {
      font-size: 24px;
      line-height: 1.75;
      white-space: pre-line;
    }

    .intro-hint {
      margin-top: 28px;
      color: var(--muted);
      font-size: 13px;
    }

    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
    }

    .hub-card {
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .summary-list li { margin-bottom: 9px; }

    textarea {
      width: 100%;
      min-height: 210px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #171918;
      color: var(--text);
      padding: 12px;
      font: inherit;
      line-height: 1.6;
    }

    .version-footer { display: none; }

    .version-badge {
      position: fixed;
      right: 18px;
      bottom: 126px;
      z-index: 5;
      color: rgba(241,238,230,.32);
      font-size: 12px;
      letter-spacing: .08em;
      pointer-events: none;
      user-select: none;
    }

    .version-badge::before {
      content: "测试版本 ";
    }

    .start-screen {
      min-height: 100vh;
      background: #000;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .start-card {
      text-align: center;
      max-width: 520px;
    }

    .start-title {
      font-size: 46px;
      letter-spacing: .28em;
      margin-bottom: 18px;
    }

    .start-subtitle {
      color: var(--muted);
      margin-bottom: 34px;
    }

    .start-button {
      display: block;
      width: min(260px, 100%);
      margin: 10px auto 0;
      text-align: center;
      padding: 14px 28px;
      border-radius: 999px;
      border-color: rgba(255,255,255,.58);
      background: rgba(255,255,255,.06);
    }

    .start-button:hover {
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.82);
    }

    .start-continue-options {
      width: min(320px, 100%);
      margin: 14px auto 0;
      padding: 14px;
      border: 1px solid rgba(210, 164, 95, .28);
      border-radius: 16px;
      background: rgba(210, 164, 95, .06);
    }

    .start-continue-options[hidden] {
      display: none;
    }

    .start-continue-options .small {
      margin-bottom: 10px;
      color: rgba(241,238,230,.55);
    }

    .start-note {
      margin-top: 20px;
      color: rgba(241,238,230,.45);
      font-size: 13px;
    }

    body.is-start-screen {
      background: #000;
      padding-bottom: 0;
    }

    body.is-start-screen main {
      display: block;
      width: 100%;
      margin: 0;
    }

    body.is-start-screen #scenePanel {
      border: none;
      box-shadow: none;
      padding: 0;
      background: #000;
    }

    body.is-start-screen .evidence-side,
    body.is-start-screen .right-stack,
    body.is-start-screen header,
    body.is-start-screen .vars-bar,
    body.is-start-screen .version-footer,
    body.is-start-screen .version-badge {
      display: none;
    }

    body.is-start-screen .header-progress-wrap {
      display: none;
    }

    body.is-page-hidden header,
    body.is-page-hidden main,
    body.is-page-hidden .version-badge,
    body.is-page-hidden .vars-bar {
      opacity: 0;
    }

    body.is-page-revealing header,
    body.is-page-revealing main,
    body.is-page-revealing .version-badge,
    body.is-page-revealing .vars-bar {
      opacity: 1;
      transition: opacity .9s ease;
    }

    .particle-transition {
      position: fixed;
      inset: 0;
      z-index: 9990;
      pointer-events: none;
      background: rgba(0,0,0,0);
      opacity: 0;
      transition: opacity .25s ease;
    }

    .particle-transition.active {
      opacity: 1;
      background: #000;
    }

    #particleCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .esc-hint {
      position: fixed;
      top: 18px;
      right: 22px;
      z-index: 9999;
      color: rgba(255,255,255,.72);
      border: 1px solid rgba(255,255,255,.28);
      background: rgba(0,0,0,.38);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      letter-spacing: .12em;
      pointer-events: none;
      opacity: 0;
      transition: opacity .8s ease;
    }

    .esc-hint.show { opacity: 1; }
    .esc-hint.fade { opacity: 0; }

    body.is-cinematic {
      background: #050505;
    }

    body.is-cinematic main {
      display: block;
      width: min(980px, calc(100% - 28px));
    }

    body.is-cinematic .evidence-side,
    body.is-cinematic .right-stack,
    body.is-cinematic .thought-panel {
      display: none;
    }

    body.is-cinematic .vars-bar {
      opacity: .18;
      transform: translateY(70%);
      transition: .3s ease;
    }

    body.is-cinematic .version-badge {
      right: 18px;
      opacity: .18;
    }

    body.is-cinematic .vars-bar:hover {
      opacity: 1;
      transform: translateY(0);
    }

    .cinematic-page {
      min-height: calc(100vh - 120px);
      background: #050505;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 0;
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(0,0,0,.55);
    }

    .cinematic-inner {
      max-width: 820px;
      margin: 0 auto;
      padding: 56px 28px 44px;
    }

    .cinematic-kicker {
      color: rgba(255,255,255,.62);
      font-size: 13px;
      letter-spacing: .18em;
      margin-bottom: 18px;
    }

    .cinematic-title {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .cinematic-subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 34px;
    }

    .cinematic-story {
      font-size: 19px;
      line-height: 2;
      white-space: pre-line;
      color: #f4f0e8;
      margin-bottom: 28px;
    }

    .cinematic-dialogue {
      border-left: 2px solid rgba(255,255,255,.38);
      padding-left: 16px;
      color: #d8d0c3;
      font-size: 16px;
      line-height: 1.9;
      white-space: pre-line;
      margin: 24px 0;
    }

    .cinematic-options {
      margin-top: 32px;
      display: grid;
      gap: 12px;
    }

    .cinematic-option {
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 12px;
      padding: 16px 18px;
      color: #f1eee6;
    }

        ChenBoyuan: "unknown",
        ShenYuee: "unknown",
        LuJingchuan: "unknown"
      };
    }

    function initialHiddenState() {
      return {
        MotherKey: 0,
        ShenWillIntervene: false,
        LuIdentityProof: 0,
        VillageProfitProof: 0,
        LuInvitedLin: false,
        SecondChapterRoute: "",
        SecondChapterRouteReason: [],
        ZhouDeathTruth: 0,
        ChenReportTruth: 0,
        LuHuaiMinGuiltProof: 0,
        FinalTruthReady: false,
        EndingKey: "",
        VillageWitnessOpened: false,
        FinalChoice: ""
      };
    }

    function initialDeductionState() {
      return {
        stage: "",
        questions: [],
        conclusions: [],
        pending: [],
        solved: [],
        combinationResults: {},
        panelOpen: false
      };
    }

    function normalizeStateStats(targetState) {
      if (!targetState) return targetState;
      targetState.vars = { ...baseVars, ...(targetState.vars || {}) };
      Object.keys(VAR_LIMITS).forEach(key => {
        targetState.vars[key] = clampVarValue(key, targetState.vars[key]);
      });
      targetState.hidden = { ...initialHiddenState(), ...(targetState.hidden || {}) };
      Object.keys(HIDDEN_LIMITS).forEach(key => {
        targetState.hidden[key] = clampHiddenValue(key, targetState.hidden[key]);
      });
      return targetState;
    }

    function normalizeAllStats() {
      normalizeStateStats(state);
    }

    let hasStartedSession = false;
    let transitionTimer = null;
    let animationFrameId = null;
    let state = loadState() || createInitialState();

    function createInitialState() {
      return {
        version: 1,
        mode: "intro",
        introIndex: 0,
        sceneId: "CH1_ROAD",
        viewMode: "play",
        reviewSceneId: null,
        evidenceFilter: "default",
        reachedSceneIds: ["CH1_ROAD"],
        vars: { ...baseVars },
        clicked: {},
        selectedChoices: {},
        selectedByScene: {},
        latestFeedback: "从前情开始。v0.4 全剧情文本试玩版已开启。",
        evidence: [],
        log: [],
        logs: [],
        flags: {},
        visited: {},
        hidden: initialHiddenState(),
        deduction: initialDeductionState(),
        analytics: {},
        devMode: false,
        characterReads: initialCharacterReads(),
        visitCount: 0,
        route: null,
        ended: false
      };
    }

    function initialState() {
      return createInitialState();
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || parsed.version !== 1) return null;
        parsed.hidden = { ...initialHiddenState(), ...(parsed.hidden || {}) };
        if (!Array.isArray(parsed.hidden.SecondChapterRouteReason)) parsed.hidden.SecondChapterRouteReason = [];
        parsed.deduction = { ...initialDeductionState(), ...(parsed.deduction || {}) };
        parsed.deduction.combinationResults = parsed.deduction.combinationResults || {};
        parsed.deduction.solved = Array.isArray(parsed.deduction.solved) ? parsed.deduction.solved : [];
        parsed.characterReads = { ...initialCharacterReads(), ...(parsed.characterReads || {}) };
        parsed.analytics = parsed.analytics || {};
        parsed.devMode = localStorage.getItem(DEV_UNLOCK_KEY) === "1" || Boolean(parsed.devMode);
        parsed.selectedChoices = parsed.selectedChoices || {};
        parsed.log = Array.isArray(parsed.log) ? parsed.log : [];
        parsed.visited = parsed.visited || {};
        parsed.viewMode = "play";
        parsed.reviewSceneId = null;
        parsed.evidenceFilter = parsed.evidenceFilter || "default";
        parsed.reachedSceneIds = Array.isArray(parsed.reachedSceneIds) ? parsed.reachedSceneIds : inferReachedScenes(parsed);
        parsed.logs = Array.isArray(parsed.logs) ? parsed.logs : [];
        return normalizeStateStats(parsed);
      } catch {
        return null;
      }
    }

    function saveState() {
      normalizeAllStats();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function clearSave() {
      if (!window.confirm("确定要清空当前进度并回到首页重新开始吗？手动存档不会被删除。")) return;
      localStorage.removeItem(STORAGE_KEY);
      state = createInitialState();
      state.log = ["新档开始。"];
      hasStartedSession = false;
      closeDirectoryModal();
      closeSaveModal();
      trackEvent("clear_autosave", {
        version: VERSION_LABEL
      });
      render();
      scrollToTop();
    }

    function currentScene() {
      return sceneById[activeSceneId()] || sceneById[state.sceneId];
    }

    function activeSceneId() {
      return state.viewMode === "review" && state.reviewSceneId ? state.reviewSceneId : state.sceneId;
    }

    function playScene() {
      return sceneById[state.sceneId];
    }

    function sceneLabel(sceneId = state.sceneId) {
      if (sceneId === "CH1_HUB_FREE_EXPLORE") return { no: "1-3", title: "晚饭后的青瓷庄" };
      const scene = sceneById[sceneId] || {};
      return { no: scene.no || "", title: scene.title || "未知节点" };
    }

    function getChapterNo(sceneOrId = state.sceneId) {
      const scene = typeof sceneOrId === "string" ? sceneById[sceneOrId] : sceneOrId;
      if (scene && scene.chapter) return scene.chapter;
      const id = typeof sceneOrId === "string" ? sceneOrId : scene?.id || "";
      const match = id.match(/^CH(\d+)/);
      return match ? Number(match[1]) : 1;
    }

    function chapterTitle(chapterNo = getChapterNo()) {
      const titles = {
        1: "入村与五人初见",
        2: "周启明之死",
        3: "陈伯远与旧报告",
        4: "祠堂夜审与陆怀民死亡",
        5: "废窑、孩子、村庄获利链",
        6: "旧火真相与终局拷问"
      };
      return titles[chapterNo] || "青瓷庄调查";
    }

    function secondChapterRouteScene(route = state.hidden?.SecondChapterRoute || "") {
      const map = {
        "沈月娥误导线": "CH2_ROUTE_SHEN",
        "陆景川带路线": "CH2_ROUTE_LU",
        "旧账灭口线": "CH2_ROUTE_ACCOUNTS",
        "迷失线": "CH2_ROUTE_LOST"
      };
      return map[route] || "CH2_ROUTE_LOST";
    }

    function addLog(entry) {
      const label = sceneLabel(state.sceneId);
      const item = typeof entry === "string"
        ? {
            id: `log_${Date.now()}_${Math.random().toString(16).slice(2)}`,
            sceneId: state.sceneId,
            sceneTitle: label.title,
            sceneNo: label.no,
            message: entry,
            createdAt: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }),
            type: "note"
          }
        : {
            id: entry.id || `log_${Date.now()}_${Math.random().toString(16).slice(2)}`,
            sceneId: entry.sceneId || state.sceneId,
            sceneTitle: entry.sceneTitle || label.title,
            sceneNo: entry.sceneNo || label.no,
            message: entry.message || "",
            createdAt: entry.createdAt || new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }),
            type: entry.type || "note"
          };
      state.logs.unshift(item);
      state.logs = state.logs.slice(0, 18);
    }

    function normalizeLog(log, index = 0) {
      if (typeof log === "string") {
        return { id: `legacy_${index}`, sceneId: null, sceneTitle: "", sceneNo: "", message: log, createdAt: "", type: "legacy" };
      }
      return log;
    }

    function inferReachedScenes(saved) {
      const reached = new Set(["CH1_ROAD"]);
      if (saved.mode === "game" || saved.ended || saved.sceneId !== "CH1_ROAD") reached.add("CH1_HALL");
      if (saved.sceneId) reached.add(saved.sceneId);
      Object.keys(saved.selectedByScene || {}).forEach(id => reached.add(id));
      people.forEach(person => {
        if (saved.flags?.[person.key]) reached.add(person.sceneId);
      });
      if (saved.visitCount >= MAX_VISITS || ["CH1_HUB_FREE_EXPLORE", "CH1_RETURN_HALL", "CH1_ROOM_REFLECT", "CH1_BLACKOUT"].includes(saved.sceneId) || saved.ended) {
        reached.add("CH1_HUB_FREE_EXPLORE");
      }
      if (["CH1_RETURN_HALL", "CH1_ROOM_REFLECT", "CH1_BLACKOUT"].includes(saved.sceneId) || saved.ended) reached.add("CH1_RETURN_HALL");
      if (["CH1_ROOM_REFLECT", "CH1_BLACKOUT"].includes(saved.sceneId) || saved.ended) reached.add("CH1_ROOM_REFLECT");
      if (saved.sceneId === "CH1_BLACKOUT" || saved.ended) reached.add("CH1_BLACKOUT");
      return [...reached];
    }

    function markSceneReached(sceneId) {
      if (!sceneId) return;
      if (!Array.isArray(state.reachedSceneIds)) state.reachedSceneIds = [];
      if (!state.reachedSceneIds.includes(sceneId)) state.reachedSceneIds.push(sceneId);
      trackChapterEnterForScene(sceneId);
    }

    function trackChapterEnterForScene(sceneId) {
      if (!sceneId || state.viewMode === "review") return;
      state.analytics = state.analytics || {};
      state.analytics.chaptersSent = state.analytics.chaptersSent || {};
      const chapterNo = getChapterNo(sceneId);
      const key = String(chapterNo);
      if (!chapterNo || state.analytics.chaptersSent[key]) return;
      trackEvent("chapter_enter", {
        chapter: chapterNo,
        chapter_title: chapterTitle(chapterNo),
        scene_id: sceneId
      });
      state.analytics.chaptersSent[key] = true;
    }

    function isSceneReached(sceneId) {
      return state.sceneId === sceneId || (state.reachedSceneIds || []).includes(sceneId);
    }

    function scrollToTop() {
      try {
        window.scrollTo({ top: 0, behavior: "smooth" });
      } catch {
        window.scrollTo(0, 0);
      }
    }

    function moveToScene(sceneId, feedback = "进入下一场景。", logMessage = "") {
      state.mode = "game";
      state.ended = false;
      state.viewMode = "play";
      state.reviewSceneId = null;
      state.sceneId = sceneId;
      markSceneReached(sceneId);
      state.latestFeedback = feedback;
      if (logMessage) {
        const label = sceneLabel(sceneId);
        addLog({ message: logMessage, sceneId, sceneTitle: label.title, sceneNo: label.no, type: "move" });
      }
      render();
      scrollToTop();
    }

    function transitionToScene(sceneId, feedback = "进入下一场景。", logMessage = "进入下一场景") {
      if (!sceneId) return;
      showEscHint();
      startWhiteParticleTransition(() => {
        moveToScene(sceneId, feedback, logMessage);
        fadeEscHint(2400);
      });
    }

    function addEvidence(item) {
      if (!item) return "";
      if (!state.evidence.some(existing => existing.id === item.id)) {
        state.evidence.push(item);
        return `${evidenceTypes[item.type] || "线索"}已加入证据池`;
      }
      return "";
    }

    function collectEvidence(source = {}) {
      const items = [];
      if (source.evidence) items.push(source.evidence);
      if (Array.isArray(source.evidenceList)) items.push(...source.evidenceList);
      return items.map(addEvidence).filter(Boolean).join("；");
    }

    function sourceHasCoreEvidence(source = {}) {
      const items = [];
      if (source.evidence) items.push(source.evidence);
      if (Array.isArray(source.evidenceList)) items.push(...source.evidenceList);
      return items.some(item => item && item.type === "core");
    }

    function filteredClickableEffects(source = {}) {
      const effects = { ...(source.effects || {}) };
      if (effects.EvidenceScore !== undefined && !sourceHasCoreEvidence(source)) {
        delete effects.EvidenceScore;
      }
      return effects;
    }

    function filteredClickableHiddenEffects(source = {}) {
      const hiddenEffects = { ...(source.hiddenEffects || {}) };
      if (!sourceHasCoreEvidence(source)) {
        Object.keys(hiddenEffects).forEach(key => {
          if (typeof hiddenEffects[key] === "number") delete hiddenEffects[key];
        });
      }
      return hiddenEffects;
    }

    function applyEffects(effects = {}) {
      const changes = [];
      Object.keys(effects).forEach(key => {
        const value = effects[key];
        const before = Number(state.vars[key]) || 0;
        const after = clampVarValue(key, before + value);
        state.vars[key] = after;
        const delta = after - before;
        if (delta !== 0) {
          changes.push(`${variableNames[key] || key} ${delta > 0 ? "+" : ""}${delta}`);
        } else if (value !== 0) {
          changes.push(`${variableNames[key] || key} 已达上限`);
        }
      });
      return changes;
    }

    function formatEffects(effects = {}) {
      const keys = Object.keys(effects);
      if (!keys.length) return "无";
      return keys.map(key => `${variableNames[key] || key}${effects[key] > 0 ? "+" : ""}${effects[key]}`).join("；");
    }

    function applyHiddenEffects(hiddenEffects = {}) {
      const changes = [];
      if (!hiddenEffects) return changes;
      state.hidden = { ...initialHiddenState(), ...(state.hidden || {}) };
      Object.entries(hiddenEffects).forEach(([key, value]) => {
        if (typeof value === "number") {
          const before = Number(state.hidden[key]) || 0;
          const after = clampHiddenValue(key, before + value);
          state.hidden[key] = after;
          const delta = after - before;
          if (delta !== 0) {
            changes.push(`${hiddenNames[key] || key} ${delta > 0 ? "+" : ""}${delta}`);
          } else if (value !== 0) {
            changes.push(`${hiddenNames[key] || key} 已达上限`);
          }
        } else if (Array.isArray(value)) {
          state.hidden[key] = value;
          changes.push(`${hiddenNames[key] || key} 已更新`);
        } else {
          state.hidden[key] = value;
          changes.push(`${hiddenNames[key] || key} = ${String(value)}`);
        }
      });
      normalizeAllStats();
      return changes;
    }

    function computeSecondChapterRoute(preferredRoute = "") {
      state.hidden = { ...initialHiddenState(), ...(state.hidden || {}) };
      const reasons = [];
      let route = "";

      const routeMap = {
        "陆景川带路": "陆景川带路线",
        "堂屋聚集": "迷失线",
        "陈伯远警告": "旧账灭口线",
        "独自调查": "旧账灭口线",
        "沈月娥误导线": "沈月娥误导线",
        "旧账灭口线": "旧账灭口线",
        "迷失线": "迷失线"
      };

      if (preferredRoute && routeMap[preferredRoute]) {
        route = routeMap[preferredRoute];
        reasons.push(`第一章结尾选择倾向：${preferredRoute}`);
      }
      if (state.vars.ShenSuspicion >= 3) {
        route = "沈月娥误导线";
        reasons.push("沈月娥公共嫌疑值偏高，她正在变成最方便的答案。");
      } else if ((state.vars.LuTrust >= 2 || state.flags.acceptedLuGuidance || state.flags.acceptedLuRoadHelp) && !route) {
        route = "陆景川带路线";
        reasons.push("你多次接受陆景川引导，第二章会更容易跟随他的现场解释。");
      } else if ((state.vars.EvidenceScore >= 3 && (state.flags.zhouDefensiveAboutAccounts || state.flags.zhouContactsOldLu)) || state.hidden.VillageProfitProof > 0) {
        route = "旧账灭口线";
        reasons.push("你注意到周启明的合同、缺页或旧账压力。");
      }
      if ((state.evidence || []).filter(item => item.type === "core" || item.type === "clue").length < 3 && !route) {
        route = "迷失线";
        reasons.push("关键证据不足，第二章会以混乱现场和众人证词为主。");
      }
      if (!route) {
        route = "迷失线";
        reasons.push("第一章只形成异常感，暂未形成明确调查方向。");
      }

      if (route === "旧账灭口线" && !reasons.some(text => text.includes("周启明"))) {
        reasons.push("周启明的死，可能不像复仇，更像灭口。");
      }
      if (route === "沈月娥误导线") reasons.push("现场和村庄口径会把注意力推向沈月娥。");
      if (route === "陆景川带路线") reasons.push("陆景川会更主动带你进入现场，但解释权也会更集中。");

      state.hidden.SecondChapterRoute = route;
      state.hidden.SecondChapterRouteReason = [...new Set(reasons)].slice(0, 5);

      state.analytics = state.analytics || {};
      if (!state.analytics.secondChapterRoutePreviewSent) {
        trackEvent("second_chapter_route_preview", {
          route: state.hidden.SecondChapterRoute,
          reasons: state.hidden.SecondChapterRouteReason.join(" | ")
        });
        state.analytics.secondChapterRoutePreviewSent = true;
      }

      return route;
    }

    function updateBodyMode() {
      const scene = currentScene();
      syncDevMode();
      const isStart = !hasStartedSession;
      const isCinematic = hasStartedSession && scene && state.mode !== "intro" && (scene.cinematic || scene.personKey);
      document.body.classList.toggle("is-start-screen", isStart);
      document.body.classList.toggle("is-cinematic", Boolean(isCinematic));
      document.body.classList.toggle("dev-unlocked", isDevUnlocked());
    }

    function isDevUnlocked() {
      return Boolean(state.devMode) || localStorage.getItem(DEV_UNLOCK_KEY) === "1";
    }

    function syncDevMode() {
      if (localStorage.getItem(DEV_UNLOCK_KEY) === "1") state.devMode = true;
    }

    function render() {
      updateBodyMode();
      if (!hasStartedSession) {
        renderStartScreen();
        return;
      }

      markSceneReached(state.sceneId);
      renderHeaderMeta();

      if (state.viewMode !== "review" && state.mode === "intro") renderIntro();
      else if (state.viewMode !== "review" && state.ended) renderEnding();
      else if (activeSceneId() === "CH1_HUB_FREE_EXPLORE") renderHub();
      else {
        const scene = currentScene();
        if (scene && (scene.cinematic || scene.personKey)) renderCinematicScene(scene);
        else renderScene();
      }

      bindReviewControls();
      renderEvidencePool();
      renderThoughtPanel();
      renderRecordRail();
      renderVars();
      saveState();
    }

    function renderStartScreen() {
      const hasAutoSave = Boolean(localStorage.getItem(STORAGE_KEY));
      const hasManualSave = getSaveSlots().some(slot => slot && slot.state);
      document.getElementById("scenePanel").innerHTML = `
        <div class="start-screen">
          <div class="start-card">
            <div class="start-title">雾窑</div>
            <div class="start-subtitle">v0.4 全剧情文本试玩版</div>
            ${hasAutoSave || hasManualSave ? `
              <button class="start-button" id="continueGameBtn">继续游戏</button>
              <div class="start-continue-options" id="continueOptions" hidden>
                <div class="small">${hasAutoSave ? "选择继续当前自动进度，或读取一个手动存档槽。" : "当前没有自动进度，可以读取一个手动存档槽。"}</div>
                ${hasAutoSave ? `<button class="start-button" id="continueAutoBtn">继续当前进度</button>` : ""}
                ${hasManualSave ? `<button class="start-button" id="loadSaveFromHomeBtn">读取手动存档</button>` : `<button class="start-button" disabled>暂无手动存档</button>`}
              </div>
              <button class="start-button" id="${hasAutoSave ? "restartGameBtn" : "startGameBtn"}">${hasAutoSave ? "重新开始" : "进入雾窑"}</button>
            ` : `
              <button class="start-button" id="startGameBtn">进入雾窑</button>
            `}
            <div class="start-note">建议使用 Chrome / Edge / Safari。按 ESC 可退出全屏。</div>
          </div>
        </div>
      `;
      const startBtn = document.getElementById("startGameBtn");
      const continueBtn = document.getElementById("continueGameBtn");
      const continueAutoBtn = document.getElementById("continueAutoBtn");
      const loadSaveFromHomeBtn = document.getElementById("loadSaveFromHomeBtn");
      const restartBtn = document.getElementById("restartGameBtn");
      if (startBtn) startBtn.addEventListener("click", startNewGameFromHome);
      if (continueBtn) continueBtn.addEventListener("click", showStartContinueOptions);
      if (continueAutoBtn) continueAutoBtn.addEventListener("click", continueGameFromHome);
      if (loadSaveFromHomeBtn) loadSaveFromHomeBtn.addEventListener("click", openSaveModalFromHome);
      if (restartBtn) restartBtn.addEventListener("click", restartGameFromHome);
    }

    function showStartContinueOptions() {
      const options = document.getElementById("continueOptions");
      if (!options) return;
      options.hidden = !options.hidden;
    }

    function openSaveModalFromHome() {
      renderSaveSlots();
      document.body.classList.add("modal-open");
      const backdrop = document.getElementById("saveModalBackdrop");
      backdrop.classList.add("show");
      backdrop.setAttribute("aria-hidden", "false");
    }

    function goHomeScreen() {
      hasStartedSession = false;
      document.body.classList.add("is-start-screen");
      document.body.classList.remove("is-cinematic");
      document.body.classList.remove("is-page-hidden", "is-page-revealing");
      if (typeof closeDirectoryModal === "function") closeDirectoryModal();
      if (typeof closeSaveModal === "function") closeSaveModal();
      trackEvent("home_screen_open", {
        version: VERSION_LABEL
      });
      renderStartScreen();
      scrollToTop();
    }

    function startNewGameFromHome() {
      state = createInitialState();
      state.log = ["新档开始。"];
      trackEvent("new_game_start", {
        version: VERSION_LABEL
      });
      startGameSession("new_game");
    }

    function continueGameFromHome() {
      state = loadState() || state || createInitialState();
      startGameSession("continue_game");
    }

    function restartGameFromHome() {
      if (!window.confirm("确定要清空当前进度并重新开始吗？手动存档不会被删除。")) return;
      localStorage.removeItem(STORAGE_KEY);
      state = createInitialState();
      state.log = ["新档开始。"];
      trackEvent("new_game_start", {
        version: VERSION_LABEL
      });
      startGameSession("restart_game");
    }

    async function enterImmersiveStart() {
      startGameSession("start_screen");
    }

    function startGameSession(entry = "start_screen") {
      hasStartedSession = true;
      updateBodyMode();
      trackEvent("game_open", {
        entry
      });
      requestGameFullscreen();

      showEscHint();
      startWhiteParticleTransition(() => {
        render();
        scrollToTop();
        fadeEscHint(2600);
      });
    }

    function requestGameFullscreen() {
      try {
        const el = document.documentElement;
        if (document.fullscreenElement || document.webkitFullscreenElement) {
          updateFullscreenButton();
          return;
        }

        let request = null;
        if (el.requestFullscreen) {
          request = el.requestFullscreen();
        } else if (el.webkitRequestFullscreen) {
          request = el.webkitRequestFullscreen();
        }
        if (request && typeof request.catch === "function") request.catch(error => console.warn("Fullscreen request failed:", error));

        showEscHint();
        trackEvent("fullscreen_requested", {
          version: VERSION_LABEL
        });
      } catch (error) {
        console.warn("Fullscreen request failed:", error);
      } finally {
        updateFullscreenButton();
      }
    }

    function updateFullscreenButton() {
      const btn = document.getElementById("fullscreenBtn");
      if (!btn) return;
      const isFull = document.fullscreenElement || document.webkitFullscreenElement;
      btn.textContent = isFull ? "已全屏" : "全屏";
    }

    function showEscHint() {
      const el = document.getElementById("escHint");
      if (!el) return;
      el.classList.add("show");
      el.classList.remove("fade");
    }

    function fadeEscHint(delay = 1600) {
      const el = document.getElementById("escHint");
      if (!el) return;
      window.setTimeout(() => {
        el.classList.add("fade");
        el.classList.remove("show");
      }, delay);
    }

    function handleFullscreenChange() {
      const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
      updateFullscreenButton();
      if (!isFullscreen) {
        const el = document.getElementById("escHint");
        if (el) {

    function startWhiteParticleTransition(callback) {
      const layer = document.getElementById("particleTransition");
      const canvas = document.getElementById("particleCanvas");
      if (!layer || !canvas || !canvas.getContext) {
        callback();
        return;
      }

      if (transitionTimer) clearTimeout(transitionTimer);
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      document.body.classList.add("is-page-hidden");
      document.body.classList.remove("is-page-revealing");

      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const width = window.innerWidth;
      const height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const duration = 2700;
      const switchAt = 1250;
      const isMobile = width < 768;
      const count = isMobile
        ? 180 + Math.floor(Math.random() * 80)
        : 420 + Math.floor(Math.random() * 140);
      const centerX = width * .5;
      const centerY = height * .52;
      const particles = Array.from({ length: count }, () => {
        const angle = Math.random() * Math.PI * 2;
        const radius = 20 + Math.random() * 110;
        const speed = .12 + Math.random() * .38;
        let x = centerX + (Math.random() - .5) * width * .42;
        let y = centerY + (Math.random() - .5) * height * .42;
        if (Math.random() < .25) {
          x = Math.random() * width;
          y = Math.random() * height;
        }
        return {
          x: x + Math.cos(angle) * radius * .12,
          y: y + Math.sin(angle) * radius * .08,
          vx: Math.cos(angle) * speed + (Math.random() - .5) * .08,
          vy: Math.sin(angle) * speed * .32 - Math.random() * .08,
          size: .9 + Math.random() * 2.2,
          alpha: .32 + Math.random() * .48,
          life: 0,
          maxLife: duration * (.72 + Math.random() * .28)
        };
      });

      let callbackCalled = false;
      const startedAt = performance.now();
      layer.classList.add("active");

      function frame(now) {
        const elapsed = now - startedAt;
        ctx.clearRect(0, 0, width, height);
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        particles.forEach(particle => {
          particle.life += 16;
          particle.x += particle.vx;
          particle.y += particle.vy;
          particle.vx += (Math.random() - .5) * .004;
          particle.vy += (Math.random() - .5) * .004;
          particle.vx *= .995;
          particle.vy += .003;
          const progress = Math.min(1, particle.life / particle.maxLife);
          const alpha = particle.alpha * (1 - progress);
          if (alpha <= 0) return;
          ctx.beginPath();
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.shadowColor = "rgba(255,255,255,.45)";
          ctx.shadowBlur = 8;
          ctx.arc(particle.x, particle.y, particle.size * (1 - progress * .35), 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.restore();

        if (!callbackCalled && elapsed >= switchAt) {
          callbackCalled = true;
          callback();
          requestAnimationFrame(() => {
            document.body.classList.add("is-page-revealing");
            document.body.classList.remove("is-page-hidden");
          });
        }

        if (elapsed < duration) {
          animationFrameId = requestAnimationFrame(frame);
        } else {
          if (!callbackCalled) {
            callback();
            requestAnimationFrame(() => {
              document.body.classList.add("is-page-revealing");
              document.body.classList.remove("is-page-hidden");
            });
          }
          layer.classList.remove("active");
          transitionTimer = window.setTimeout(() => {
            ctx.clearRect(0, 0, width, height);
            document.body.classList.remove("is-page-revealing");
          }, 900);
        }
      }

      animationFrameId = requestAnimationFrame(frame);
    }

    function getProgressInfo() {
      const linearIds = [
        "CH1_ROAD",
        "CH1_HALL",
        "CH1_HUB_FREE_EXPLORE",
        ...scenes
          .filter(scene => !scene.personKey && !["CH1_ROAD", "CH1_HALL"].includes(scene.id))
          .map(scene => scene.id)
      ];
      const total = linearIds.length + 2;
      const current = state.mode === "intro"
        ? Math.max(1, state.introIndex + 1)
        : state.ended
          ? total
          : Math.max(2, linearIds.indexOf(state.sceneId) + 2);
      return { current, total, ratio: current / total };
    }

      document.getElementById("scenePanel").innerHTML = `
        ${review ? renderReviewBanner() : ""}

    function renderCinematicResult(scene, choice) {
      const evidenceNames = [];
      if (choice.evidence) evidenceNames.push(choice.evidence.name);
      if (Array.isArray(choice.evidenceList)) evidenceNames.push(...choice.evidenceList.map(item => item.name));
      return `
        <div class="cinematic-result">
          <div class="cinematic-player-line">林知夏：“${choice.text}”</div>
          <div class="cinematic-npc-reaction">${choice.npcReaction || "对方没有立刻回答。"}</div>
          ${choice.readLevel ? `<div class="read-level-badge">人物理解：${readLabels[choice.readLevel]}</div>` : ""}
          ${renderAssetCue(choice.assetCue)}
          <p class="small">变量变化：${formatEffects(choice.effects || {})}</p>
          <p class="small">获得：${evidenceNames.length ? evidenceNames.join("、") : "无新增线索"}</p>
          ${scene.readKey ? `<p class="small">林知夏判断：${getUnderstanding(scene.readKey)}</p>` : ""}
        </div>
      `;
    }

    function renderObservationGrid(scene, readOnly = false) {
      if (!scene.clickables || !scene.clickables.length) return `<p class="small">暂无可观察细节。</p>`;
      return `<div class="button-grid">${scene.clickables.map(item => renderClickableCard(item, readOnly)).join("")}</div>`;
    }

    function handleCinematicChoice(index) {
      if (state.viewMode === "review") return;
      const scene = currentScene();
      const choice = scene.choices[index];
      if (!choice || state.selectedByScene[scene.id] !== undefined) return;

      state.selectedByScene[scene.id] = index;
      const changes = applyEffects(choice.effects);
      const hiddenChanges = applyHiddenEffects(choice.hiddenEffects);
      const evidenceLine = collectEvidence(choice);
      playAssetCue(choice.assetCue);
      if (choice.flag) state.flags[choice.flag] = true;
      if (scene.readKey && choice.readLevel) state.characterReads[scene.readKey] = choice.readLevel;

      state.latestFeedback = [
        `<strong>${choice.label}. ${choice.text}</strong>`,
        choice.npcReaction ? `NPC反应：${choice.npcReaction}` : "",
        changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无",
        hiddenChanges.length ? `隐藏伏笔：${hiddenChanges.join("；")}` : "",
        evidenceLine ? `记录：${evidenceLine}` : "记录：无新增线索",
        scene.readKey && choice.readLevel ? `人物理解层级：${readLabels[choice.readLevel]}` : "",
        scene.personKey ? `人物理解：${getUnderstanding(scene.personKey)}` : ""
      ].filter(Boolean).join("<br>");
      addLog({ message: `对话：${scene.personName} / ${choice.label}`, type: "choice" });
      render();
      scrollToTop();
    }

    function returnFromCinematicScene() {
      if (state.viewMode === "review") return;
      const scene = currentScene();
      if (scene.personKey && !state.flags[scene.personKey]) {
        state.flags[scene.personKey] = true;
        state.visitCount += 1;
      }
      addLog({ message: `回到自由行动：已接触${scene.personName}`, type: "move" });
      transitionToScene("CH1_HUB_FREE_EXPLORE", "回到晚饭后的自由行动。已拜访人物不能重复拜访。", `回到自由行动：已接触${scene.personName}`);
    }

    function enterCharacterScene(sceneId) {
      if (state.viewMode === "review") return;
      const scene = sceneById[sceneId];
      trackEvent("character_branch_enter", {
        character: scene?.personName || sceneId,
        scene_id: sceneId
      });

      startWhiteParticleTransition(() => {
        state.sceneId = sceneId;

        scrollToTop();
        fadeEscHint(2400);
      });

    function handleClickable(id) {
      if (state.viewMode === "review") return;
      const scene = currentScene();
      const item = (scene.clickables || []).find(entry => entry.id === id);
      if (!item || state.clicked[id]) return;
      state.clicked[id] = true;
      const changes = applyEffects(filteredClickableEffects(item));
      const hiddenChanges = applyHiddenEffects(filteredClickableHiddenEffects(item));
      const evidenceLine = collectEvidence(item);
      playAssetCue(item.assetCue);
      state.latestFeedback = [
        `<strong>已观察：${item.label}</strong>`,
        "观察内容已显示在对应物件下方。",
        changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无",
        hiddenChanges.length ? `隐藏伏笔：${hiddenChanges.join("；")}` : "",
        evidenceLine ? `记录：${evidenceLine}` : "记录：已记录或无新增线索"
      ].filter(Boolean).join("<br>");
      addLog({ message: `观察了：${item.label}`, type: "observe" });
      render();
    }

    function handleChoice(index) {
      if (state.viewMode === "review") return;
      const scene = currentScene();
      const choice = scene.choices[index];
      if (!choice || state.selectedByScene[scene.id] !== undefined) return;

      if (choice.immediateNext) {
        state.selectedByScene[scene.id] = index;
        state.latestFeedback = `晚饭后前往：${choice.text.replace(/^.*去/, "去")}`;
        addLog({ message: `前往人物探索：${choice.text}`, type: "move" });
        if (sceneById[choice.immediateNext]?.personKey) {
          enterCharacterScene(choice.immediateNext);
        } else {
          transitionToScene(choice.immediateNext, "进入下一场景。", `前往：${sceneLabel(choice.immediateNext).title}`);
        }
        return;
      }

      state.selectedByScene[scene.id] = index;
      const changes = applyEffects(choice.effects);
      const hiddenChanges = applyHiddenEffects(choice.hiddenEffects);
      const evidenceLine = collectEvidence(choice);
      playAssetCue(choice.assetCue);
      if (choice.flag) state.flags[choice.flag] = true;
      if (scene.readKey && choice.readLevel) {
        state.characterReads[scene.readKey] = choice.readLevel;
      }
      if (choice.understanding) {
        state.flags[`${scene.personKey}Understanding`] = choice.understanding;
      }
      if (scene.personKey && !state.flags[scene.personKey]) {
        state.flags[scene.personKey] = true;
        state.visitCount += 1;
      }
      if (choice.route) {
        const routeName = computeSecondChapterRoute(choice.route);
        state.route = { name: choice.route, desc: choice.routeDesc };
        state.latestFeedback = [
          `<strong>${choice.label}. ${choice.text}</strong>`,
          changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无",
          hiddenChanges.length ? `隐藏伏笔：${hiddenChanges.join("；")}` : "",
          evidenceLine ? `记录：${evidenceLine}` : "记录：无新增线索",
          `第一章路线：${routeName}`
        ].filter(Boolean).join("<br>");
        addLog({ message: `第一章结束，进入第二章：${routeName}`, type: "move" });
        transitionToScene(secondChapterRouteScene(routeName), "第二章开始。第一章的判断会影响你进入现场的角度。", `进入第二章：${routeName}`);
        return;
      }
      if (choice.finalAction) {
        state.hidden.FinalChoice = choice.finalAction;
        const endingKey = evaluateEnding(choice.finalAction);
        state.latestFeedback = [
          `<strong>${choice.label}. ${choice.text}</strong>`,
          changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无",
          hiddenChanges.length ? `隐藏伏笔：${hiddenChanges.join("；")}` : "",
          choice.short ? `结果：${choice.short}` : ""
        ].filter(Boolean).join("<br>");
        addLog({ message: `终局选择：${choice.label}. ${choice.text}`, type: "choice" });
        goToEnding(endingKey);
        return;
      }
      state.latestFeedback = [
        `<strong>${choice.label}. ${choice.text}</strong>`,
        choice.npcReaction ? `NPC反应：${choice.npcReaction}` : "",
        changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无",
        hiddenChanges.length ? `隐藏伏笔：${hiddenChanges.join("；")}` : "",
        evidenceLine ? `记录：${evidenceLine}` : "记录：无新增线索",
        scene.readKey && choice.readLevel ? `人物理解层级：${readLabels[choice.readLevel]}` : "",
        scene.personKey ? `人物理解：${getUnderstanding(scene.personKey)}` : "",
        choice.short ? `结果：${choice.short}` : ""
      ].filter(Boolean).join("<br>");
      addLog({ message: `选择：${choice.label}. ${choice.text}`, type: "choice" });
      render();
      scrollToTop();
    }

    function goNext() {
      if (state.viewMode === "review") return;
      const scene = currentScene();
      let target = "";
      let feedback = "进入下一场景。";
      if (scene.personKey) {
        target = "CH1_HUB_FREE_EXPLORE";
        feedback = "回到晚饭后的自由行动。已拜访人物不能重复拜访。";
      } else if (scene.next) {
        target = scene.next;
      }
      if (target) transitionToScene(target, feedback, `进入：${sceneLabel(target).title}`);

      const person = personFromKey(keyOrPerson);

      return readSummaries[person.readKey]?.[level] || "这个人还没有真正开口。";

    function evaluateEnding(finalAction = state.hidden?.FinalChoice || "") {
      normalizeAllStats();
      const vars = state.vars || {};
      const hidden = { ...initialHiddenState(), ...(state.hidden || {}) };
      const keyReasoningCount = solvedKeyReasoningCount(hidden);
      const hasCriticalFailure = vars.EvidenceScore <= 3 || hidden.ChenReportTruth <= 0 || hidden.ZhouDeathTruth <= 0 || finalAction === "cannot_answer";

      if (
        vars.RevengeTimer >= 7 ||
        (vars.RevengeTimer >= 6 && hidden.MotherKey < 2) ||
        (vars.RevengeTimer >= 5 && vars.VillageSilence >= 6 && hidden.LuIdentityProof >= 2 && hidden.MotherKey < 2) ||
        finalAction === "let_fire"

      if (

          hidden.ShenWillIntervene !== true &&
          hidden.ZhouDeathTruth < 2) ||
        (vars.ShenSuspicion >= 5 &&

        hidden.LuHuaiMinGuiltProof >= 1 &&
        hidden.LuIdentityProof >= 1 &&

        render();

    function deductionCombinationById(id) {
      return deductionCombinations.find(combo => combo.id === id);
    }

    function hasEvidence(evidenceId) {
      return (state.evidence || []).some(item => item.id === evidenceId);
    }

    function requirementMet(requirement) {
      if (Array.isArray(requirement)) return requirement.some(id => hasEvidence(id));
      return hasEvidence(requirement);
    }

    function availableDeductionCombinations() {
      const chapter = getChapterNo(activeSceneId());
      return deductionCombinations.filter(combo => combo.chapter === chapter && combo.requires.every(requirementMet));
    }

    function renderThoughtPanel() {
      const box = document.getElementById("thoughtBox");
      if (!box) return;
      state.deduction = { ...initialDeductionState(), ...(state.deduction || {}) };
      state.deduction.combinationResults = state.deduction.combinationResults || {};
      const snapshot = buildDeductionSnapshot();
      const combos = availableDeductionCombinations();
      const panelOpen = Boolean(state.deduction.panelOpen);
      box.innerHTML = `
        <div class="deduction-stage">当前阶段：${snapshot.stage}</div>

      const list = items && items.length ? items : ["暂未形成。"];
      return `

    function renderCombinationPanel(combos) {
      if (!combos.length) {
        return `<div class="deduction-locked">证据还不够。先继续调查，不要急着把“最像凶手的人”当成答案。</div>`;
      }
      return `
        <div class="combination-list">
          ${combos.map(combo => {
            const done = Boolean(state.deduction.combinationResults[combo.id]);
            return `
              <button class="combination-button ${done ? "is-done" : ""}" data-combo="${combo.id}">
                <strong>组合：${combo.label}</strong>
                <span class="small">${done ? "已整理，可回看结果" : "点击整理这组证据"}</span>
                ${done ? `<div class="combination-result">${state.deduction.combinationResults[combo.id]}</div>` : ""}
              </button>
            `;
          }).join("")}
        </div>
      `;
    }

    function applyDeductionCombination(comboId) {
      const combo = deductionCombinationById(comboId);
      if (!combo) return;
      state.deduction = { ...initialDeductionState(), ...(state.deduction || {}) };
      state.deduction.combinationResults = state.deduction.combinationResults || {};
      state.deduction.solved = Array.isArray(state.deduction.solved) ? state.deduction.solved : [];
      if (!state.deduction.combinationResults[combo.id]) {
        const changes = applyEffects(combo.effects || {});
        const hiddenChanges = applyHiddenEffects(combo.hiddenEffects || {});
        state.deduction.combinationResults[combo.id] = combo.result;
        if (!state.deduction.solved.includes(combo.id)) state.deduction.solved.push(combo.id);
        if (combo.conclusion && !state.deduction.conclusions.includes(combo.conclusion)) state.deduction.conclusions.push(combo.conclusion);
        state.latestFeedback = [
          `<strong>推理台：${combo.label}</strong>`,
          combo.result,
          changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无",
          hiddenChanges.length ? `隐藏判断：${hiddenChanges.join("；")}` : ""
        ].filter(Boolean).join("<br>");
        addLog({ message: `推理台组合：${combo.label}`, type: "deduction" });
      } else {
        state.latestFeedback = `<strong>推理台：${combo.label}</strong><br>${state.deduction.combinationResults[combo.id]}`;
      }
      render();
    }

    function buildDeductionSnapshot() {
      const chapter = getChapterNo(activeSceneId());
      const hidden = { ...initialHiddenState(), ...(state.hidden || {}) };
      const solvedConclusions = (state.deduction?.solved || [])
        .map(id => deductionCombinationById(id)?.conclusion)
        .filter(Boolean);
      const base = deductionBaseByChapter(chapter);
      const conclusions = [...base.conclusions, ...solvedConclusions];

      if (chapter === 1) {
        if (hasEvidence("lu_tracks_player_route") || hasEvidence("danger_lu_controls_view")) conclusions.push("有人比我更早知道我会来。");
        if (hasEvidence("shen_guards_old_kiln")) conclusions.push("沈月娥不像在毁证，更像在守着某种证词。");
        if (hasEvidence("zhou_project_contract_missing_page") || hasEvidence("zhou_contacts_old_lu")) conclusions.push("周启明害怕的不是故事太沉，而是故事碰到账。");
        if (hasEvidence("lu_controls_hall_entry") || hasEvidence("genealogy_scrape_hint")) conclusions.push("陆怀民把祠堂称作家事，可他真正保护的也许不是祖宗。");
      }
      if (chapter === 2) {
        if (state.vars.ShenSuspicion >= 3) conclusions.push("沈月娥正在变成最方便的答案。");
        if (hasEvidence("zhou_unsent_sms") || hasEvidence("zhou_unsent_sms_full")) conclusions.push("周启明死前想找“老陆”谈条件。");
        if (hasEvidence("old_account_pages")) conclusions.push("周启明手里的东西，足以让某些人害怕签约。");
        if (hasEvidence("power_cut_trace")) conclusions.push("停电不是背景，它改变了所有人的视线。");
        if (hidden.ZhouDeathTruth >= 1) conclusions.push("周启明的死，不像复仇，更像灭口。");
      }
      if (chapter === 3) {
        if (hasEvidence("old_report_fragment")) conclusions.push("报告没有完全撒谎。");
        if (hidden.ChenReportTruth >= 1) conclusions.push("最坏的地方在于，报告只留下了最方便的一半。");
        if (hidden.ChenReportTruth >= 2) conclusions.push("何青山确实死于火场，但火不是事故。");
      }
      if (chapter === 4) {
        if (hidden.ZhouDeathTruth >= 1) conclusions.push("杀死周启明的人未必最恨他，但一定最怕他说话。");
        if (hasEvidence("genealogy_scrape_clear") || hasEvidence("shrine_key_gap")) conclusions.push("陆怀民掌握的不是一把钥匙，而是青瓷庄允许谁被记住的权力。");
        if (hidden.LuHuaiMinGuiltProof >= 2) conclusions.push("陆怀民保护的不是一个秘密，而是一种让村子继续活下去的说法。");
      }
      if (chapter === 5) {
        if (hasEvidence("porcelain_fish_pendant")) conclusions.push("“川”不是陆怀民随手给的名字，它可能来自一个被夺走的孩子。");
        if (hasEvidence("dividend_list")) conclusions.push("旧案不是私人恩怨，它和补助、分红、老窑址权益有关。");
        if (hidden.VillageWitnessOpened) conclusions.push("沉默不是没有声音，而是每个人都把自己的那一份藏起来。");
        if (hasEvidence("kiln_fire_material_ready")) conclusions.push("陆景川要的不是证词，而是一场能替他说话的火。");
      }
      if (chapter === 6) {
        if (hidden.MotherKey >= 3) conclusions.push("能把陆景川从火边叫回来的人，不是证据，而是沈月娥。");
        if (hidden.MotherKey < 2) conclusions.push("证据可以阻止计划，但未必能让陆景川真正停下。");
        conclusions.push("真相必须公开。");
        conclusions.push("但它不能再靠一场火公开。");
      }

      return {
        stage: base.stage,
        questions: base.questions,
        conclusions: [...new Set(conclusions)].slice(0, 7),
        pending: [...new Set(base.pending)].slice(0, 6)
      };
    }
