    function devStatusItem(label, value) {
      return `<div class="dev-status-item"><span>${label}</span><strong>${formatDevValue(value)}</strong></div>`;
    }

    function formatDevValue(value) {
      if (value === undefined || value === null || value === "") return "未设置";
      if (typeof value === "boolean") return value ? "true" : "false";
      return String(value);
    }

    function renderDevNumericRow(scope, key, label, value) {
      return `
        <div class="dev-var-row">
          <span>${key} / ${label}</span>
          <strong>${formatDevValue(value)}</strong>
          <div class="dev-var-actions">
            <button class="secondary" data-dev-${scope}="${key}" data-dev-op="dec">-1</button>
            <button class="secondary" data-dev-${scope}="${key}" data-dev-op="inc">+1</button>
            <button class="secondary" data-dev-${scope}="${key}" data-dev-set="0">设为 0</button>
            <button class="secondary" data-dev-${scope}="${key}" data-dev-set="3">设为 3</button>
            <button class="secondary" data-dev-${scope}="${key}" data-dev-set="6">设为 6</button>
            <button class="secondary" data-dev-${scope}="${key}" data-dev-set="10">设为 10</button>
          </div>
        </div>
      `;
    }

    function renderDevHiddenRow(key) {
      const value = state.hidden?.[key];
      if (typeof value === "boolean") {
        return `
          <div class="dev-var-row">
            <span>${key} / ${hiddenNames[key] || key}</span>
            <strong>${formatDevValue(value)}</strong>
            <div class="dev-var-actions">
              <button class="secondary" data-dev-hidden-bool="${key}" data-dev-bool="true">true</button>
              <button class="secondary" data-dev-hidden-bool="${key}" data-dev-bool="false">false</button>
            </div>
          </div>
        `;
      }
      if (key === "EndingKey") {
        return `
          <div class="dev-var-row">
            <span>${key} / ${hiddenNames[key] || key}</span>
            <strong>${formatDevValue(value)}</strong>
            <div class="dev-var-actions">
              ${["A", "B", "C", "D", "E"].map(end => `<button class="secondary" data-dev-ending-key="${end}">${end}</button>`).join("")}
              <button class="secondary" data-dev-ending-key="">清空</button>
            </div>
          </div>
        `;
      }
      return renderDevNumericRow("hidden", key, hiddenNames[key] || key, value || 0);
    }

    function bindDevControls() {
      document.querySelectorAll("[data-dev-jump]").forEach(button => button.addEventListener("click", () => devJumpToScene(button.dataset.devJump)));
      document.querySelectorAll("[data-dev-ending]").forEach(button => button.addEventListener("click", () => devForceEnding(button.dataset.devEnding)));
      document.querySelectorAll("[data-dev-preset]").forEach(button => button.addEventListener("click", () => devApplyPreset(button.dataset.devPreset)));
      document.querySelectorAll("[data-dev-evidence-set]").forEach(button => button.addEventListener("click", () => devGrantEvidenceSet(button.dataset.devEvidenceSet)));
      document.querySelectorAll("[data-dev-reasoning]").forEach(button => button.addEventListener("click", () => devUnlockReasoning(button.dataset.devReasoning)));
      document.querySelectorAll("[data-dev-route]").forEach(button => button.addEventListener("click", () => devSetSecondRoute(button.dataset.devRoute)));
      document.querySelectorAll("[data-dev-var]").forEach(button => button.addEventListener("click", () => devAdjustVar(button.dataset.devVar, button.dataset.devOp, button.dataset.devSet)));
      document.querySelectorAll("[data-dev-hidden]").forEach(button => button.addEventListener("click", () => devAdjustHiddenNumber(button.dataset.devHidden, button.dataset.devOp, button.dataset.devSet)));
      document.querySelectorAll("[data-dev-hidden-bool]").forEach(button => button.addEventListener("click", () => devSetHiddenBool(button.dataset.devHiddenBool, button.dataset.devBool === "true")));
      document.querySelectorAll("[data-dev-ending-key]").forEach(button => button.addEventListener("click", () => devSetEndingKey(button.dataset.devEndingKey)));
    }

    function refreshDevModal() {
      normalizeAllStats();
      saveState();
      renderVars();
      renderThoughtPanel();
      renderHeaderMeta();
      renderDevModal();
    }

    function ensureSceneVisited(sceneId) {
      if (sceneId && sceneById[sceneId]) markSceneReached(sceneId);
    }

    function devJumpToScene(target) {
      if (target.startsWith("ENDING_")) {
        devForceEnding(target.replace("ENDING_", ""));
        return;
      }
      if (!sceneById[target]) return;
      hasStartedSession = true;
      state.mode = "game";
      state.ended = false;
      state.sceneId = target;
      state.viewMode = "play";
      state.reviewSceneId = null;
      ensureSceneVisited(target);
      addLog({ message: `开发者跳转：${target}`, type: "dev" });
      trackEvent("dev_jump_scene", { scene_id: target, version: VERSION_LABEL });
      saveState();
      closeDevModal();
      render();
      scrollToTop();
    }

    function devAdjustVar(key, op, setValue) {
      if (!(key in state.vars)) return;
      if (setValue !== undefined) state.vars[key] = Number(setValue);
      else state.vars[key] = Number(state.vars[key] || 0) + (op === "dec" ? -1 : 1);
      refreshDevModal();
    }

    function devAdjustHiddenNumber(key, op, setValue) {
      state.hidden = { ...initialHiddenState(), ...(state.hidden || {}) };
      if (setValue !== undefined) state.hidden[key] = Number(setValue);
      else state.hidden[key] = Number(state.hidden[key] || 0) + (op === "dec" ? -1 : 1);
      refreshDevModal();
    }

    function devSetHiddenBool(key, value) {
      state.hidden = { ...initialHiddenState(), ...(state.hidden || {}) };
      state.hidden[key] = value;
      refreshDevModal();
    }

    function devSetEndingKey(key) {
      state.hidden = { ...initialHiddenState(), ...(state.hidden || {}) };
      state.hidden.EndingKey = key || "";
      refreshDevModal();
    }

    function devSetSecondRoute(route) {
      state.hidden = { ...initialHiddenState(), ...(state.hidden || {}) };
      state.hidden.SecondChapterRoute = route;
      state.hidden.SecondChapterRouteReason = ["开发者手动切换"];
      saveState();
      renderDevModal();
    }

    function devEvidenceRegistry() {
      const registry = {};
      scenes.forEach(scene => {
        [...(scene.clickables || []), ...(scene.choices || [])].forEach(source => {
          const items = [];
          if (source.evidence) items.push(source.evidence);
          if (Array.isArray(source.evidenceList)) items.push(...source.evidenceList);
          items.forEach(item => {
            if (item && item.id && !registry[item.id]) registry[item.id] = { ...item };
          });
        });
      });
      return registry;
    }

    function devGrantEvidence(evidenceId) {
      const item = devEvidenceRegistry()[evidenceId];
      if (item) addEvidence({ ...item });
    }

    function devGrantEvidenceSet(setName) {
      if (setName === "clear") {
        state.evidence = [];
      } else if (setName === "all") {
        Object.keys(devEvidenceRegistry()).forEach(devGrantEvidence);
      } else {
        (devEvidenceSets[setName] || []).forEach(devGrantEvidence);
      }
      addLog({ message: `开发者证据操作：${setName}`, type: "dev" });
      refreshAfterDevChange();
    }

    function refreshAfterDevChange() {
      normalizeAllStats();
      saveState();
      renderEvidencePool();
      renderThoughtPanel();
      renderRecordRail();
      renderDevModal();
    }

    function devUnlockReasoning(kind) {
      state.hidden = { ...initialHiddenState(), ...(state.hidden || {}) };
      const setHidden = (key, value) => { state.hidden[key] = value; };
      switch (kind) {
        case "zhou":
          setHidden("ZhouDeathTruth", 3);
          state.vars.EvidenceScore += 1;
          break;
        case "chen":
          setHidden("ChenReportTruth", 3);
          state.vars.FatherClue += 1;
          break;
        case "luhuai":
          setHidden("LuHuaiMinGuiltProof", 3);
          state.hidden.ZhouDeathTruth = Math.max(Number(state.hidden.ZhouDeathTruth) || 0, 1);
          break;
        case "identity":
          setHidden("LuIdentityProof", 3);
          break;
        case "profit":
          setHidden("VillageProfitProof", 3);
          break;
        case "mother":
          setHidden("MotherKey", 3);
          setHidden("ShenWillIntervene", true);
          state.vars.ShenSuspicion = Math.min(state.vars.ShenSuspicion || 0, 3);
          break;
        case "truth":
          state.vars.EvidenceScore = 10;
          state.vars.FatherClue = Math.max(state.vars.FatherClue || 0, 3);
          setHidden("ZhouDeathTruth", 3);
          setHidden("ChenReportTruth", 3);
          setHidden("LuHuaiMinGuiltProof", 3);
          setHidden("LuIdentityProof", 3);
          setHidden("VillageProfitProof", 3);
          setHidden("FinalTruthReady", true);
          devGrantEvidenceSet("all");
          break;
      }
      addLog({ message: `开发者推理解锁：${kind}`, type: "dev" });
      refreshAfterDevChange();
    }

    function applyEndingPreset(key) {
      const presets = {
        A: { vars: { EvidenceScore: 8, ShenSuspicion: 2, RevengeTimer: 4 }, hidden: { ChenReportTruth: 2, ZhouDeathTruth: 2, LuHuaiMinGuiltProof: 2, LuIdentityProof: 2, VillageProfitProof: 2, MotherKey: 2, ShenWillIntervene: true } },
        B: { vars: { EvidenceScore: 5, ShenSuspicion: 8, VillageSilence: 8, RevengeTimer: 4 }, hidden: { ChenReportTruth: 1, ZhouDeathTruth: 1, LuHuaiMinGuiltProof: 1, LuIdentityProof: 1, VillageProfitProof: 1, MotherKey: 0, ShenWillIntervene: false } },
        C: { vars: { EvidenceScore: 8, ShenSuspicion: 3, VillageSilence: 8, RevengeTimer: 8 }, hidden: { ChenReportTruth: 2, ZhouDeathTruth: 2, LuHuaiMinGuiltProof: 2, LuIdentityProof: 3, VillageProfitProof: 3, MotherKey: 1, ShenWillIntervene: false } },
        D: { vars: { EvidenceScore: 2, ShenSuspicion: 5, VillageSilence: 6, RevengeTimer: 5 }, hidden: { ChenReportTruth: 0, ZhouDeathTruth: 0, LuHuaiMinGuiltProof: 0, LuIdentityProof: 0, VillageProfitProof: 0, MotherKey: 0, ShenWillIntervene: false } },
        E: { vars: { EvidenceScore: 10, ShenSuspicion: 1, VillageSilence: 2, RevengeTimer: 3, FatherClue: 3 }, hidden: { ChenReportTruth: 3, ZhouDeathTruth: 3, LuHuaiMinGuiltProof: 3, LuIdentityProof: 3, VillageProfitProof: 3, MotherKey: 3, ShenWillIntervene: true, FinalTruthReady: true, VillageWitnessOpened: true } }
      };
      const preset = presets[key] || presets.A;
      state.vars = { ...state.vars, ...preset.vars };
      state.hidden = { ...initialHiddenState(), ...(state.hidden || {}), ...preset.hidden };
      if (key === "E") {
        state.flags.villagerSpoke = true;
        state.flags.protectedShen = true;
        state.flags.usedMotherKeyFinale = true;
      }
      normalizeAllStats();
    }

    function devForceEnding(key) {
      applyEndingPreset(key);
      state.hidden.EndingKey = key;
      state.sceneId = `ENDING_${key}`;
      state.mode = "game";
      state.ended = true;
      state.viewMode = "play";
      state.reviewSceneId = null;
      hasStartedSession = true;
      addLog({ message: `开发者结局测试：强制进入结局 ${key}`, type: "dev" });
      trackEvent("dev_force_ending", { ending: key, version: VERSION_LABEL });
      saveState();
      closeDevModal();
      render();
      scrollToTop();
    }

    function devApplyPreset(name) {
      state.mode = "game";
      state.ended = false;
      hasStartedSession = true;
      switch (name) {
        case "ch2_normal":
          devGrantEvidenceSet("ch1");
          state.sceneId = "CH2_ROUTE_LOST";
          break;
        case "ch3_zhou":
          devGrantEvidenceSet("ch2");
          state.hidden.ZhouDeathTruth = 3;
          state.vars.EvidenceScore = Math.max(state.vars.EvidenceScore, 5);
          state.sceneId = "CH3_CHEN_REVISIT";
          break;
        case "ch4_report":
          devGrantEvidenceSet("ch3");
          state.hidden.ChenReportTruth = 3;
          state.vars.FatherClue = Math.max(state.vars.FatherClue, 2);
          state.sceneId = "CH4_SHRINE_GATHER";
          break;
        case "ch5_luhuai":
          devGrantEvidenceSet("ch4");
          state.hidden.LuHuaiMinGuiltProof = 3;
          state.hidden.ZhouDeathTruth = Math.max(state.hidden.ZhouDeathTruth || 0, 2);
          state.sceneId = "CH5_KILN_SECRET";
          break;
        case "ch6_truth":
          applyEndingPreset("A");
          devGrantEvidenceSet("final");
          state.sceneId = "CH6_TRUTH_REPLAY";
          break;
        case "ch6_hidden":
          applyEndingPreset("E");
          devGrantEvidenceSet("all");
          state.sceneId = "CH6_FINAL_CHOICE";
          break;
        case "ch6_revenge":
          applyEndingPreset("C");
          devGrantEvidenceSet("final");
          state.sceneId = "CH6_FINAL_CHOICE";
          break;
        case "ch6_scapegoat":
          applyEndingPreset("B");
          devGrantEvidenceSet("ch2");
          state.sceneId = "CH6_FINAL_CHOICE";
          break;
        case "ch6_bad":
          applyEndingPreset("D");
          state.sceneId = "CH6_FINAL_CHOICE";
          break;
      }
      state.viewMode = "play";
      state.reviewSceneId = null;
      ensureSceneVisited(state.sceneId);
      addLog({ message: `开发者预设：${name}`, type: "dev" });
      trackEvent("dev_apply_preset", { preset: name, version: VERSION_LABEL });
      normalizeAllStats();
      saveState();
      closeDevModal();
      render();
      scrollToTop();
    }

    function renderChapterDirectoryModal() {
      const groups = [
        ["前情", [{ label: "前情提示", sceneId: null, status: state.mode === "intro" ? "当前" : "已到达" }]],
        ["第一章主线", [
          { label: "1-1 山路入村", sceneId: "CH1_ROAD" },
          { label: "1-2 老宅堂屋：所有人首次同框", sceneId: "CH1_HALL" },
          { label: "1-3 晚饭后的青瓷庄 / 自由行动", sceneId: "CH1_HUB_FREE_EXPLORE" },
          { label: "1-4 返回堂屋：整理人物印象", sceneId: "CH1_RETURN_HALL" },
          { label: "1-5 林知夏房间：整理父亲笔记", sceneId: "CH1_ROOM_REFLECT" },
          { label: "1-6 夜晚停电：第二章入口", sceneId: "CH1_BLACKOUT" }
        ]],
        ["第一章人物支线", people.map(person => ({ label: `${person.place}：${person.name}`, sceneId: person.sceneId, person }))]
      ];
      [2, 3, 4, 5, 6].forEach(chapterNo => {
        groups.push([
          `第${chapterNo}章 · ${chapterTitle(chapterNo)}`,
          scenes
            .filter(scene => getChapterNo(scene) === chapterNo)
            .map(scene => ({ label: `${scene.no} ${scene.title}`, sceneId: scene.id }))
        ]);
      });
      groups.push(["结局", [{ label: state.hidden?.EndingKey ? endingDefinitions[state.hidden.EndingKey]?.title || "已进入结局" : "终局结算", sceneId: null, status: state.ended ? "当前" : "未到达" }]]);
      document.getElementById("directoryContent").innerHTML = groups.map(([title, items]) => `
        <div class="modal-group">
          <h3>${title}</h3>
          ${items.map(item => renderDirectoryItem(item)).join("")}
        </div>
      `).join("");
      document.querySelectorAll("[data-directory-scene]").forEach(button => {
        button.addEventListener("click", () => openSceneReview(button.dataset.directoryScene));
      });
    }

    function renderDirectoryItem(item) {
      const reached = item.sceneId ? isSceneReached(item.sceneId) : item.status === "已到达" || item.status === "当前";
      const current = item.sceneId && activeSceneId() === item.sceneId && state.viewMode !== "review";
      const visited = item.person ? Boolean(state.flags[item.person.key]) : false;
      const status = item.status || (current ? "当前" : item.person ? (visited ? "已拜访" : reached ? "已到达" : "未拜访") : reached ? "已到达" : "未到达");
      return `
        <button class="directory-item" ${item.sceneId && reached ? "" : "disabled"} ${item.sceneId ? `data-directory-scene="${item.sceneId}"` : ""}>
          <span>${item.label}</span>
          <span>${status}</span>
        </button>
      `;
    }

    function openDirectoryModal() {
      renderChapterDirectoryModal();
      document.body.classList.add("modal-open");
      const backdrop = document.getElementById("modalBackdrop");
      backdrop.classList.add("show");
      backdrop.setAttribute("aria-hidden", "false");
    }

    function closeDirectoryModal() {
      document.body.classList.remove("modal-open");
      const backdrop = document.getElementById("modalBackdrop");
      if (!backdrop) return;
      backdrop.classList.remove("show");
      backdrop.setAttribute("aria-hidden", "true");
    }

    function openSaveModal() {
      closeDirectoryModal();
      renderSaveSlots();
      document.body.classList.add("modal-open");
      const backdrop = document.getElementById("saveModalBackdrop");
      backdrop.classList.add("show");
      backdrop.setAttribute("aria-hidden", "false");
    }

    function closeSaveModal() {
      document.body.classList.remove("modal-open");
      const backdrop = document.getElementById("saveModalBackdrop");
      if (!backdrop) return;
      backdrop.classList.remove("show");
      backdrop.setAttribute("aria-hidden", "true");
    }

    function getSaveSlots() {
      try {
        const raw = localStorage.getItem(SAVE_SLOT_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        const slots = Array.isArray(parsed) ? parsed : [];
        return [0, 1, 2].map(index => slots[index] || null);
      } catch {
        return [null, null, null];
      }
    }

    function setSaveSlots(slots) {
      localStorage.setItem(SAVE_SLOT_KEY, JSON.stringify([0, 1, 2].map(index => slots[index] || null)));
    }

    function cloneState(source = state) {
      return JSON.parse(JSON.stringify(source));
    }

    function normalizeLoadedState(savedState) {
      const restored = savedState && typeof savedState === "object" ? savedState : initialState();
      restored.vars = { ...baseVars, ...(restored.vars || {}) };
      restored.hidden = { ...initialHiddenState(), ...(restored.hidden || {}) };
      if (!Array.isArray(restored.hidden.SecondChapterRouteReason)) restored.hidden.SecondChapterRouteReason = [];
      restored.deduction = { ...initialDeductionState(), ...(restored.deduction || {}) };
      restored.deduction.combinationResults = restored.deduction.combinationResults || {};
      restored.deduction.solved = Array.isArray(restored.deduction.solved) ? restored.deduction.solved : [];
      restored.characterReads = { ...initialCharacterReads(), ...(restored.characterReads || {}) };
      restored.analytics = restored.analytics || {};
      restored.devMode = localStorage.getItem(DEV_UNLOCK_KEY) === "1" || Boolean(restored.devMode);
      restored.clicked = restored.clicked || {};
      restored.selectedByScene = restored.selectedByScene || {};
      restored.flags = restored.flags || {};
      restored.evidence = Array.isArray(restored.evidence) ? restored.evidence : [];
      restored.logs = Array.isArray(restored.logs) ? restored.logs : [];
      restored.reachedSceneIds = Array.isArray(restored.reachedSceneIds) ? restored.reachedSceneIds : inferReachedScenes(restored);
      restored.viewMode = "play";
      restored.reviewSceneId = null;
      return normalizeStateStats(restored);
    }

    function getSaveSummary(savedState = state, savedAt = "") {
      const label = savedState.ended
        ? { no: "结局", title: endingDefinitions[savedState.hidden?.EndingKey]?.title || "终局结算" }
        : savedState.mode === "intro"
          ? { no: "前情", title: "前情提示" }
          : sceneLabel(savedState.sceneId);
      return {
        sceneTitle: `${label.no || "第一章"} · ${label.title || "未知节点"}`,
        visitCount: savedState.visitCount || 0,
        route: savedState.hidden?.EndingKey ? endingDefinitions[savedState.hidden.EndingKey]?.title || savedState.hidden.EndingKey : (savedState.hidden?.SecondChapterRoute || savedState.route?.name || "未结算"),
        savedAt: savedAt || "未保存"
      };
    }

    function saveToSlot(slotIndex) {
      normalizeAllStats();
      const slots = getSaveSlots();
      addLog({ message: `保存到存档槽 ${slotIndex + 1}`, type: "save" });
      const savedAt = new Date().toLocaleString("zh-CN", { hour12: false });
      const summary = getSaveSummary(state, savedAt);
      slots[slotIndex] = {
        id: `slot${slotIndex + 1}`,
        savedAt,
        version: VERSION_LABEL,
        title: summary.sceneTitle,
        state: cloneState(state)
      };
      setSaveSlots(slots);
      saveState();
      trackEvent("save_game", {
        slot: slotIndex + 1,
        scene_id: state.sceneId || "",
        version: VERSION_LABEL
      });
      renderSaveSlots();
      renderRecordRail();
    }

    function loadFromSlot(slotIndex) {
      const slot = getSaveSlots()[slotIndex];
      if (!slot || !slot.state) return;
      state = normalizeLoadedState(cloneState(slot.state));
      hasStartedSession = true;
      addLog({ message: `读取存档槽 ${slotIndex + 1}`, type: "load" });
      saveState();
      trackEvent("load_game", {
        slot: slotIndex + 1,
        scene_id: state.sceneId || "",
        version: VERSION_LABEL
      });
      closeSaveModal();
      render();
      scrollToTop();
    }

    function deleteSaveSlot(slotIndex) {
      const slots = getSaveSlots();
      if (!slots[slotIndex]) return;
      slots[slotIndex] = null;
      setSaveSlots(slots);
      trackEvent("delete_save_slot", {
        slot: slotIndex + 1,
        version: VERSION_LABEL
      });
      renderSaveSlots();
    }

    function renderSaveSlots() {
      const box = document.getElementById("saveSlots");
      if (!box) return;
      const slots = getSaveSlots();
      box.innerHTML = slots.map((slot, index) => {
        const empty = !slot || !slot.state;
        const summary = empty ? null : getSaveSummary(slot.state, slot.savedAt);
        return `
          <div class="save-slot">
            <div class="save-slot-title">
              <span>存档槽 ${index + 1}</span>
              <span>${empty ? "空" : slot.version || VERSION_LABEL}</span>
            </div>
            <div class="save-slot-meta">
              ${empty ? `
                <span>当前状态：空槽</span>
                <span>保存时间：无</span>
              ` : `
                <span>当前章节 / 节点：${summary.sceneTitle}</span>
                <span>已拜访人数：${summary.visitCount}/${MAX_VISITS}</span>
                <span>当前路线 / 结局：${summary.route}</span>
                <span>保存时间：${summary.savedAt}</span>
              `}
            </div>
            <div class="save-slot-actions">
              <button class="secondary" data-save-slot="${index}">保存到此槽</button>
              <button class="secondary" ${empty ? "disabled" : ""} data-load-slot="${index}">读取此槽</button>
              <button class="secondary" ${empty ? "disabled" : ""} data-delete-slot="${index}">删除此槽</button>
            </div>
          </div>
        `;
      }).join("");
      document.querySelectorAll("[data-save-slot]").forEach(button => {
        button.addEventListener("click", () => saveToSlot(Number(button.dataset.saveSlot)));
      });
      document.querySelectorAll("[data-load-slot]").forEach(button => {
        button.addEventListener("click", () => loadFromSlot(Number(button.dataset.loadSlot)));
      });
      document.querySelectorAll("[data-delete-slot]").forEach(button => {
        button.addEventListener("click", () => deleteSaveSlot(Number(button.dataset.deleteSlot)));
      });
    }

    function bindReviewControls() {
      const btn = document.getElementById("returnPlayBtn");
      if (btn) btn.addEventListener("click", returnToPlay);
    }

    function renderVars() {
      document.getElementById("varsGrid").innerHTML = Object.keys(variableNames).map(key => `
        <div class="var-card" data-hint="${variableHints[key] || ""}" title="测试数值，非最终评分。${variableHints[key] || ""}">
          <span>${variableNames[key]}</span>
          <b>${state.vars[key]}</b>
        </div>
      `).join("");
    }

    document.getElementById("resetBtn").addEventListener("click", clearSave);
    document.getElementById("directoryBtn").addEventListener("click", openDirectoryModal);
    document.getElementById("saveBtn").addEventListener("click", openSaveModal);
    document.getElementById("fullscreenBtn").addEventListener("click", requestGameFullscreen);
    document.getElementById("homeBtn").addEventListener("click", goHomeScreen);
    document.getElementById("devBtn").addEventListener("click", openDevModal);
    document.getElementById("closeModalBtn").addEventListener("click", closeDirectoryModal);
    document.getElementById("closeSaveModalBtn").addEventListener("click", closeSaveModal);
    document.getElementById("closeDevModalBtn").addEventListener("click", closeDevModal);
    document.getElementById("exitDevModeBtn").addEventListener("click", exitDevMode);
    document.getElementById("modalBackdrop").addEventListener("click", event => {
      if (event.target.id === "modalBackdrop") closeDirectoryModal();
    });
    document.getElementById("saveModalBackdrop").addEventListener("click", event => {
      if (event.target.id === "saveModalBackdrop") closeSaveModal();
    });
    document.getElementById("devModalBackdrop").addEventListener("click", event => {
      if (event.target.id === "devModalBackdrop") closeDevModal();
    });
    document.addEventListener("keydown", event => {
      if ((event.ctrlKey || event.metaKey || event.altKey) && event.shiftKey && event.key.toLowerCase() === "d") {
        event.preventDefault();
        requestDevUnlock();
        return;
      }
      if (event.key === "Escape") {
        closeDirectoryModal();
        closeSaveModal();
        closeDevModal();
      }
    });
    document.addEventListener("fullscreenchange", handleFullscreenChange);
    document.addEventListener("webkitfullscreenchange", handleFullscreenChange);
    updateFullscreenButton();
    render();
    if (new URLSearchParams(window.location.search).get("dev") === "1") {
      window.setTimeout(requestDevUnlock, 150);
    }
  </script>
</body>
</html>
