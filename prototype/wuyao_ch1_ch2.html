<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>《雾窑》一二章连续试玩原型</title>
  <style>
    :root {
      --bg: #121313;
      --panel: #1d1f1f;
      --panel-2: #252827;
      --text: #f1eee6;
      --muted: #aaa399;
      --line: #3b3f3d;
      --accent: #d2a45f;
      --accent-2: #87b7a5;
      --danger: #c97062;
      --ok: #82b88b;
      --shadow: rgba(0, 0, 0, .35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
      padding-bottom: 104px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 22px;
      background: rgba(18, 19, 19, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: 20px; margin-bottom: 2px; }
    h2 { font-size: 24px; margin-bottom: 4px; }
    h3 { font-size: 15px; color: var(--accent); margin: 18px 0 8px; }
    ul { padding-left: 20px; }

    main {
      width: min(1200px, calc(100% - 28px));
      margin: 18px auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 32px var(--shadow);
      padding: 18px;
    }

    .scene-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }

    .tag {
      flex: 0 0 auto;
      padding: 4px 10px;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .small { color: var(--muted); font-size: 13px; }

    .description,
    .dialogue,
    .feedback,
    .status-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #303331;
      color: var(--text);
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    button:hover:not(:disabled) {
      border-color: var(--accent);
      background: #3a3c39;
    }

    button:disabled {
      opacity: .48;
      cursor: not-allowed;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #191511;
      font-weight: 700;
      text-align: center;
    }

    button.secondary { text-align: center; }
    button.choice { display: block; width: 100%; margin: 8px 0; }
    button.choice strong { display: block; margin-bottom: 4px; }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .feedback {
      margin-top: 14px;
      min-height: 54px;
      border-left: 3px solid var(--accent-2);
    }

    .next-row {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .side {
      position: sticky;
      top: 74px;
      align-self: start;
      max-height: calc(100vh - 94px);
      overflow: auto;
    }

    .progress {
      height: 8px;
      background: #303331;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--accent);
    }

    .evidence-group {
      border: 1px solid var(--line);
      border-radius: 8px;
      margin: 8px 0;
      background: #202322;
      overflow: hidden;
    }

    .evidence-group summary {
      padding: 9px 10px;
      cursor: pointer;
      color: var(--accent);
      font-weight: 700;
    }

    .evidence-item {
      padding: 8px 10px;
      border-top: 1px solid var(--line);
    }

    .evidence-item b { display: block; }
    .evidence-item p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

    .log-list {
      max-height: 180px;
      overflow: auto;
    }

    .vars-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      background: rgba(18, 19, 19, .96);
      border-top: 1px solid var(--line);
      padding: 10px 14px;
      backdrop-filter: blur(10px);
    }

    .vars-grid {
      width: min(1200px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(8, minmax(88px, 1fr));
      gap: 8px;
    }

    .vars-grid div {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 8px;
      min-width: 0;
    }

    .vars-grid span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .vars-grid b { font-size: 18px; }
    .good { color: var(--ok); }
    .bad { color: var(--danger); }

    @media (max-width: 920px) {
      main { grid-template-columns: 1fr; }
      .side { position: static; max-height: none; }
      .vars-grid { grid-template-columns: repeat(2, 1fr); }
      body { padding-bottom: 230px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>《雾窑》一二章连续试玩原型</h1>
      <div class="small">统一风格 · 连续数值 · 分级证据包 · 自动保存</div>
    </div>
    <div class="top-actions">
      <button class="secondary" id="resetBtn">清空存档</button>
    </div>
  </header>

  <main>
    <section class="panel" id="scenePanel"></section>
    <aside class="panel side">
      <h3>章节进度</h3>
      <div class="progress"><span id="progressFill"></span></div>
      <p class="small" id="progressText"></p>

      <h3>证据包</h3>
      <p class="small">线索不再全部堆在正文里，按重要程度收纳。需要细看时展开。</p>
      <div id="evidenceBox"></div>

      <h3>当前推理焦点</h3>
      <ul id="focusList"></ul>

      <h3>最近记录</h3>
      <ul class="log-list" id="logList"></ul>
    </aside>
  </main>

  <div class="vars-bar">
    <div class="vars-grid" id="varsGrid"></div>
  </div>

  <script>

    const scenes = [

        clickables: [

          { id: "ch1_bridge", name: "远处断桥", text: "吊桥一侧垮下去，铁索撞在山壁上。短时间内无法离村。", evidence: { id: "broken_bridge", type: "obs", name: "断桥封闭信息", detail: "暴雨、塌方和吊桥损毁形成封闭空间。" } }
        ],
        choices: [
          { label: "A", text: "你对这条老路很熟。", effects: { LuTrust: -1, EvidenceScore: 1 }, evidence: { id: "lu_old_road", type: "clue", name: "陆景川熟悉旧路", detail: "陆景川对老路和旧窑方向过于熟悉。" }, short: "陆景川解释为项目勘测走过很多次。" },

          { id: "ch1_contract", name: "项目合同", text: "合同金额被压住，只露出追加投入和老窑址权益。", evidence: { id: "old_kiln_rights", type: "clue", name: "老窑址权益字样", detail: "旧案利益线的早期提示。" } },

          { label: "C", text: "先看粉末位置，它不像自然撒出来的。", effects: { EvidenceScore: 1, ShenSuspicion: -1 }, evidence: { id: "powder_placement_checked", type: "clue", name: "粉末位置被重点记录", detail: "有利于组合“釉料粉末疑似栽赃”。" }, short: "陈伯远同意先保护粉末位置。" }

      {

        description: "周启明已经不能开口，但账本、汇款单、合同和短信把他拉回二十年前。",
        goal: "判断周启明是单纯贪污者，还是旧案旧账知情者。",
        dialogue: [

          "陆景川：“周启明项目上得罪的人不少，未必和旧事有关。”",

        ],
        clickables: [

          { id: "ch2_ledger_he_mark", name: "账本何字残痕", text: "残页上有一个未烧尽的“何”字。", evidence: { id: "ledger_he_mark", type: "clue", name: "账本何字残痕", detail: "周启明旧账可能关联何青山。" } },
          { id: "ch2_sms_old_debt", name: "短信里的二十年前", text: "“二十年前的账不能再压了”不是文旅话术。", evidence: { id: "sms_old_debt_phrase", type: "clue", name: "短信提到二十年前旧账", detail: "当前命案与旧案直接相连。" } }
        ],
        choices: [
          { label: "A", text: "周启明可能只是贪污被人报复。", effects: { EvidenceScore: 1, SelfDoubt: 1 }, evidence: { id: "zhou_corruption_only", type: "risk", name: "周启明被视为商业纠纷", detail: "短期合理，长期可能忽略旧案。" }, short: "陆怀民和陆景川都接受这个说法。" },
          { label: "B", text: "账本指向的不是现在，是二十年前。", effects: { EvidenceScore: 2 }, evidence: { id: "ledger_points_old_case", type: "clue", name: "账本指向二十年前", detail: "有利于真相公开和隐藏结局。" }, short: "陆怀民沉默，陈伯远避开视线。" },
          { label: "C", text: "周启明想拿旧账威胁别人。", effects: { EvidenceScore: 1, VillageSilence: 1 }, evidence: { id: "zhou_blackmail_old_debt", type: "clue", name: "周启明疑似用旧账威胁", detail: "旧案利益链更清楚，但村庄沉默压力上升。" }, short: "陆怀民要求不要乱说。" }
        ],
        next: "CH2_S07"
      },
      {
        id: "CH2_S07",
        chapter: "第二章",
        no: "2-7",
        title: "第一次证物组合推理",
        description: "单个线索不能推出答案。请选择一组线索组合，测试你的第一轮推理方向。",
        goal: "通过组合判断栽赃、旧账、误判或错误动线。",
        combo: true,
        dialogue: [
          "内心：“粉末、茶杯、账本、窗户和脚印，至少有一部分是给我看的。”",
          "内心：“如果这是一个答案，为什么它被摆得这么明显？”"
        ],
        clickables: [],
        choices: [
          { label: "组合一", text: "釉料粉末痕迹 + 茶杯摆放位置 + 陆景川熟悉窑料", effects: { EvidenceScore: 2, ShenSuspicion: -1, LuTrust: -1 }, flag: "glazeFrame", evidence: { id: "glaze_staged_frame", type: "core", name: "釉料粉末疑似被摆放栽赃", detail: "釉料粉末可能是被刻意摆放，用来指向沈月娥。" }, short: "沈月娥嫌疑下降，陆景川疑点上升。" },
          { label: "组合二", text: "烧焦账本 + 汇款单 + 未发送短信草稿", effects: { EvidenceScore: 2 }, flag: "oldDebt", evidence: { id: "zhou_old_debt_link", type: "core", name: "周启明死亡与二十年前旧账有关", detail: "第一案不只是文旅项目纠纷。" }, short: "旧案利益线形成。" },
          { label: "错误组合一", text: "釉料粉末 + 沈月娥反感文旅项目", effects: { ShenSuspicion: 1, SelfDoubt: 1 }, wrong: true, evidence: { id: "wrong_shen_project_motive", type: "risk", name: "误判沈月娥项目动机", detail: "把反感项目等同于杀人动机，容易进入替罪羊路线。" }, short: "短期看似合理，长期风险很高。" },
          { label: "错误组合二", text: "窗台雨痕 + 半开窗户", effects: { RevengeTimer: 1, SelfDoubt: 1 }, wrong: true, evidence: { id: "wrong_window_entry", type: "risk", name: "误判窗外进入", detail: "雨痕和脚印没有闭合，这条路浪费调查时间。" }, short: "复仇倒计时上升。" }
        ],
        next: "CH2_S08"
      },
      {
        id: "CH2_S08",
        chapter: "第二章",
        no: "2-8",
        title: "第二章结尾",
        description: "陈伯远蹲在尸体旁，手指悬在周启明颈侧，最后没有碰下去。他抬头看了一眼窗台，又看了一眼茶杯。",
        goal: "收束账房尸体线，进入第三章“尸检报告”。",
        unlockAfter: 2,
        dialogue: [
          "陈伯远：“这次不像二十年前。”",
          "林知夏：“二十年前怎么了？”",
          "陈伯远：“我什么都没说。”"
        ],
        clickables: [
          { id: "ch2_chen_room_light", name: "陈伯远房间灯光", text: "陈伯远房间方向有灯光一闪。", evidence: { id: "chen_room_light_flash", type: "clue", name: "陈伯远房间灯光闪过", detail: "第三章尸检报告线入口。" } },
          { id: "ch2_medkit_missing", name: "药箱不见了", text: "门边药箱不见，只留下半个湿印。", effects: { FatherClue: 1 }, evidence: { id: "chen_medkit_missing", type: "core", name: "陈伯远药箱不见", detail: "陈伯远可能要处理尸检相关物件。" } },
          { id: "ch2_sms_last", name: "手机暗屏前的短信", text: "“二十年前的账”停在屏幕最上方。", effects: { EvidenceScore: 1 }, evidence: { id: "sms_last_visible", type: "clue", name: "短信草稿最后可见", detail: "周启明死因和旧账继续绑定。" } }
        ],
        choices: [],
        next: "END"
      }
    ];

    let state = loadState() || initialState();

    function initialState() {
      return {
        version: 1,
        sceneIndex: 0,
        vars: { ...baseVars },
        clicked: {},
        selected: false,
        pendingNext: false,
        latestFeedback: "从第一章开始。证据会自动进入右侧分级证据包。",
        evidence: [],
        logs: [],
        flags: {},
        wrongCombos: 0,
        ended: false
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || parsed.version !== 1) return null;
        return parsed;
      } catch {
        return null;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function clearSave() {
      localStorage.removeItem(STORAGE_KEY);
      state = initialState();
      render();
    }

    function currentScene() {
      return scenes[state.sceneIndex];
    }

    function addLog(message) {
      state.logs.unshift(message);
      state.logs = state.logs.slice(0, 10);
    }

    function addEvidence(item) {
      if (!item) return "";
      if (!state.evidence.some(x => x.id === item.id)) {
        state.evidence.push(item);
        return `${evidenceTypes[item.type] || "线索"}：${item.name}`;
      }
      return "";
    }

    function applyEffects(effects = {}) {
      const changes = [];
      for (const key of Object.keys(effects)) {
        const value = effects[key];
        state.vars[key] = (state.vars[key] || 0) + value;
        changes.push(`${variableNames[key] || key} ${value > 0 ? "+" : ""}${value}`);
      }
      return changes;
    }

    function formatEffects(effects = {}) {
      const keys = Object.keys(effects);
      if (!keys.length) return "无";
      return keys.map(key => `${variableNames[key] || key}${effects[key] > 0 ? "+" : ""}${effects[key]}`).join("；");
    }

    function sceneClickedCount(scene) {
      return scene.clickables.filter(item => state.clicked[item.id]).length;
    }

    function isSceneReady(scene) {
      if (scene.breakScene) return true;
      if (scene.combo) return state.selected;
      if (scene.choices.length) return state.selected;
      const count = sceneClickedCount(scene);
      const enough = count >= (scene.unlockAfter || Math.min(2, scene.clickables.length));
      const required = (scene.requiredEvidence || []).every(id => state.evidence.some(x => x.id === id));
      return enough && required;
    }

    function canChoose(scene) {
      if (scene.combo) return true;
      return sceneClickedCount(scene) >= (scene.unlockAfter || Math.min(2, scene.clickables.length)) || state.selected;
    }

    function render() {
      if (state.ended) {
        renderFinal();
      } else {
        renderScene();
      }
      renderSide();
      renderVars();
      saveState();
    }

    function renderScene() {
      const scene = currentScene();
      const clickedCount = sceneClickedCount(scene);
      const choicesOpen = canChoose(scene);
      const ready = isSceneReady(scene);
      const choiceHtml = scene.choices.length ? `
        <h3>${scene.combo ? "证物组合推理" : "玩家选择"}</h3>
        ${!choicesOpen ? `<p class="small">先调查至少 ${scene.unlockAfter || Math.min(2, scene.clickables.length)} 个可点击物，再做选择。</p>` : ""}
        ${scene.choices.map((choice, index) => `
          <button class="choice" ${!choicesOpen || state.selected ? "disabled" : ""} data-choice="${index}">
            <strong>${choice.label}. ${choice.text}</strong>
            <span class="small">变量：${formatEffects(choice.effects)}</span>
          </button>
        `).join("")}
      ` : "";
      const nextText = scene.next === "END" ? "查看第二章结算" : scene.breakScene ? "进入第二章" : "进入下一场景";

      document.getElementById("scenePanel").innerHTML = `
        <div class="scene-head">
          <div class="tag">${scene.no}</div>
          <div>
            <h2>${scene.title}</h2>
            <p class="small">${scene.chapter} · NodeID: ${scene.id}</p>
          </div>
        </div>
        <h3>画面描述</h3>
        <div class="description">${scene.description}</div>
        <h3>当前目标</h3>
        <p>${scene.goal}</p>
        ${scene.dialogue.length ? `<h3>NPC / 内心文本</h3><div class="dialogue">${scene.dialogue.map(line => `<p>${line}</p>`).join("")}</div>` : ""}
        ${scene.clickables.length ? `<h3>可点击物 <span class="small">已调查 ${clickedCount}/${scene.clickables.length}</span></h3>
          <div class="button-grid">
            ${scene.clickables.map(item => `<button ${state.clicked[item.id] ? "disabled" : ""} data-clickable="${item.id}">${item.name}</button>`).join("")}
          </div>` : ""}
        ${scene.requiredEvidence ? `<p class="small">本场景需要收纳关键线索：${scene.requiredEvidence.map(id => evidenceName(id)).join("、")}</p>` : ""}
        ${scene.breakScene ? renderChapterOneSummary() : ""}
        ${choiceHtml}
        <div class="feedback">${state.latestFeedback}</div>
        <div class="next-row">
          <button class="primary" id="nextBtn" ${ready ? "" : "disabled"}>${nextText}</button>
        </div>
      `;

      document.querySelectorAll("[data-clickable]").forEach(button => {
        button.addEventListener("click", () => handleClickable(button.dataset.clickable));
      });
      document.querySelectorAll("[data-choice]").forEach(button => {
        button.addEventListener("click", () => handleChoice(Number(button.dataset.choice)));
      });
      document.getElementById("nextBtn").addEventListener("click", goNext);
    }

    function renderChapterOneSummary() {
      const v = state.vars;
      let title = "谨慎调查型";
      let desc = "证据、信任和嫌疑较平衡，第二章更容易发现釉料粉末不是直接证据。";
      if (v.LuTrust >= 3) {
        title = "陆景川依赖型";
        desc = "陆景川会更主动带路，玩家更容易接受他对沈月娥的暗示。";
      } else if (v.OutsiderTrust >= 3 && v.SelfDoubt >= 2) {
        title = "文旅顺从型";
        desc = "行动阻力小，但更容易把周启明死亡理解成商业纠纷。";
      } else if (v.FatherClue >= 4 || v.EvidenceScore >= 5) {
        title = "旧案敏感型";
        desc = "更快怀疑账本与二十年前有关，但村庄沉默压力可能上升。";
      }
      return `<h3>第一章状态</h3><div class="status-card"><strong>${title}</strong><p>${desc}</p></div>`;
    }

    function evidenceName(id) {
      const found = state.evidence.find(x => x.id === id);
      if (found) return found.name;
      for (const scene of scenes) {
        const item = scene.clickables.find(x => x.evidence && x.evidence.id === id);
        if (item) return item.evidence.name;
      }
      return id;
    }

    function handleClickable(id) {
      const scene = currentScene();
      const item = scene.clickables.find(x => x.id === id);
      if (!item || state.clicked[id]) return;
      state.clicked[id] = true;
      const changes = applyEffects(item.effects);
      const evidenceLine = addEvidence(item.evidence);
      state.latestFeedback = [
        `<strong>${item.name}</strong>：${item.text}`,
        changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无",
        evidenceLine ? `收纳：${evidenceLine}` : "收纳：已记录或无新增线索"
      ].join("<br>");
      addLog(`${scene.no} 调查：${item.name}`);
      render();
    }

    function handleChoice(index) {
      const scene = currentScene();
      const choice = scene.choices[index];
      if (!choice || state.selected) return;
      state.selected = true;
      const changes = applyEffects(choice.effects);
      const evidenceLine = addEvidence(choice.evidence);
      if (choice.flag) state.flags[choice.flag] = true;
      if (choice.wrong) state.wrongCombos += 1;
      state.latestFeedback = [
        `<strong>${choice.label}. ${choice.text}</strong>`,
        changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无",
        evidenceLine ? `收纳：${evidenceLine}` : "收纳：无新增线索",
        choice.short ? `结果：${choice.short}` : ""
      ].filter(Boolean).join("<br>");
      addLog(`${scene.no} 选择：${choice.label}`);
      render();
    }

    function goNext() {
      const scene = currentScene();
      if (!isSceneReady(scene)) return;
      if (scene.next === "END") {
        state.ended = true;
        state.latestFeedback = "第二章结束。";
        render();
        return;
      }
      const nextIndex = scenes.findIndex(item => item.id === scene.next);
      if (nextIndex < 0) return;
      state.sceneIndex = nextIndex;
      state.selected = false;
      state.pendingNext = false;
      state.latestFeedback = scene.breakScene ? "第二章开始。第一章变量和证据包已继承。" : "进入下一场景。";
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderSide() {
      const current = state.ended ? scenes.length : state.sceneIndex + 1;
      const total = scenes.length;
      document.getElementById("progressFill").style.width = `${Math.round(current / total * 100)}%`;
      document.getElementById("progressText").textContent = state.ended ? "第二章已结束" : `${current}/${total} · ${currentScene().chapter} ${currentScene().title}`;

      document.getElementById("evidenceBox").innerHTML = Object.keys(evidenceTypes).map(type => {
        const items = state.evidence.filter(item => item.type === type);
        const open = type === "core" || type === "clue";
        return `
          <details class="evidence-group" ${open ? "open" : ""}>
            <summary>${evidenceTypes[type]}（${items.length}）</summary>
            ${items.length ? items.map(item => `
              <div class="evidence-item">
                <b>${item.name}</b>
                <p>${item.detail}</p>
              </div>
            `).join("") : `<div class="evidence-item"><p>暂无。</p></div>`}
          </details>
        `;
      }).join("");

      document.getElementById("focusList").innerHTML = getFocus().map(item => `<li>${item}</li>`).join("");
      document.getElementById("logList").innerHTML = state.logs.length
        ? state.logs.map(item => `<li>${item}</li>`).join("")
        : `<li class="small">暂无记录。</li>`;
    }

    function getFocus() {
      const focus = [];
      if (!state.flags.oldDebt) focus.push("周启明死亡是否与二十年前旧账有关？");
      if (!state.flags.glazeFrame) focus.push("釉料粉末是凶手证据，还是摆放出来的栽赃线？");
      if (state.vars.LuTrust >= 2) focus.push("陆景川提供便利，但他是否正在引导调查方向？");
      if (state.vars.ShenSuspicion >= 3) focus.push("沈月娥嫌疑偏高，注意区分异常反应和作案证据。");
      if (state.vars.FatherClue >= 3) focus.push("父亲旧调查正在指向尸检报告。");
      return focus.slice(0, 4);
    }

    function renderVars() {
      document.getElementById("varsGrid").innerHTML = Object.keys(variableNames).map(key => `
        <div><span>${variableNames[key]}</span><b>${state.vars[key]}</b></div>
      `).join("");
    }

    function renderFinal() {
      const ending = getEndingState();
      document.getElementById("scenePanel").innerHTML = `
        <div class="scene-head">
          <div class="tag">END</div>
          <div>
            <h2>第二章结束：账房尸体</h2>
            <p class="small">下一章：第三章 尸检报告</p>
          </div>
        </div>
        <div class="description">
          周启明死因与账本有关；沈月娥看似可疑，但粉末和茶杯有摆放感；陈伯远知道二十年前尸检报告有问题。
        </div>
        <h3>当前状态</h3>
        <div class="status-card">
          <strong>${ending.title}</strong>
          <p>${ending.desc}</p>
        </div>
        <h3>保留下来的核心问题</h3>
        <ul>
          <li>周启明的旧账到底压住了谁？</li>
          <li>沈月娥为什么沉默，而不是为自己辩解？</li>
          <li>陆景川为什么总能提前解释现场？</li>
          <li>陈伯远说“这次不像二十年前”，二十年前尸检报告写错了什么？</li>
        </ul>
        <div class="next-row"><button class="secondary" id="againBtn">重新开始</button></div>
      `;
      document.getElementById("againBtn").addEventListener("click", clearSave);
    }

    function getEndingState() {
      const v = state.vars;
      if (v.ShenSuspicion >= 5) {
        return { title: "状态一：沈月娥误判型", desc: "玩家开始被栽赃线带偏，B 结局风险上升。" };
      }
      if (state.flags.oldDebt && v.EvidenceScore >= 8) {
        return { title: "状态二：账本旧案型", desc: "玩家开始接近周启明旧案利益线，有利于 A / E。" };
      }
      if (state.flags.glazeFrame || v.LuTrust <= -2) {
        return { title: "状态三：陆景川疑点型", desc: "玩家较早怀疑陆景川，但复仇倒计时可能上升。" };
      }
      if (state.wrongCombos > 0 || v.SelfDoubt >= 3) {
        return { title: "状态四：现场迷失型", desc: "玩家获得碎片信息，但还没有形成可靠推理。" };
      }
      return { title: "状态四：现场迷失型", desc: "玩家暂时保留多种可能，第三章需要通过尸检报告重新校准。" };
    }

    document.getElementById("resetBtn").addEventListener("click", clearSave);
    render();
  </script>
