<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>《雾窑》第一章重制原型 · v0.3.3</title>
  <style>
    :root {
      --bg: #121313;
      --panel: #1d1f1f;
      --panel-2: #252827;
      --text: #f1eee6;
      --muted: #aaa399;
      --line: #3b3f3d;
      --accent: #d2a45f;
      --accent-2: #87b7a5;
      --danger: #c97062;
      --ok: #82b88b;
      --shadow: rgba(0, 0, 0, .35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
      padding-bottom: 104px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 22px;
      background: rgba(18, 19, 19, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: 20px; margin-bottom: 2px; }
    h2 { font-size: 24px; margin-bottom: 4px; }
    h3 { font-size: 15px; color: var(--accent); margin: 18px 0 8px; }
    ul { padding-left: 20px; }

    main {
      width: min(1380px, calc(100% - 32px));
      margin: 18px auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 300px 340px;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 32px var(--shadow);
      padding: 18px;
    }

    .scene-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }

    .tag {
      flex: 0 0 auto;
      padding: 4px 10px;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .small { color: var(--muted); font-size: 13px; }

    .header-stack {
      min-width: 0;
      flex: 1;
    }

    .header-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid rgba(255,255,255,.08);
      margin-top: 6px;
      padding-top: 6px;
    }

    .header-meta button {
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--accent);
      font-size: inherit;
      text-align: left;
    }

    .header-progress-wrap {
      margin-top: 8px;
      padding-top: 2px;
    }

    .header-progress-track {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      overflow: hidden;
      position: relative;
    }

    .header-progress-bar {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(212,168,90,.72), rgba(235,197,116,.98));
      box-shadow: 0 0 10px rgba(212,168,90,.28);
      transition: width .55s ease;
    }

    .header-progress-label {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
      text-align: right;
    }

    .description,
    .dialogue,
    .feedback,
    .status-card,
    .ending-box,
    .deduction-box {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .dialogue p { margin: 0 0 10px; }
    .dialogue p:last-child { margin-bottom: 0; }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .clickable-card {
      min-width: 0;
      display: grid;
      grid-template-rows: 58px 1fr;
      min-height: 202px;
    }

    .clickable-card button {
      width: 100%;
      min-height: 58px;
      overflow: hidden;
    }

    .clickable-card.is-clicked button {
      opacity: .82;
      border-color: rgba(210, 164, 95, .58);
      background: #262a28;
    }

    .item-hint {
      margin-top: 7px;
      padding: 9px 10px;
      border: 1px solid rgba(135, 183, 165, .28);
      border-left: 3px solid var(--accent-2);
      border-radius: 7px;
      background: rgba(32, 35, 34, .86);
      min-height: 136px;
      max-height: 136px;
      overflow: auto;
    }

    .item-hint b {
      display: block;
      color: var(--accent);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .item-hint p {
      margin: 0 0 6px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.58;
    }

    .item-hint .hint-meta {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #303331;
      color: var(--text);
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    button:hover:not(:disabled) {
      border-color: var(--accent);
      background: #3a3c39;
    }

    button:disabled {
      opacity: .48;
      cursor: not-allowed;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #191511;
      font-weight: 700;
      text-align: center;
    }

    button.secondary { text-align: center; }
    button.choice { display: block; width: 100%; margin: 8px 0; }
    button.choice strong { display: block; margin-bottom: 4px; }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .feedback {
      margin-top: 14px;
      min-height: 54px;
      border-left: 3px solid var(--accent-2);
    }

    .next-row {
      margin-top: 16px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .side {
      position: sticky;
      top: 92px;
      align-self: start;
      max-height: calc(100vh - 120px);
      overflow: auto;
    }

    .progress {
      height: 9px;
      background: #333734;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--accent);
    }

    .evidence-group {
      border: 1px solid var(--line);
      border-radius: 8px;
      margin: 10px 0;
      overflow: hidden;
    }

    .evidence-group summary {
      padding: 9px 10px;
      cursor: pointer;
      color: var(--accent);
      font-weight: 700;
    }

    .evidence-item {
      padding: 8px 10px;
      border-top: 1px solid var(--line);
    }

    .evidence-item b { display: block; }
    .evidence-item p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

    .evidence-stats {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .evidence-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .evidence-filter {
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 999px;
      text-align: center;
    }

    .evidence-filter.is-active {
      border-color: var(--accent);
      color: #181511;
      background: var(--accent);
      font-weight: 700;
    }

    .evidence-pool {
      display: grid;
      gap: 8px;
    }

    .evidence-card {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      background: rgba(255,255,255,.035);
      padding: 9px 10px;
    }

    .evidence-card summary {
      cursor: pointer;
      list-style: none;
    }

    .evidence-card summary::-webkit-details-marker { display: none; }

    .evidence-type {
      display: inline-block;
      font-size: 11px;
      color: var(--muted);
      margin-right: 6px;
    }

    .evidence-name {
      font-weight: 700;
    }

    .evidence-brief,
    .evidence-detail {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .right-stack {
      position: sticky;
      top: 92px;
      align-self: start;
      display: grid;
      gap: 16px;
      max-height: calc(100vh - 120px);
      overflow: auto;
    }

    .deduction-panel,
    .record-panel {
      min-width: 0;
    }

    .deduction-panel {
      max-height: 42vh;
      overflow: auto;
    }

    .record-panel {
      max-height: 38vh;
      overflow: auto;
    }

    .deduction-stage {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .deduction-list {
      display: grid;
      gap: 10px;
    }

    .deduction-card {
      border-left: 2px solid rgba(210, 164, 95, .55);
      padding: 9px 0 9px 12px;
      color: #d8d0c3;
      font-size: 14px;
      line-height: 1.7;
    }

    .deduction-locked {
      margin-top: 12px;
      padding: 10px;
      border: 1px dashed rgba(255,255,255,.18);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .record-item {
      width: 100%;
      margin-bottom: 8px;
      padding: 8px 9px;
      border-radius: 8px;
      background: rgba(255,255,255,.035);
      font-size: 12px;
    }

    .record-item strong { display: block; color: var(--text); font-size: 12px; }

    .record-item span {
      display: block;
      color: var(--muted);
      line-height: 1.4;
      margin-top: 2px;
    }

    .review-banner {
      border: 1px solid rgba(135, 183, 165, .32);
      border-left: 3px solid var(--accent-2);
      background: rgba(135, 183, 165, .08);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .review-banner button { padding: 7px 10px; }

    .log-list {
      max-height: 180px;
      overflow: auto;
    }

    .vars-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      background: rgba(18, 19, 19, .96);
      border-top: 1px solid var(--line);
      padding: 10px 14px;
      backdrop-filter: blur(10px);
    }

    .vars-grid {
      width: min(1200px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(8, minmax(88px, 1fr));
      gap: 8px;
    }

    .var-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 8px;
      min-width: 0;
      position: relative;
    }

    .var-card span { display: block; color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .var-card b { font-size: 20px; }

    .var-card:hover::after {
      content: attr(data-hint);
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      z-index: 20;
      width: 230px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #252827;
      color: var(--text);
      font-size: 12px;
      line-height: 1.5;
      box-shadow: 0 12px 24px var(--shadow);
      white-space: normal;
    }

    .intro-panel {
      min-height: 520px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      cursor: pointer;
    }

    .intro-kicker {
      color: var(--accent);
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .intro-text {
      font-size: 24px;
      line-height: 1.75;
      white-space: pre-line;
    }

    .intro-hint {
      margin-top: 28px;
      color: var(--muted);
      font-size: 13px;
    }

    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
    }

    .hub-card {
      min-height: 132px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .summary-list li { margin-bottom: 9px; }

    textarea {
      width: 100%;
      min-height: 210px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #171918;
      color: var(--text);
      padding: 12px;
      font: inherit;
      line-height: 1.6;
    }

    .version-footer { display: none; }

    .version-badge {
      position: fixed;
      right: 18px;
      bottom: 126px;
      z-index: 5;
      color: rgba(241,238,230,.32);
      font-size: 12px;
      letter-spacing: .08em;
      pointer-events: none;
      user-select: none;
    }

    .version-badge::before {
      content: "测试版本 ";
    }

    .start-screen {
      min-height: 100vh;
      background: #000;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    .start-card {
      text-align: center;
      max-width: 520px;
    }

    .start-title {
      font-size: 46px;
      letter-spacing: .28em;
      margin-bottom: 18px;
    }

    .start-subtitle {
      color: var(--muted);
      margin-bottom: 34px;
    }

    .start-button {
      text-align: center;
      padding: 14px 28px;
      border-radius: 999px;
      border-color: rgba(255,255,255,.58);
      background: rgba(255,255,255,.06);
    }

    .start-button:hover {
      background: rgba(255,255,255,.12);
      border-color: rgba(255,255,255,.82);
    }

    .start-note {
      margin-top: 20px;
      color: rgba(241,238,230,.45);
      font-size: 13px;
    }

    body.is-start-screen {
      background: #000;
      padding-bottom: 0;
    }

    body.is-start-screen main {
      display: block;
      width: 100%;
      margin: 0;
    }

    body.is-start-screen #scenePanel {
      border: none;
      box-shadow: none;
      padding: 0;
      background: #000;
    }

    body.is-start-screen .evidence-side,
    body.is-start-screen .right-stack,
    body.is-start-screen header,
    body.is-start-screen .vars-bar,
    body.is-start-screen .version-footer,
    body.is-start-screen .version-badge {
      display: none;
    }

    body.is-start-screen .header-progress-wrap {
      display: none;
    }

    body.is-page-hidden header,
    body.is-page-hidden main,
    body.is-page-hidden .version-badge,
    body.is-page-hidden .vars-bar {
      opacity: 0;
    }

    body.is-page-revealing header,
    body.is-page-revealing main,
    body.is-page-revealing .version-badge,
    body.is-page-revealing .vars-bar {
      opacity: 1;
      transition: opacity .9s ease;
    }

    .particle-transition {
      position: fixed;
      inset: 0;
      z-index: 9990;
      pointer-events: none;
      background: rgba(0,0,0,0);
      opacity: 0;
      transition: opacity .25s ease;
    }

    .particle-transition.active {
      opacity: 1;
      background: #000;
    }

    #particleCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .esc-hint {
      position: fixed;
      top: 18px;
      right: 22px;
      z-index: 9999;
      color: rgba(255,255,255,.72);
      border: 1px solid rgba(255,255,255,.28);
      background: rgba(0,0,0,.38);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      letter-spacing: .12em;
      pointer-events: none;
      opacity: 0;
      transition: opacity .8s ease;
    }

    .esc-hint.show { opacity: 1; }
    .esc-hint.fade { opacity: 0; }

    body.is-cinematic {
      background: #050505;
    }

    body.is-cinematic main {
      display: block;
      width: min(980px, calc(100% - 28px));
    }

    body.is-cinematic .evidence-side,
    body.is-cinematic .right-stack,
    body.is-cinematic .thought-panel {
      display: none;
    }

    body.is-cinematic .vars-bar {
      opacity: .18;
      transform: translateY(70%);
      transition: .3s ease;
    }

    body.is-cinematic .version-badge {
      right: 18px;
      opacity: .18;
    }

    body.is-cinematic .vars-bar:hover {
      opacity: 1;
      transform: translateY(0);
    }

    .cinematic-page {
      min-height: calc(100vh - 120px);
      background: #050505;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 0;
      overflow: hidden;
      box-shadow: 0 20px 80px rgba(0,0,0,.55);
    }

    .cinematic-inner {
      max-width: 820px;
      margin: 0 auto;
      padding: 56px 28px 44px;
    }

    .cinematic-kicker {
      color: rgba(255,255,255,.62);
      font-size: 13px;
      letter-spacing: .18em;
      margin-bottom: 18px;
    }

    .cinematic-title {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .cinematic-subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 34px;
    }

    .cinematic-story {
      font-size: 19px;
      line-height: 2;
      white-space: pre-line;
      color: #f4f0e8;
      margin-bottom: 28px;
    }

    .cinematic-dialogue {
      border-left: 2px solid rgba(255,255,255,.38);
      padding-left: 16px;
      color: #d8d0c3;
      font-size: 16px;
      line-height: 1.9;
      white-space: pre-line;
      margin: 24px 0;
    }

    .cinematic-options {
      margin-top: 32px;
      display: grid;
      gap: 12px;
    }

    .cinematic-option {
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 12px;
      padding: 16px 18px;
      color: #f1eee6;
    }

    .cinematic-option:hover:not(:disabled) {
      background: rgba(255,255,255,.09);
      border-color: rgba(255,255,255,.58);
    }

    .cinematic-result {
      margin-top: 34px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.16);
    }

    .cinematic-player-line {
      color: rgba(255,255,255,.9);
      margin-bottom: 14px;
    }

    .cinematic-npc-reaction {
      white-space: pre-line;
      font-size: 17px;
      line-height: 1.9;
    }

    .read-level-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,.32);
      color: rgba(255,255,255,.72);
      border-radius: 999px;
      font-size: 13px;
    }

    .cinematic-unlocked {
      margin-top: 34px;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,.12);
    }

    .cinematic-video-slot {
      display: none;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      margin-bottom: 28px;
      border-radius: 12px;
      overflow: hidden;
    }

    .cinematic-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 8000;
      background: rgba(0,0,0,.56);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .chapter-modal {
      width: min(760px, calc(100% - 32px));
      max-height: 82vh;
      overflow: auto;
      background: rgba(10,10,10,.94);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 28px 90px rgba(0,0,0,.65);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 14px;
    }

    .modal-group {
      border-top: 1px solid rgba(255,255,255,.08);
      padding-top: 12px;
      margin-top: 14px;
    }

    .directory-item {
      width: 100%;
      margin: 6px 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      text-align: left;
    }

    .directory-item span:last-child {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    body.modal-open #scenePanel,
    body.modal-open header,
    body.modal-open .vars-bar,
    body.modal-open .evidence-side,
    body.modal-open .right-stack,
    body.modal-open .thought-panel {
      filter: blur(5px);
    }

    @media (max-width: 920px) {
      main {
        width: min(100% - 28px, 720px);
        grid-template-columns: 1fr;
      }
      .side, .right-stack, .thought-panel, .evidence-side {
        position: static;
        max-height: none;
        overflow: visible;
      }
      .deduction-panel,
      .record-panel {
        max-height: none;
      }
      .version-badge {
        right: 14px;
        bottom: 226px;
      }
      .header-progress-track { height: 5px; }
      .header-progress-label { font-size: 11px; }
      .vars-grid { grid-template-columns: repeat(2, 1fr); }
      body { padding-bottom: 230px; }
    }
  </style>
</head>
<body>
  <header>

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || parsed.version !== 1) return null;
        parsed.characterReads = { ...initialCharacterReads(), ...(parsed.characterReads || {}) };
        parsed.viewMode = "play";
        parsed.reviewSceneId = null;
        parsed.evidenceFilter = parsed.evidenceFilter || "default";
        parsed.reachedSceneIds = Array.isArray(parsed.reachedSceneIds) ? parsed.reachedSceneIds : inferReachedScenes(parsed);
        parsed.logs = Array.isArray(parsed.logs) ? parsed.logs : [];
        return parsed;
      } catch {
        return null;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

    function clearSave() {
      localStorage.removeItem(STORAGE_KEY);
      state = initialState();
      render();

      return sceneById[activeSceneId()] || sceneById[state.sceneId];

    function sceneLabel(sceneId = state.sceneId) {
      if (sceneId === "CH1_HUB_FREE_EXPLORE") return { no: "1-3", title: "晚饭后的青瓷庄" };
      const scene = sceneById[sceneId] || {};
      return { no: scene.no || "", title: scene.title || "未知节点" };

    function addLog(entry) {
      const label = sceneLabel(state.sceneId);
      const item = typeof entry === "string"
        ? {
            id: `log_${Date.now()}_${Math.random().toString(16).slice(2)}`,
            sceneId: state.sceneId,
            sceneTitle: label.title,
            sceneNo: label.no,
            message: entry,
            createdAt: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }),
            type: "note"
          }
        : {
            id: entry.id || `log_${Date.now()}_${Math.random().toString(16).slice(2)}`,
            sceneId: entry.sceneId || state.sceneId,
            sceneTitle: entry.sceneTitle || label.title,
            sceneNo: entry.sceneNo || label.no,
            message: entry.message || "",
            createdAt: entry.createdAt || new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }),
            type: entry.type || "note"
          };
      state.logs.unshift(item);
      state.logs = state.logs.slice(0, 18);
    }

    function normalizeLog(log, index = 0) {
      if (typeof log === "string") {
        return { id: `legacy_${index}`, sceneId: null, sceneTitle: "", sceneNo: "", message: log, createdAt: "", type: "legacy" };
      }
      return log;
    }

    function inferReachedScenes(saved) {
      const reached = new Set(["CH1_ROAD"]);
      if (saved.mode === "game" || saved.ended || saved.sceneId !== "CH1_ROAD") reached.add("CH1_HALL");
      if (saved.sceneId) reached.add(saved.sceneId);
      Object.keys(saved.selectedByScene || {}).forEach(id => reached.add(id));
      people.forEach(person => {
        if (saved.flags?.[person.key]) reached.add(person.sceneId);
      });
      if (saved.visitCount >= MAX_VISITS || ["CH1_HUB_FREE_EXPLORE", "CH1_RETURN_HALL", "CH1_ROOM_REFLECT", "CH1_BLACKOUT"].includes(saved.sceneId) || saved.ended) {
        reached.add("CH1_HUB_FREE_EXPLORE");
      }
      if (["CH1_RETURN_HALL", "CH1_ROOM_REFLECT", "CH1_BLACKOUT"].includes(saved.sceneId) || saved.ended) reached.add("CH1_RETURN_HALL");
      if (["CH1_ROOM_REFLECT", "CH1_BLACKOUT"].includes(saved.sceneId) || saved.ended) reached.add("CH1_ROOM_REFLECT");
      if (saved.sceneId === "CH1_BLACKOUT" || saved.ended) reached.add("CH1_BLACKOUT");
      return [...reached];
    }

    function markSceneReached(sceneId) {
      if (!sceneId) return;
      if (!Array.isArray(state.reachedSceneIds)) state.reachedSceneIds = [];
      if (!state.reachedSceneIds.includes(sceneId)) state.reachedSceneIds.push(sceneId);
    }

    function isSceneReached(sceneId) {
      return state.sceneId === sceneId || (state.reachedSceneIds || []).includes(sceneId);
    }

    function scrollToTop() {
      try {

    function addEvidence(item) {
      if (!item) return "";
      if (!state.evidence.some(existing => existing.id === item.id)) {
        state.evidence.push(item);
        return `${evidenceTypes[item.type] || "线索"}已加入证据池`;
      }
      return "";
    }

    function collectEvidence(source = {}) {
      const items = [];
      if (source.evidence) items.push(source.evidence);
      if (Array.isArray(source.evidenceList)) items.push(...source.evidenceList);
      return items.map(addEvidence).filter(Boolean).join("；");
    }

    function applyEffects(effects = {}) {
      const changes = [];
      Object.keys(effects).forEach(key => {
        const value = effects[key];
        state.vars[key] = (state.vars[key] || 0) + value;
        changes.push(`${variableNames[key] || key} ${value > 0 ? "+" : ""}${value}`);
      });
      return changes;
    }

    function formatEffects(effects = {}) {
      const keys = Object.keys(effects);
      if (!keys.length) return "无";
      return keys.map(key => `${variableNames[key] || key}${effects[key] > 0 ? "+" : ""}${effects[key]}`).join("；");
    }

      const scene = currentScene();

      else {

    async function enterImmersiveStart() {
      hasStartedSession = true;
      updateBodyMode();
      try {
        const el = document.documentElement;
        if (el.requestFullscreen) await el.requestFullscreen();
        else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
      } catch (error) {
        console.warn("Fullscreen request failed:", error);
      }

      showEscHint();
      startWhiteParticleTransition(() => {
        render();
        scrollToTop();
        fadeEscHint(2600);
      });

    function showEscHint() {
      const el = document.getElementById("escHint");
      if (!el) return;
      el.classList.add("show");
      el.classList.remove("fade");
    }

    function fadeEscHint(delay = 1600) {
      const el = document.getElementById("escHint");
      if (!el) return;
      window.setTimeout(() => {
        el.classList.add("fade");
        el.classList.remove("show");
      }, delay);
    }

    function handleFullscreenChange() {
      const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
      if (!isFullscreen) {
        const el = document.getElementById("escHint");
        if (el) {
          el.classList.remove("show");
          el.classList.add("fade");
        }
      }
    }

    function startWhiteParticleTransition(callback) {
      const layer = document.getElementById("particleTransition");
      const canvas = document.getElementById("particleCanvas");
      if (!layer || !canvas || !canvas.getContext) {
        callback();
        return;
      }

      if (transitionTimer) clearTimeout(transitionTimer);
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      document.body.classList.add("is-page-hidden");
      document.body.classList.remove("is-page-revealing");

      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      const width = window.innerWidth;
      const height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const duration = 2700;
      const switchAt = 1250;
      const isMobile = width < 768;
      const count = isMobile
        ? 180 + Math.floor(Math.random() * 80)
        : 420 + Math.floor(Math.random() * 140);
      const centerX = width * .5;
      const centerY = height * .52;
      const particles = Array.from({ length: count }, () => {
        const angle = Math.random() * Math.PI * 2;
        const radius = 20 + Math.random() * 110;
        const speed = .12 + Math.random() * .38;
        let x = centerX + (Math.random() - .5) * width * .42;
        let y = centerY + (Math.random() - .5) * height * .42;
        if (Math.random() < .25) {
          x = Math.random() * width;
          y = Math.random() * height;
        }
        return {
          x: x + Math.cos(angle) * radius * .12,
          y: y + Math.sin(angle) * radius * .08,
          vx: Math.cos(angle) * speed + (Math.random() - .5) * .08,
          vy: Math.sin(angle) * speed * .32 - Math.random() * .08,
          size: .9 + Math.random() * 2.2,
          alpha: .32 + Math.random() * .48,
          life: 0,
          maxLife: duration * (.72 + Math.random() * .28)
        };
      });

      let callbackCalled = false;
      const startedAt = performance.now();
      layer.classList.add("active");

      function frame(now) {
        const elapsed = now - startedAt;
        ctx.clearRect(0, 0, width, height);
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        particles.forEach(particle => {
          particle.life += 16;
          particle.x += particle.vx;
          particle.y += particle.vy;
          particle.vx += (Math.random() - .5) * .004;
          particle.vy += (Math.random() - .5) * .004;
          particle.vx *= .995;
          particle.vy += .003;
          const progress = Math.min(1, particle.life / particle.maxLife);
          const alpha = particle.alpha * (1 - progress);
          if (alpha <= 0) return;
          ctx.beginPath();
          ctx.fillStyle = `rgba(255,255,255,${alpha})`;
          ctx.shadowColor = "rgba(255,255,255,.45)";
          ctx.shadowBlur = 8;
          ctx.arc(particle.x, particle.y, particle.size * (1 - progress * .35), 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.restore();

        if (!callbackCalled && elapsed >= switchAt) {
          callbackCalled = true;
          callback();
          requestAnimationFrame(() => {
            document.body.classList.add("is-page-revealing");
            document.body.classList.remove("is-page-hidden");
          });
        }

        if (elapsed < duration) {
          animationFrameId = requestAnimationFrame(frame);
        } else {
          if (!callbackCalled) {
            callback();
            requestAnimationFrame(() => {
              document.body.classList.add("is-page-revealing");
              document.body.classList.remove("is-page-hidden");
            });
          }
          layer.classList.remove("active");
          transitionTimer = window.setTimeout(() => {
            ctx.clearRect(0, 0, width, height);
            document.body.classList.remove("is-page-revealing");
          }, 900);
        }
      }

      animationFrameId = requestAnimationFrame(frame);
    }

    function renderHeaderMeta() {

    function getProgressInfo() {

        CH1_EXP_LUHUAI_MIN: 4,

        CH1_BLACKOUT: 7

      const current = state.mode === "intro" ? 1 : state.ended ? 8 : (indexMap[state.sceneId] || 1);

        <div class="feedback">${review ? "这是回溯查看，不会改变林知夏当前判断。" : state.latestFeedback}</div>
        <div class="next-row">
          ${review ? "" : scene.next ? `<button class="primary" id="nextBtn" ${ready ? "" : "disabled"}>${nextText}</button>` : ""}
        </div>
      `;

      document.querySelectorAll("[data-clickable]").forEach(button => {
        button.addEventListener("click", () => handleClickable(button.dataset.clickable));
      });
      document.querySelectorAll("[data-choice]").forEach(button => {
        button.addEventListener("click", () => handleChoice(Number(button.dataset.choice)));
      });
      const nextBtn = document.getElementById("nextBtn");
      if (nextBtn) nextBtn.addEventListener("click", goNext);
    }

    function renderChoices(scene, selected, readOnly = false) {
      return `
        <h3>${scene.id === "CH1_HALL" ? "晚饭后先去找谁" : "玩家选择"}</h3>
        ${scene.choices.map((choice, index) => `
          <button class="choice" ${readOnly || selected !== undefined ? "disabled" : ""} data-choice="${index}">
            <strong>${choice.label}. ${choice.text}</strong>
            <span class="small">变量：${formatEffects(choice.effects || {})}</span>
          </button>
        `).join("")}
      `;
    }

    function renderClickableCard(item, readOnly = false) {
      const clicked = Boolean(state.clicked[item.id]);
      const meta = [
        `变量：${formatEffects(item.effects || {})}`,
        item.evidence || item.evidenceList ? "记录：已加入证据池" : "记录：无新增证据"
      ];
      return `
        <div class="clickable-card ${clicked ? "is-clicked" : ""}">
          <button ${readOnly || clicked ? "disabled" : ""} data-clickable="${item.id}">${item.label}</button>
          ${clicked ? `
            <div class="item-hint">
              <b>观察</b>
              <p>${item.text}</p>
              ${meta.map(line => `<span class="hint-meta">${line}</span>`).join("")}
            </div>
          ` : ""}
        </div>
      `;
    }

    function renderCinematicScene(scene) {
      const review = state.viewMode === "review";
      const selectedIndex = state.selectedByScene[scene.id];
      const selected = selectedIndex !== undefined ? scene.choices[selectedIndex] : null;
      const story = scene.videoSrc
        ? `<div class="cinematic-video-slot" style="display:block"><video class="cinematic-video" src="${scene.videoSrc}" controls playsinline></video></div>`
        : `<div class="cinematic-story">${scene.introText || scene.description}</div>`;
      const openingLine = scene.openingLine || (scene.dialogue || []).join("\n");

      document.getElementById("scenePanel").innerHTML = `
        ${review ? renderReviewBanner() : ""}
        <div class="cinematic-page">
          <div class="cinematic-inner">
            <div class="cinematic-kicker">人物支线 · 晚饭后的青瓷庄</div>
            <h2 class="cinematic-title">${scene.title}</h2>
            <div class="cinematic-subtitle">你正在单独接触：${scene.personName || "未知人物"} · NodeID: ${scene.id}</div>
            ${story}
            ${openingLine ? `<div class="cinematic-dialogue">${openingLine}</div>` : ""}
            <div class="cinematic-options">
              ${(scene.choices || []).map((choice, index) => `
                <button class="cinematic-option" ${review || selectedIndex !== undefined ? "disabled" : ""} data-cinematic-choice="${index}">
                  <strong>${choice.label}. ${choice.text}</strong>
                  <span class="small">变量：${formatEffects(choice.effects || {})}</span>
                </button>
              `).join("")}
            </div>
            ${selected ? renderCinematicResult(scene, selected) : ""}
            ${selected ? `
              <div class="cinematic-unlocked">
                <h3>可观察细节</h3>
                ${renderObservationGrid(scene, review)}
                ${review ? "" : `<div class="next-row"><button class="primary" id="returnHubBtn">回到晚饭后的青瓷庄</button></div>`}
              </div>
            ` : ""}
          </div>
        </div>
      `;

      document.querySelectorAll("[data-cinematic-choice]").forEach(button => {
        button.addEventListener("click", () => handleCinematicChoice(Number(button.dataset.cinematicChoice)));
      });
      document.querySelectorAll("[data-clickable]").forEach(button => {
        button.addEventListener("click", () => handleClickable(button.dataset.clickable));
      });
      const returnBtn = document.getElementById("returnHubBtn");
      if (returnBtn) returnBtn.addEventListener("click", returnFromCinematicScene);
    }

    function renderCinematicResult(scene, choice) {
      const evidenceNames = [];
      if (choice.evidence) evidenceNames.push(choice.evidence.name);
      if (Array.isArray(choice.evidenceList)) evidenceNames.push(...choice.evidenceList.map(item => item.name));
      return `
        <div class="cinematic-result">
          <div class="cinematic-player-line">林知夏：“${choice.text}”</div>
          <div class="cinematic-npc-reaction">${choice.npcReaction || "对方没有立刻回答。"}</div>
          ${choice.readLevel ? `<div class="read-level-badge">人物理解：${readLabels[choice.readLevel]}</div>` : ""}
          <p class="small">变量变化：${formatEffects(choice.effects || {})}</p>
          <p class="small">获得：${evidenceNames.length ? evidenceNames.join("、") : "无新增线索"}</p>
          ${scene.readKey ? `<p class="small">林知夏判断：${getUnderstanding(scene.readKey)}</p>` : ""}
        </div>
      `;
    }

    function renderObservationGrid(scene, readOnly = false) {
      if (!scene.clickables || !scene.clickables.length) return `<p class="small">暂无可观察细节。</p>`;
      return `<div class="button-grid">${scene.clickables.map(item => renderClickableCard(item, readOnly)).join("")}</div>`;
    }

    function handleCinematicChoice(index) {
      if (state.viewMode === "review") return;
      const scene = currentScene();
      const choice = scene.choices[index];
      if (!choice || state.selectedByScene[scene.id] !== undefined) return;

      state.selectedByScene[scene.id] = index;
      const changes = applyEffects(choice.effects);
      const evidenceLine = collectEvidence(choice);
      if (choice.flag) state.flags[choice.flag] = true;
      if (scene.readKey && choice.readLevel) state.characterReads[scene.readKey] = choice.readLevel;

      state.latestFeedback = [
        `<strong>${choice.label}. ${choice.text}</strong>`,
        choice.npcReaction ? `NPC反应：${choice.npcReaction}` : "",
        changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无",
        evidenceLine ? `记录：${evidenceLine}` : "记录：无新增线索",
        scene.readKey && choice.readLevel ? `人物理解层级：${readLabels[choice.readLevel]}` : "",
        scene.personKey ? `人物理解：${getUnderstanding(scene.personKey)}` : ""
      ].filter(Boolean).join("<br>");
      addLog({ message: `对话：${scene.personName} / ${choice.label}`, type: "choice" });
      render();
      scrollToTop();
    }

    function returnFromCinematicScene() {
      if (state.viewMode === "review") return;
      const scene = currentScene();
      if (scene.personKey && !state.flags[scene.personKey]) {
        state.flags[scene.personKey] = true;
        state.visitCount += 1;
      }
      state.sceneId = "CH1_HUB_FREE_EXPLORE";
      markSceneReached(state.sceneId);
      state.latestFeedback = "回到晚饭后的自由行动。已拜访人物不能重复拜访。";
      addLog({ message: `回到自由行动：已接触${scene.personName}`, type: "move" });
      render();
      scrollToTop();
    }

    function enterCharacterScene(sceneId) {
      if (state.viewMode === "review") return;
      showEscHint();
      startWhiteParticleTransition(() => {
        state.sceneId = sceneId;
        markSceneReached(sceneId);
        state.latestFeedback = "进入人物支线。";
        addLog({ message: `进入人物支线：${sceneLabel(sceneId).title}`, sceneId, sceneTitle: sceneLabel(sceneId).title, sceneNo: sceneLabel(sceneId).no, type: "move" });
        render();
        scrollToTop();
        fadeEscHint(2400);
      });
    }

    function handleClickable(id) {
      if (state.viewMode === "review") return;
      const scene = currentScene();
      const item = (scene.clickables || []).find(entry => entry.id === id);
      if (!item || state.clicked[id]) return;
      state.clicked[id] = true;
      const changes = applyEffects(item.effects);
      const evidenceLine = collectEvidence(item);
      state.latestFeedback = [
        `<strong>已观察：${item.label}</strong>`,
        "观察内容已显示在对应物件下方。",
        changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无",
        evidenceLine ? `记录：${evidenceLine}` : "记录：已记录或无新增线索"
      ].join("<br>");
      addLog({ message: `观察了：${item.label}`, type: "observe" });
      render();
    }

    function handleChoice(index) {
      if (state.viewMode === "review") return;
      const scene = currentScene();
      const choice = scene.choices[index];
      if (!choice || state.selectedByScene[scene.id] !== undefined) return;

      if (choice.immediateNext) {
        state.selectedByScene[scene.id] = index;
        state.latestFeedback = `晚饭后前往：${choice.text.replace(/^.*去/, "去")}`;
        addLog({ message: `前往人物探索：${choice.text}`, type: "move" });
        if (sceneById[choice.immediateNext]?.personKey) {
          enterCharacterScene(choice.immediateNext);
        } else {
          state.sceneId = choice.immediateNext;
          markSceneReached(state.sceneId);
          render();
          scrollToTop();
        }
        return;
      }

      state.selectedByScene[scene.id] = index;
      const changes = applyEffects(choice.effects);
      const evidenceLine = collectEvidence(choice);
      if (choice.flag) state.flags[choice.flag] = true;
      if (scene.readKey && choice.readLevel) {
        state.characterReads[scene.readKey] = choice.readLevel;
      }
      if (choice.understanding) {
        state.flags[`${scene.personKey}Understanding`] = choice.understanding;
      }
      if (scene.personKey && !state.flags[scene.personKey]) {
        state.flags[scene.personKey] = true;
        state.visitCount += 1;
      }
      if (choice.route) {
        state.route = { name: choice.route, desc: choice.routeDesc };
        state.ended = true;
      }
      state.latestFeedback = [
        `<strong>${choice.label}. ${choice.text}</strong>`,
        choice.npcReaction ? `NPC反应：${choice.npcReaction}` : "",
        changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无",
        evidenceLine ? `记录：${evidenceLine}` : "记录：无新增线索",
        scene.readKey && choice.readLevel ? `人物理解层级：${readLabels[choice.readLevel]}` : "",
        scene.personKey ? `人物理解：${getUnderstanding(scene.personKey)}` : "",
        choice.short ? `结果：${choice.short}` : ""
      ].filter(Boolean).join("<br>");
      addLog({ message: `选择：${choice.label}. ${choice.text}`, type: "choice" });
      render();
      scrollToTop();
    }

    function goNext() {
      if (state.viewMode === "review") return;
      const scene = currentScene();
      if (scene.personKey) {
        state.sceneId = "CH1_HUB_FREE_EXPLORE";
      } else if (scene.next) {
        state.sceneId = scene.next;
      }
      state.latestFeedback = scene.personKey ? "回到晚饭后的自由行动。已拜访人物不能重复拜访。" : "进入下一场景。";
      markSceneReached(state.sceneId);
      render();
      scrollToTop();
    }

    function renderHub() {
      const review = state.viewMode === "review";
      const canReturn = state.visitCount >= MAX_VISITS;
      document.getElementById("scenePanel").innerHTML = `
        ${review ? renderReviewBanner() : ""}
        <div class="scene-head">
          <div class="tag">1-3</div>
          <div>
            <h2>晚饭后的青瓷庄</h2>
            <p class="small">第一章 · NodeID: CH1_HUB_FREE_EXPLORE</p>
          </div>
        </div>
        <h3>画面描述</h3>
        <div class="description">晚饭散后，青瓷庄没有真正安静。祠堂门口有钥匙声，偏厅里有白色应急灯，老宅走廊漏水，旧窑棚外有人还没回屋，院门雨棚下陆景川正在收伞。林知夏可以先选择靠近谁，但雨夜不会等她把每个人都问完。</div>
        <h3>自由行动规则</h3>
        <p>最多拜访 ${MAX_VISITS} 名人物。已拜访 ${state.visitCount}/${MAX_VISITS}。拜访过的人物不能重复拜访。</p>
        <div class="hub-grid">
          ${people.map(person => renderHubPerson(person, review)).join("")}
        </div>
        <div class="feedback">${review ? "这是回溯查看，不会改变林知夏当前判断。" : state.latestFeedback}</div>
        <div class="next-row">
          ${review ? "" : canReturn ? `<button class="primary" id="returnHallBtn">回到堂屋</button>` : `<button class="primary" disabled>拜访满 ${MAX_VISITS} 人后回到堂屋</button>`}
        </div>
      `;
      document.querySelectorAll("[data-explore]").forEach(button => {
        button.addEventListener("click", () => {
          enterCharacterScene(button.dataset.explore);
        });
      });
      const returnBtn = document.getElementById("returnHallBtn");
      if (returnBtn) {
        returnBtn.addEventListener("click", () => {
          state.sceneId = "CH1_RETURN_HALL";
          markSceneReached(state.sceneId);
          state.latestFeedback = "回到堂屋，整理刚才拜访过的人物印象。";
          render();
          scrollToTop();
        });
      }
    }

    function renderHubPerson(person, readOnly = false) {
      const visited = Boolean(state.flags[person.key]);
      const locked = state.visitCount >= MAX_VISITS && !visited;
      const level = getReadLevel(person);
      return `
        <button class="hub-card" ${readOnly || visited || locked ? "disabled" : ""} data-explore="${person.sceneId}" data-place="${person.place}">
          <strong>${visited ? "已拜访：" : ""}${person.name}</strong>
          <span class="small">${person.place} · ${readLabels[level]}</span>
          <span>${visited ? getUnderstanding(person.key) : locked ? "本轮拜访名额已满" : "前往观察"}</span>
        </button>
      `;
    }

    function renderReturnSummary() {
      const visited = people.filter(person => state.flags[person.key]);
      const unvisited = people.filter(person => !state.flags[person.key]);
      return `
        <h3>人物理解总结</h3>
        <div class="status-card">
          <ul class="summary-list">
            ${visited.map(person => `<li><strong>${person.name}</strong>（${readLabels[getReadLevel(person)]}）：${getUnderstanding(person.key)}</li>`).join("")}
            ${unvisited.length ? `<li>还有人没有真正开口：${unvisited.map(person => person.name).join("、")}。</li>` : ""}
          </ul>
        </div>
      `;
    }

    function renderRoomReflection() {
      const lines = [];
      if (state.flags.visitedChenBoyuan) lines.push("陈伯远看见父亲笔记时，像看见一件没烧干净的证物。");
      if (state.flags.visitedShenYuee) lines.push("沈月娥说死人不需要好结局。那她需要的是什么？");
      if (state.flags.visitedZhouQiming) lines.push("周启明说游客不想看死人，可他藏起来的合同比死人更怕见光。");
      if (state.flags.observedLuJingchuan) lines.push("陆景川帮了她太多次，太多次本身就是一种异常。");
      if (state.flags.visitedLuHuaiMin) lines.push("陆怀民把钥匙收进袖口时，像把整座村子的入口也收了进去。");
      return lines.length ? `<h3>内心整理</h3><div class="dialogue">${lines.map(line => `<p>内心：“${line}”</p>`).join("")}</div>` : "";
    }

    function personFromKey(keyOrPerson) {
      if (typeof keyOrPerson === "object") return keyOrPerson;
      return people.find(person => person.key === keyOrPerson || person.readKey === keyOrPerson);
    }

    function getReadLevel(keyOrPerson) {
      const person = personFromKey(keyOrPerson);
      if (!person) return "unknown";
      return (state.characterReads && state.characterReads[person.readKey]) || "unknown";
    }

    function getUnderstanding(keyOrPerson) {
      const person = personFromKey(keyOrPerson);
      if (!person) return "这个人还没有真正开口。";
      const level = getReadLevel(person);
      return readSummaries[person.readKey]?.[level] || "这个人还没有真正开口。";
    }

    function sceneClickedCount(scene) {
      return (scene.clickables || []).filter(item => state.clicked[item.id]).length;
    }

    function visitedPeople() {
      return people.filter(person => state.flags[person.key]);
    }

    function unvisitedPeople() {
      return people.filter(person => !state.flags[person.key]);
    }

    function renderEnding() {
      const route = state.route || { name: "未选择", desc: "尚未形成第二章入口路线。" };
      const coreCount = state.evidence.filter(item => item.type === "core").length;
      const clueCount = state.evidence.filter(item => item.type === "clue").length;
      const obsCount = state.evidence.filter(item => item.type === "obs").length;
      const riskCount = state.evidence.filter(item => item.type === "risk").length;
      const flags = Object.keys(state.flags).filter(key => state.flags[key] === true);
      document.getElementById("scenePanel").innerHTML = `
        <div class="scene-head">
          <div class="tag">结束</div>
          <div>
            <h2>第一章 v0.3.3 结束</h2>
            <p class="small">第二章入口预告，不开发第二章正文</p>
          </div>
        </div>
        <div class="ending-box">
          <h3>当前第二章入口路线</h3>
          <p><strong>${route.name}</strong></p>
          <p>${route.desc}</p>

          <h3>已访问人物</h3>
          <p>${visitedPeople().map(person => person.name).join("、") || "暂无"}</p>

          <h3>未访问人物</h3>
          <p>${unvisitedPeople().map(person => person.name).join("、") || "无"}</p>

          <h3>当前人物理解总结</h3>
          <ul class="summary-list">
            ${people.map(person => `<li><strong>${person.name}</strong>（${readLabels[getReadLevel(person)]}）：${getUnderstanding(person.key)}</li>`).join("")}
            ${unvisitedPeople().length ? `<li>还有人没有真正开口。</li>` : ""}
          </ul>

          <h3>证据池数量</h3>
          <p>关键证物 ${coreCount} · 重要线索 ${clueCount} · 观察记录 ${obsCount} · 待验证/误导 ${riskCount}</p>

          <h3>已触发 flags</h3>
          <p>${flags.join("、") || "暂无"}</p>

          <h3>测试反馈文本框</h3>
          <textarea>${feedbackTemplate()}</textarea>
        </div>
      `;
    }

    function feedbackTemplate() {
      return `《雾窑》v0.3.3 第一章测试反馈
我拜访的人物：${visitedPeople().map(person => person.name).join("、")}
我对每个人物的理解：
陆怀民：${readLabels[getReadLevel("LuHuaiMin")]}，${getUnderstanding("LuHuaiMin")}
周启明：${readLabels[getReadLevel("ZhouQiming")]}，${getUnderstanding("ZhouQiming")}
陈伯远：${readLabels[getReadLevel("ChenBoyuan")]}，${getUnderstanding("ChenBoyuan")}
沈月娥：${readLabels[getReadLevel("ShenYuee")]}，${getUnderstanding("ShenYuee")}
陆景川：${readLabels[getReadLevel("LuJingchuan")]}，${getUnderstanding("LuJingchuan")}
我最怀疑的人：
我最想继续了解的人：
我觉得最像活人的角色：
我觉得最 NPC 的角色：
哪个对话最像真人：
哪个对话最像 NPC：
哪个人物我还想多问一句：
哪个人物我暂时误会了：
我看不懂的地方：
我选择的第二章入口路线：${state.route ? state.route.name : ""}`;
    }

    function renderEvidencePool() {
      const box = document.getElementById("evidenceBox");
      if (!box) return;
      const counts = Object.fromEntries(Object.keys(evidenceTypes).map(type => [type, state.evidence.filter(item => item.type === type).length]));
      const active = state.evidenceFilter || "default";
      const filters = [
        ["default", "默认"],
        ["all", "全部"],
        ["core", "关键证物"],
        ["clue", "重要线索"],
        ["obs", "观察记录"],
        ["risk", "待验证"]
      ];
      const visible = state.evidence.filter(item => {
        if (active === "default") return item.type === "core" || item.type === "clue";
        if (active === "all") return true;
        return item.type === active;
      });
      box.innerHTML = `
        <div class="evidence-stats">关键证物 ${counts.core || 0} · 重要线索 ${counts.clue || 0} · 观察记录 ${counts.obs || 0} · 待验证 ${counts.risk || 0}</div>
        <div class="evidence-filter-row">
          ${filters.map(([key, label]) => `<button class="evidence-filter ${active === key ? "is-active" : ""}" data-evidence-filter="${key}">${label}</button>`).join("")}
        </div>
        <div class="evidence-pool">
          ${visible.length ? visible.map(item => `
            <details class="evidence-card">
              <summary>
                <span class="evidence-type">${evidenceTypes[item.type] || "线索"}</span>
                <span class="evidence-name">${item.name}</span>
                <div class="evidence-brief">${briefEvidence(item.detail)}</div>
              </summary>
              <div class="evidence-detail">${item.detail}</div>
            </details>
          `).join("") : `<p class="small">暂无。</p>`}
        </div>
      `;
      document.querySelectorAll("[data-evidence-filter]").forEach(button => {
        button.addEventListener("click", () => {
          state.evidenceFilter = button.dataset.evidenceFilter;
          render();
        });
      });
    }

    function briefEvidence(detail = "") {
      return detail.length > 34 ? `${detail.slice(0, 34)}…` : detail;
    }

    function renderThoughtPanel() {
      const box = document.getElementById("thoughtBox");
      if (!box) return;
      const thoughts = generateLinThoughts();
      box.innerHTML = `
        <div class="deduction-stage">当前阶段：林知夏的判断</div>
        <div class="deduction-list">${thoughts.map(text => `<div class="deduction-card">${text}</div>`).join("")}</div>
        <div class="deduction-locked">玩家推理功能将在后续章节开放。</div>
      `;
    }

    function generateLinThoughts() {
      const weighted = [
        [1, "我来到这里，是为了写故事。但青瓷庄给我的每一句话，都像被人提前改过。"]
      ];
      if (state.vars.FatherClue > 0) weighted.push([6 + state.vars.FatherClue, "父亲当年问过这里。问题没有留下，只有缺页留下了。"]);
      if (state.vars.EvidenceScore >= 2) weighted.push([7 + state.vars.EvidenceScore, "旧窑、祠堂、项目资料缺页开始互相靠近。它们不像三件事。"]);
      if (state.vars.ShenSuspicion >= 2) weighted.push([8, "沈月娥太像嫌疑人了。正因为太像，我反而不能立刻相信。"]);
      if (state.vars.ShenSuspicion <= -1) weighted.push([8, "沈月娥守着旧物，不像在毁证，更像在等有人看懂。"]);
      if (state.vars.LuTrust >= 2) weighted.push([7, "陆景川太好用了。有人一直替我带路，我就会少看见路本身。"]);
      if (state.vars.LuTrust <= -1) weighted.push([8, "陆景川的帮助里有边界。他似乎更在乎我不要走错地方。"]);
      if (state.vars.VillageSilence >= 2) weighted.push([8, "我问得越直接，青瓷庄越安静。安静本身就是回答。"]);
      if (["crack", "defensive"].includes(getReadLevel("LuHuaiMin"))) weighted.push([9, "陆怀民守的不是祠堂，是名字。"]);
      if (["crack", "defensive"].includes(getReadLevel("ZhouQiming"))) weighted.push([9, "周启明怕的不是文旅失败，是账被人翻到火以前。"]);
      if (["crack", "defensive"].includes(getReadLevel("ChenBoyuan"))) weighted.push([9, "陈伯远没否认父亲问对了。尸检报告可能不是纸，是封口。"]);
      if (["crack", "defensive"].includes(getReadLevel("ShenYuee"))) weighted.push([9, "何青山这个名字，让沈月娥的沉默裂了一下。"]);
      if (["crack", "defensive"].includes(getReadLevel("LuJingchuan"))) weighted.push([9, "陆景川观察我，也观察所有人。他不像一个项目接待。"]);
      return weighted.sort((a, b) => b[0] - a[0]).slice(0, 5).map(item => item[1]);
    }

    function renderRecordRail() {
      const box = document.getElementById("logList");
      if (!box) return;
      const logs = (state.logs || []).map(normalizeLog);
      box.innerHTML = logs.length
        ? logs.map((log, index) => `
          <button class="record-item" ${log.sceneId ? "" : "disabled"} data-log-index="${index}">
            <strong>${log.sceneNo || "记录"} ${log.sceneTitle || ""}</strong>
            <span>${log.message}</span>
            <span>${log.createdAt || ""}</span>
          </button>
        `).join("")
        : `<p class="small">暂无记录。</p>`;
      document.querySelectorAll("[data-log-index]").forEach(button => {
        button.addEventListener("click", () => openLogReview(logs[Number(button.dataset.logIndex)]));
      });
    }

    function renderReviewBanner() {
      return `
        <div class="review-banner">
          <div><strong>回溯查看</strong> · 不会改变当前进度、变量和证据。</div>
          <button class="secondary" id="returnPlayBtn">返回当前进度</button>
        </div>
      `;
    }

    function openLogReview(log) {
      if (!log || !log.sceneId) return;
      openSceneReview(log.sceneId);
    }

    function openSceneReview(sceneId) {
      if (!sceneId || !isSceneReached(sceneId)) return;
      state.viewMode = "review";
      state.reviewSceneId = sceneId;
      closeDirectoryModal();
      render();
      scrollToTop();
    }

    function returnToPlay() {
      state.viewMode = "play";
      state.reviewSceneId = null;
      render();
      scrollToTop();
    }

    function renderChapterDirectoryModal() {
      const groups = [
        ["前情", [{ label: "前情提示", sceneId: null, status: state.mode === "intro" ? "当前" : "已到达" }]],
        ["主线节点", [
          { label: "1-1 山路入村", sceneId: "CH1_ROAD" },
          { label: "1-2 老宅堂屋：所有人首次同框", sceneId: "CH1_HALL" },
          { label: "1-3 晚饭后的青瓷庄 / 自由行动", sceneId: "CH1_HUB_FREE_EXPLORE" },
          { label: "1-4 返回堂屋：整理人物印象", sceneId: "CH1_RETURN_HALL" },
          { label: "1-5 林知夏房间：整理父亲笔记", sceneId: "CH1_ROOM_REFLECT" },
          { label: "1-6 夜晚停电：第二章入口预告", sceneId: "CH1_BLACKOUT" }
        ]],
        ["人物支线", people.map(person => ({ label: `${person.place}：${person.name}`, sceneId: person.sceneId, person }))],
        ["结尾", [{ label: "第一章结尾总结", sceneId: null, status: state.ended ? "当前" : "未到达" }]]
      ];
      document.getElementById("directoryContent").innerHTML = groups.map(([title, items]) => `
        <div class="modal-group">
          <h3>${title}</h3>
          ${items.map(item => renderDirectoryItem(item)).join("")}
        </div>
      `).join("");
      document.querySelectorAll("[data-directory-scene]").forEach(button => {
        button.addEventListener("click", () => openSceneReview(button.dataset.directoryScene));
      });
    }

    function renderDirectoryItem(item) {
      const reached = item.sceneId ? isSceneReached(item.sceneId) : item.status === "已到达" || item.status === "当前";
      const current = item.sceneId && activeSceneId() === item.sceneId && state.viewMode !== "review";
      const visited = item.person ? Boolean(state.flags[item.person.key]) : false;
      const status = item.status || (current ? "当前" : item.person ? (visited ? "已拜访" : reached ? "已到达" : "未拜访") : reached ? "已到达" : "未到达");
      return `
        <button class="directory-item" ${item.sceneId && reached ? "" : "disabled"} ${item.sceneId ? `data-directory-scene="${item.sceneId}"` : ""}>
          <span>${item.label}</span>
          <span>${status}</span>
        </button>
      `;
    }

    function openDirectoryModal() {
      renderChapterDirectoryModal();
      document.body.classList.add("modal-open");
      const backdrop = document.getElementById("modalBackdrop");
      backdrop.classList.add("show");
      backdrop.setAttribute("aria-hidden", "false");
    }

    function closeDirectoryModal() {
      document.body.classList.remove("modal-open");
      const backdrop = document.getElementById("modalBackdrop");
      if (!backdrop) return;
      backdrop.classList.remove("show");
      backdrop.setAttribute("aria-hidden", "true");
    }

    function bindReviewControls() {
      const btn = document.getElementById("returnPlayBtn");
      if (btn) btn.addEventListener("click", returnToPlay);
    }

    function renderVars() {
      document.getElementById("varsGrid").innerHTML = Object.keys(variableNames).map(key => `
        <div class="var-card" data-hint="${variableHints[key] || ""}" title="${variableHints[key] || ""}">
          <span>${variableNames[key]}</span>
          <b>${state.vars[key]}</b>
        </div>
      `).join("");
    }

    document.getElementById("resetBtn").addEventListener("click", clearSave);
    document.getElementById("directoryBtn").addEventListener("click", openDirectoryModal);
    document.getElementById("closeModalBtn").addEventListener("click", closeDirectoryModal);
    document.getElementById("modalBackdrop").addEventListener("click", event => {
      if (event.target.id === "modalBackdrop") closeDirectoryModal();
    });
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeDirectoryModal();
    });
    document.addEventListener("fullscreenchange", handleFullscreenChange);
    document.addEventListener("webkitfullscreenchange", handleFullscreenChange);
    render();
  </script>
</body>
</html>
