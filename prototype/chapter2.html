<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>《雾窑》第二章：账房尸体 互动试玩原型</title>
  <style>
    :root {
      --bg: #121313;
      --panel: #1d1f1f;
      --panel-2: #252827;
      --text: #f1eee6;
      --muted: #aaa399;
      --line: #3b3f3d;
      --accent: #d2a45f;
      --accent-2: #87b7a5;
      --danger: #c97062;
      --ok: #82b88b;
      --shadow: rgba(0, 0, 0, .35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
      padding-bottom: 104px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 22px;
      background: rgba(18, 19, 19, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: 20px; margin-bottom: 2px; }
    h2 { font-size: 24px; margin-bottom: 4px; }
    h3 { font-size: 15px; color: var(--accent); margin: 18px 0 8px; }

    main {
      width: min(1180px, calc(100% - 28px));
      margin: 18px auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 32px var(--shadow);
      padding: 18px;
    }

    .scene-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }

    .tag {
      flex: 0 0 auto;
      padding: 4px 10px;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
    }

    .description,
    .dialogue,
    .feedback,
    .entry-card,
    .combo-result {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #303331;
      color: var(--text);
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    button:hover:not(:disabled) {
      border-color: var(--accent);
      background: #3a3c39;
    }

    button:disabled {
      opacity: .48;
      cursor: not-allowed;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #191511;
      font-weight: 700;
      text-align: center;
    }

    button.secondary {
      text-align: center;
    }

    button.choice {
      display: block;
      width: 100%;
      margin: 8px 0;
    }

    button.choice strong,
    button.entry-card strong {
      display: block;
      margin-bottom: 4px;
    }

    .feedback {
      margin-top: 14px;
      min-height: 54px;
      border-left: 3px solid var(--accent-2);
    }

    .next-row {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .side {
      position: sticky;
      top: 74px;
      align-self: start;
    }

    ul { padding-left: 20px; }

    .log-list,
    .inventory-list,
    .npc-list {
      max-height: 260px;
      overflow: auto;
    }

    .vars-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      background: rgba(18, 19, 19, .96);
      border-top: 1px solid var(--line);
      padding: 10px 14px;
      backdrop-filter: blur(10px);
    }

    .vars-grid {
      width: min(1180px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(8, minmax(88px, 1fr));
      gap: 8px;
    }

    .vars-grid div {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 8px;
      min-width: 0;
    }

    .vars-grid span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .vars-grid b {
      font-size: 18px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 9px;
      color: var(--muted);
      font-size: 12px;
    }

    .good { color: var(--ok); }
    .bad { color: var(--danger); }

    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .side { position: static; }
      .vars-grid { grid-template-columns: repeat(2, 1fr); }
      body { padding-bottom: 230px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>《雾窑》第二章：账房尸体</h1>
      <div class="small">纯文本互动试玩原型 · 验证命案调查、误导和证物组合</div>
    </div>
    <button class="secondary" id="restartBtn">重新开始</button>
  </header>

  <main>
    <section class="panel" id="scenePanel"></section>
    <aside class="panel side">
      <h3>当前入口状态</h3>
      <p id="entryStateText" class="small">未选择</p>
      <h3>出场 NPC</h3>
      <ul class="npc-list" id="npcList"></ul>
      <h3>证物 / 线索入库</h3>
      <ul class="inventory-list" id="inventoryList"></ul>
      <h3>调查记录</h3>
      <ul class="log-list" id="logList"></ul>
    </aside>
  </main>

  <div class="vars-bar">
    <div class="vars-grid" id="varsGrid"></div>
  </div>

  <script>

    const entryStates = [

      {

        description: "老宅灯灭后只剩雨声。堂屋里几束手电光打在湿墙上，光斑被人影切碎。远处偏厅传来一声闷响，像旧木柜倒下，又像有人撞到了账桌。",
        goal: "确认异响来源，决定是否跟随陆景川、留住众人、追问陈伯远或观察沈月娥。",
        npcs: [

          { id: "CH2_S01_CUP_GAP_CLICK", name: "堂屋青瓷杯空位", text: "六只青瓷杯的位置和第一章不完全一致，其中一只杯口沾了灰。", item: "CLUE_CH2_CUP_POSITION_SHIFT：堂屋青瓷杯位置变化" },
          { id: "CH2_S01_POWER_BOX_CLICK", name: "停电配电箱", text: "配电箱外壳潮湿，但锁扣没有被撬开。停电可能不是简单跳闸。", item: "OBS_CH2_POWER_BOX_UNBROKEN：配电箱未被撬" },
          { id: "CH2_S01_CHEN_MEDKIT_CLICK", name: "陈伯远药箱扣带", text: "陈伯远的药箱扣带是开的，他像刚拿过什么，又立刻合上。", item: "CLUE_CH2_CHEN_MEDKIT_OPEN：陈伯远药箱异常" },

        choices: [

      {

    let state;

    function initialState() {
      return {

        sceneIndex: 0,
        vars: { ...baseVars },
        clicked: {},

        pendingNext: false,
        latestFeedback: "请选择第一章结尾状态，开始第二章。",
        inventory: [],
        logs: [],
        flags: {},
        wrongCombos: 0
      };
    }

    function addLog(message) {
      state.logs.unshift(message);
      state.logs = state.logs.slice(0, 10);
    }

    function addInventory(item) {
      if (!item || item === "无") return;
      const parts = item.split("；").map(x => x.trim()).filter(Boolean);
      for (const part of parts) {
        if (!state.inventory.includes(part)) state.inventory.push(part);
      }
    }

    function applyEffects(effects = {}) {
      const changes = [];
      for (const key of Object.keys(effects)) {
        const value = effects[key];
        state.vars[key] = (state.vars[key] || 0) + value;
        changes.push(`${variableNames[key] || key} ${value > 0 ? "+" : ""}${value}`);
      }
      return changes;
    }

    function currentScene() {
      return scenes[state.sceneIndex];
    }

    function formatEffects(effects = {}) {
      const keys = Object.keys(effects);
      if (!keys.length) return "无";
      return keys.map(key => `${variableNames[key] || key}${effects[key] > 0 ? "+" : ""}${effects[key]}`).join("；");
    }

    function render() {
      if (!state.started) {
        renderEntry();
      } else {
        renderScene();
      }
      renderSide();
      renderVars();
    }

          `).join("")}

            <p class="small">NodeID: ${scene.id}_START</p>
          </div>
        </div>
        <h3>画面描述</h3>
        <div class="description">${scene.description}</div>
        <h3>玩家初始目标</h3>
        <p>${scene.goal}</p>
        <h3>可点击物 <span class="small">已调查 ${clickedCount}/${scene.clickables.length}</span></h3>
        ${scene.clickables.length ? `
          <div class="button-grid">
            ${scene.clickables.map(item => `<button ${state.clicked[item.id] ? "disabled" : ""} data-clickable="${item.id}">${item.name}</button>`).join("")}
          </div>
        ` : `<p class="small">本场景没有点击物，请进行证物组合。</p>`}
        ${scene.requiredClickIds ? `<p class="small">进入下一步需要调查：${scene.requiredClickIds.map(labelForClickable).join("、")}；且至少调查 ${scene.requiredClicks} 个物件。</p>` : ""}
        ${scene.requiredClicks && !scene.requiredClickIds ? `<p class="small">进入结算前至少调查 ${scene.requiredClicks} 个物件。</p>` : ""}
        <h3>NPC 对话</h3>
        <div class="dialogue">${scene.dialogue.map(line => `<p>${line}</p>`).join("")}</div>
        ${hasChoices ? `
          <h3>${scene.combo ? "证物组合推理" : "玩家可选台词"}</h3>
          ${!canChoose ? `<p class="small">至少调查 3 个可点击物后开放选择。</p>` : ""}
          <div>
            ${scene.choices.map(choice => `
              <button class="choice" ${!canChoose || state.selected ? "disabled" : ""} data-choice="${choice.id}">
                <strong>${choice.label}. ${choice.text}</strong>
                <span class="small">变量：${formatEffects(choice.effects)}</span>
              </button>
            `).join("")}
          </div>
        ` : ""}
        <div class="feedback">${state.latestFeedback}</div>
        <div class="next-row">
          ${state.pendingNext ? `<button class="primary" id="nextBtn">${nextLabel}</button>` : ""}
          ${!hasChoices && !state.pendingNext ? `<button class="primary" id="advanceBtn" ${readyToAdvance ? "" : "disabled"}>${nextLabel}</button>` : ""}
        </div>
      `;

      document.querySelectorAll("[data-clickable]").forEach(button => {
        button.addEventListener("click", () => handleClickable(button.dataset.clickable));
      });
      document.querySelectorAll("[data-choice]").forEach(button => {
        button.addEventListener("click", () => handleChoice(button.dataset.choice));
      });
      const nextBtn = document.getElementById("nextBtn");
      if (nextBtn) nextBtn.addEventListener("click", goNext);
      const advanceBtn = document.getElementById("advanceBtn");
      if (advanceBtn) advanceBtn.addEventListener("click", goNext);
    }

    function renderSide() {
      const scene = state.started ? currentScene() : null;
      document.getElementById("entryStateText").textContent = state.entryState ? state.entryState.title : "未选择";
      document.getElementById("npcList").innerHTML = scene
        ? scene.npcs.map(x => `<li>${x}</li>`).join("")
        : `<li class="small">选择入口状态后显示。</li>`;
      document.getElementById("inventoryList").innerHTML = state.inventory.length
        ? state.inventory.map(x => `<li>${x}</li>`).join("")
        : `<li class="small">暂无证物。</li>`;
      document.getElementById("logList").innerHTML = state.logs.length
        ? state.logs.map(x => `<li>${x}</li>`).join("")
        : `<li class="small">暂无记录。</li>`;
    }

    function renderVars() {
      document.getElementById("varsGrid").innerHTML = Object.keys(state.vars).map(key => `
        <div><span>${variableNames[key]}</span><b>${state.vars[key]}</b></div>
      `).join("");
    }

    function startWithEntry(id) {
      const entry = entryStates.find(item => item.id === id);
      if (!entry) return;
      state.entryState = entry;
      state.started = true;
      const changes = applyEffects(entry.effects);
      state.latestFeedback = `入口状态：${entry.title}<br>变量变化：${changes.join("；")}<br>${entry.desc}`;
      addLog(`入口状态：${entry.title}`);
      render();
    }

    function labelForClickable(id) {
      for (const scene of scenes) {
        const item = scene.clickables.find(x => x.id === id);
        if (item) return item.name;
      }
      return id;
    }

    function isSceneReady(scene) {
      const clickedCount = scene.clickables.filter(item => state.clicked[item.id]).length;
      const requiredCount = scene.requiredClicks || 0;
      const hasCount = clickedCount >= requiredCount;
      const hasRequired = (scene.requiredClickIds || []).every(id => state.clicked[id]);
      return hasCount && hasRequired;
    }

    function handleClickable(id) {
      const scene = currentScene();
      const item = scene.clickables.find(x => x.id === id);
      if (!item || state.clicked[id]) return;
      state.clicked[id] = true;
      const changes = applyEffects(item.effects);
      addInventory(item.item);
      const parts = [`<strong>${item.name}</strong>：${item.text}`];
      parts.push(changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无");
      parts.push(item.item ? `入库：${item.item}` : "入库：无");
      state.latestFeedback = parts.join("<br>");
      addLog(`${scene.no} 调查：${item.name}`);
      render();
    }

    function handleChoice(id) {
      const scene = currentScene();
      const choice = scene.choices.find(x => x.id === id);
      if (!choice || state.selected) return;
      state.selected = true;
      state.pendingNext = true;
      const changes = applyEffects(choice.effects);
      addInventory(choice.item);
      if (choice.flag) state.flags[choice.flag] = true;
      if (choice.type === "wrong") state.wrongCombos += 1;
      const resultLine = choice.result ? `推理结果：${choice.result}` : "";
      state.latestFeedback = [
        `<strong>${choice.label}. ${choice.text}</strong>`,
        changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无",
        choice.item ? `入库：${choice.item}` : "入库：无",
        resultLine,
        choice.short ? `短期后果：${choice.short}` : "",
        choice.long ? `长期埋点：${choice.long}` : "",
        `下一节点：${scene.next || "CH3_S01_START"}`
      ].filter(Boolean).join("<br>");
      addLog(`${scene.no} ${scene.combo ? "组合" : "选择"}：${choice.label}`);
      render();
    }

    function goNext() {
      const scene = currentScene();
      if (!scene.next) {
        showEnding();
        return;
      }
      const nextIndex = scenes.findIndex(item => item.id === scene.next);
      state.sceneIndex = nextIndex;
      state.selected = false;
      state.pendingNext = false;
      state.latestFeedback = scene.jumpText;
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function hasInventory(id) {
      return state.inventory.some(item => item.includes(id));
    }

    function showEnding() {
      const scene = currentScene();
      const ending = getEndingState();
      const panel = document.getElementById("scenePanel");
      panel.innerHTML = `
        <div class="scene-head">
          <div class="tag">END</div>
          <div>
            <h2>第二章结束：账房尸体</h2>
            <p class="small">下一节点：CH3_S01_START 尸检报告</p>
          </div>
        </div>
        <div class="description">${scene.jumpText}</div>
        <h3>第二章状态</h3>
        <p><strong>${ending.title}</strong></p>
        <p>${ending.desc}</p>
        <h3>本章留下的三个钩子</h3>
        <ul>
          <li>周启明死因与账本有关，不只是文旅项目纠纷。</li>
          <li>沈月娥看似可疑，但釉料粉末、茶杯、窗台和脚印都有摆放感。</li>
          <li>陈伯远知道二十年前尸检报告有问题，第三章进入尸检线。</li>
        </ul>
        <div class="next-row"><button class="secondary" id="restartEndBtn">重新开始</button></div>
      `;
      document.getElementById("restartEndBtn").addEventListener("click", restart);
      renderSide();
      renderVars();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function getEndingState() {
      const v = state.vars;
      if (v.ShenSuspicion >= 4) {
        return {
          title: "状态一：沈月娥误判型",
          desc: "玩家开始被陆景川栽赃线带偏，B 结局风险上升。第三章需要更多尸检和现场证据来纠偏。"
        };
      }
      if (state.flags.oldDebt && v.EvidenceScore >= 6) {
        return {
          title: "状态二：账本旧案型",
          desc: "玩家开始接近周启明旧案利益线，账本、汇款单和短信草稿已经形成有效关联，有利于 A / E。"
        };
      }
      if (v.LuTrust <= -2 || state.flags.glazeFrame) {
        return {
          title: "状态三：陆景川疑点型",
          desc: "玩家较早怀疑陆景川的知识来源和现场引导，但复仇倒计时可能上升。"
        };
      }
      if (state.wrongCombos > 0 || v.SelfDoubt >= 2) {
        return {
          title: "状态四：现场迷失型",
          desc: "玩家获得一些碎片信息，但没有形成可靠推理，第三章提示减少。"
        };
      }
      return {
        title: "状态四：现场迷失型",
        desc: "玩家暂时保留了多种可能，但关键组合不足，第三章需要通过尸检报告重新校准方向。"
      };
    }

    function restart() {
      state = initialState();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    document.getElementById("restartBtn").addEventListener("click", restart);
    restart();
  </script>
</body>
</html>
