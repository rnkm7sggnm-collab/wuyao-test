<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>《雾窑》完整六章试玩原型 · 测试版本：v0.2.1</title>
  <style>
    :root {
      --bg: #121313;
      --panel: #1d1f1f;
      --panel-2: #252827;
      --text: #f1eee6;
      --muted: #aaa399;
      --line: #3b3f3d;
      --accent: #d2a45f;
      --accent-2: #87b7a5;
      --danger: #c97062;
      --ok: #82b88b;
      --shadow: rgba(0, 0, 0, .35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.65;
      padding-bottom: 104px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 14px 22px;
      background: rgba(18, 19, 19, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: 20px; margin-bottom: 2px; }
    h2 { font-size: 24px; margin-bottom: 4px; }
    h3 { font-size: 15px; color: var(--accent); margin: 18px 0 8px; }
    ul { padding-left: 20px; }

    main {
      width: min(1200px, calc(100% - 28px));
      margin: 18px auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 16px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 12px 32px var(--shadow);
      padding: 18px;
    }

    .scene-head {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
      margin-bottom: 14px;
    }

    .tag {
      flex: 0 0 auto;
      padding: 4px 10px;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }

    .scene-nav-trigger {
      background: transparent;
      min-width: 42px;
      text-align: center;
      cursor: pointer;
    }

    .scene-nav-trigger:hover {
      background: #2b2d2c;
      border-color: var(--accent-2);
    }

    .small { color: var(--muted); font-size: 13px; }

    .description,
    .dialogue,
    .feedback,
    .status-card {
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      align-items: stretch;
    }

    .clickable-card {
      min-width: 0;
      display: grid;
      grid-template-rows: 58px 1fr;
      min-height: 202px;
    }

    .clickable-card button {
      width: 100%;
      min-height: 58px;
      overflow: hidden;
    }

    .clickable-card.is-clicked button {
      opacity: .82;
      border-color: rgba(210, 164, 95, .58);
      background: #262a28;
    }

    .item-hint {
      margin-top: 7px;
      padding: 9px 10px;
      border: 1px solid rgba(135, 183, 165, .28);
      border-left: 3px solid var(--accent-2);
      border-radius: 7px;
      background: rgba(32, 35, 34, .86);
      min-height: 136px;
      max-height: 136px;
      overflow: auto;
    }

    .item-hint b {
      display: block;
      color: var(--accent);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .item-hint p {
      margin: 0 0 6px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.58;
    }

    .item-hint .hint-meta {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #303331;
      color: var(--text);
      padding: 10px 12px;
      text-align: left;
      cursor: pointer;
      font: inherit;
    }

    button:hover:not(:disabled) {
      border-color: var(--accent);
      background: #3a3c39;
    }

    button:disabled {
      opacity: .48;
      cursor: not-allowed;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #191511;
      font-weight: 700;
      text-align: center;
    }

    button.secondary { text-align: center; }
    button.choice { display: block; width: 100%; margin: 8px 0; }
    button.choice strong { display: block; margin-bottom: 4px; }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .feedback {
      margin-top: 14px;
      min-height: 54px;
      border-left: 3px solid var(--accent-2);
    }

    .review-panel,
    .deduction-box {
      background: #202322;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      margin: 12px 0;
    }

    .review-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .review-grid button {
      font-size: 13px;
      padding: 8px 10px;
    }

    .review-detail {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .deduction-box ul {
      margin: 8px 0 0;
      padding-left: 18px;
    }

    .next-row {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .side {
      position: sticky;
      top: 74px;
      align-self: start;
      max-height: calc(100vh - 94px);
      overflow: auto;
    }

    .progress {
      height: 8px;
      background: #303331;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0;
      background: var(--accent);
    }

    .evidence-group {
      border: 1px solid var(--line);
      border-radius: 8px;
      margin: 8px 0;
      background: #202322;
      overflow: hidden;
    }

    .evidence-group summary {
      padding: 9px 10px;
      cursor: pointer;
      color: var(--accent);
      font-weight: 700;
    }

    .evidence-item {
      padding: 8px 10px;
      border-top: 1px solid var(--line);
    }

    .evidence-item b { display: block; }
    .evidence-item p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

    .log-list {
      max-height: 180px;
      overflow: auto;
    }

    .vars-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      background: rgba(18, 19, 19, .96);
      border-top: 1px solid var(--line);
      padding: 10px 14px;
      backdrop-filter: blur(10px);
    }

    .version-footer {
      width: min(1200px, calc(100% - 28px));
      margin: 0 auto 118px;
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .vars-grid {
      width: min(1200px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(8, minmax(88px, 1fr));
      gap: 8px;
    }

    .vars-grid div {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 7px 8px;
      min-width: 0;
      position: relative;
    }

    .vars-grid .var-card:hover::after {
      content: attr(data-hint);
      position: absolute;
      left: 0;
      bottom: calc(100% + 8px);
      width: min(260px, 80vw);
      background: #2a2d2b;
      border: 1px solid var(--accent);
      color: var(--text);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.5;
      box-shadow: 0 8px 24px var(--shadow);
      z-index: 8;
      pointer-events: none;
    }

    .vars-grid span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .vars-grid b { font-size: 18px; }
    .good { color: var(--ok); }
    .bad { color: var(--danger); }


    .intro-panel {
      min-height: 62vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }

    .intro-kicker {
      color: var(--accent);
      letter-spacing: .18em;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .intro-text {
      font-size: 22px;
      line-height: 1.9;
      max-width: 760px;
      white-space: pre-line;
    }

    .intro-hint {
      margin-top: 28px;
      color: var(--muted);
      font-size: 13px;
    }

    .public-clues li {
      margin-bottom: 8px;
    }

    .ghost-line {
      color: var(--muted);
      font-size: 13px;
      margin-top: 10px;
    }

    @media (max-width: 920px) {
      main { grid-template-columns: 1fr; }
      .side { position: static; max-height: none; }
      .vars-grid { grid-template-columns: repeat(2, 1fr); }
      body { padding-bottom: 230px; }
    }
  </style>

    function applyNarrativePolish() {
      scenes.forEach(scene => {
        const polish = scenePolish[scene.id];
        if (polish) {
          scene.description = polish.description || scene.description;
          scene.dialogue = polish.dialogue || scene.dialogue;
        }
        (scene.clickables || []).forEach(item => {
          if (clickableSurfaceNames[item.id]) item.surfaceName = clickableSurfaceNames[item.id];
          item.surfaceText = clickableSurfaceTexts[item.id] || item.text;
        });
      });
    }

    applyNarrativePolish();

    let state = loadState() || initialState();

    function initialState() {
      return {
        version: 4,
        mode: "intro",
        introIndex: 0,
        chapterIntroIndex: 0,
        sceneIndex: 0,
        vars: { ...baseVars },
        clicked: {},
        selected: false,
        pendingNext: false,
        latestFeedback: "从第一章开始。证据会自动进入右侧分级证据包。",
        evidence: [],
        logs: [],
        flags: {},
        analytics: {},
        wrongCombos: 0,
        reviewOpen: false,
        reviewSceneId: null,
        ended: false
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || parsed.version !== 4) return null;
        if (typeof parsed.latestFeedback === "string" && parsed.latestFeedback.includes("把这个细节先拍下来")) {
          parsed.latestFeedback = "当前版本已改为具体观察反馈。继续调查未点击物件，会直接显示物件本身和可读信息，但不会一步给出推理结论。";
        }
        parsed.analytics = parsed.analytics || {};
        parsed.analytics.chaptersSent = parsed.analytics.chaptersSent || {};
        return parsed;
      } catch {
        return null;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function clearSave() {
      localStorage.removeItem(STORAGE_KEY);
      state = initialState();
      render();
    }

    function currentScene() {
      return scenes[state.sceneIndex];
    }

    function trackGameOpenOnce(entry = "auto_start") {
      if (sessionGameOpenSent) return;
      trackEvent("game_open", { entry });
      trackEvent("full_demo_open", { entry });
      sessionGameOpenSent = true;
    }

    function chapterNumberFromLabel(label = "") {
      const map = {
        "第一章": 1,
        "第二章": 2,
        "第三章": 3,
        "第四章": 4,
        "第五章": 5,
        "第六章": 6
      };
      return map[label] || "";
    }

    function trackChapterEnter(chapterNo, chapterTitle = "") {
      if (!chapterNo) return;
      state.analytics = state.analytics || {};
      state.analytics.chaptersSent = state.analytics.chaptersSent || {};

      const key = String(chapterNo);
      if (state.analytics.chaptersSent[key]) return;

      trackEvent("chapter_enter", {
        chapter: chapterNo,
        chapter_title: chapterTitle,
        scene_id: currentScene()?.id || ""
      });

      state.analytics.chaptersSent[key] = true;
    }

    function addLog(message) {
      state.logs.unshift(message);
      state.logs = state.logs.slice(0, 10);
    }

    function addEvidence(item) {
      if (!item) return "";
      if (!state.evidence.some(x => x.id === item.id)) {
        state.evidence.push(item);
        return `${evidenceTypes[item.type] || "线索"}已加入证据包`;
      }
      return "";
    }

    function collectEvidence(source = {}) {
      const items = [];
      if (source.evidence) items.push(evidenceForSource(source.evidence, source));
      if (Array.isArray(source.evidenceList)) items.push(...source.evidenceList);
      return items.map(addEvidence).filter(Boolean).join("；");
    }

    function evidenceForSource(evidence, source) {
      if (!source.id || !source.surfaceName) return evidence;
      return {
        ...evidence,
        name: source.surfaceName,
        detail: source.surfaceText || source.text || evidence.detail || source.detail || source.surfaceName || evidence.name
      };
    }

    function applyEffects(effects = {}) {
      const changes = [];
      for (const key of Object.keys(effects)) {
        const value = effects[key];
        state.vars[key] = (state.vars[key] || 0) + value;
        changes.push(`${variableNames[key] || key} ${value > 0 ? "+" : ""}${value}`);
      }
      return changes;
    }

    function formatEffects(effects = {}) {
      const keys = Object.keys(effects);
      if (!keys.length) return "无";
      return keys.map(key => `${variableNames[key] || key}${effects[key] > 0 ? "+" : ""}${effects[key]}`).join("；");
    }

    function sceneClickedCount(scene) {
      return scene.clickables.filter(item => state.clicked[item.id]).length;
    }

    function isSceneReady(scene) {
      if (scene.breakScene) return true;
      if (scene.combo) return state.selected;
      if (scene.choices.length) return state.selected;
      const count = sceneClickedCount(scene);
      const enough = count >= (scene.unlockAfter || Math.min(2, scene.clickables.length));
      const required = (scene.requiredEvidence || []).every(id => state.evidence.some(x => x.id === id));
      return enough && required;
    }

    function canChoose(scene) {
      if (scene.combo) return true;
      return sceneClickedCount(scene) >= (scene.unlockAfter || Math.min(2, scene.clickables.length)) || state.selected;
    }

    function render() {
      trackGameOpenOnce("auto_start");
      if (!state.ended) {
        const scene = currentScene();
        const chapterNo = chapterNumberFromLabel(scene?.chapter || "");
        trackChapterEnter(chapterNo, scene?.chapter || "");
      }
      if (state.mode === "intro") {
        renderIntro();
      } else if (state.ended) {
        renderFinal();
      } else if (currentScene().chapterIntro) {
        renderChapterIntro();
      } else {
        renderScene();
      }
      renderSide();
      renderVars();
      saveState();
    }


    function renderIntro() {
      const step = introSteps[state.introIndex] || introSteps[0];
      const last = state.introIndex >= introSteps.length - 1;
      document.getElementById("scenePanel").innerHTML = `
        <div class="intro-panel" id="introPanel">
          <div class="intro-kicker">${step.tag}</div>
          <div class="intro-text">${step.text}</div>
          <div class="intro-hint">${last ? "点击空白处进入第一章" : "点击空白处继续"} · ${state.introIndex + 1}/${introSteps.length}</div>
        </div>
      `;
      document.getElementById("introPanel").addEventListener("click", advanceIntro);
    }

    function advanceIntro() {
      if (state.introIndex < introSteps.length - 1) {
        state.introIndex += 1;
      } else {
        state.mode = "game";
        state.latestFeedback = "第一章开始。公开线索已保留在右侧，后续证据需要通过调查、选择和组合逐步确认。";
        addLog("前情提示结束，进入第一章");
      }
      render();
    }

    function renderChapterIntro() {
      const scene = currentScene();
      const step = scene.introSteps[state.chapterIntroIndex] || scene.introSteps[0];
      const last = state.chapterIntroIndex >= scene.introSteps.length - 1;
      document.getElementById("scenePanel").innerHTML = `
        <div class="intro-panel" id="chapterIntroPanel">
          <div class="intro-kicker">${scene.chapter} · ${scene.title}</div>
          <div class="intro-text">${step}</div>
          <div class="intro-hint">${last ? `点击空白处进入${scene.chapter}` : "点击空白处继续"} · ${state.chapterIntroIndex + 1}/${scene.introSteps.length}</div>
        </div>
      `;
      document.getElementById("chapterIntroPanel").addEventListener("click", advanceChapterIntro);
    }

    function advanceChapterIntro() {
      const scene = currentScene();
      if (state.chapterIntroIndex < scene.introSteps.length - 1) {
        state.chapterIntroIndex += 1;
      } else {
        const nextIndex = scenes.findIndex(item => item.id === scene.next);
        if (nextIndex >= 0) {
          state.sceneIndex = nextIndex;
          state.chapterIntroIndex = 0;
          state.selected = false;
          state.latestFeedback = `${scene.chapter}开始。前面获得的变量和证据包已保留。`;
          addLog(`${scene.chapter}引子结束，进入${scene.title}`);
        }
      }
      render();
    }

    function renderScene() {
      const scene = currentScene();
      const clickedCount = sceneClickedCount(scene);
      const choicesOpen = canChoose(scene);
      const ready = isSceneReady(scene);
      const choiceHtml = scene.choices.length ? `
        <h3>${scene.combo ? "证物组合推理" : "玩家选择"}</h3>
        ${!choicesOpen ? `<p class="small">先调查至少 ${scene.unlockAfter || Math.min(2, scene.clickables.length)} 个可点击物，再做选择。</p>` : ""}
        ${scene.choices.map((choice, index) => `
          <button class="choice" ${!choicesOpen || state.selected ? "disabled" : ""} data-choice="${index}">
            <strong>${choice.label}. ${choice.text}</strong>
            <span class="small">变量：${formatEffects(choice.effects)}</span>
          </button>
        `).join("")}
      ` : "";
      const nextText = scene.next === "END" ? "查看结局" : scene.breakScene ? "进入下一章引子" : "进入下一场景";

      document.getElementById("scenePanel").innerHTML = `
        <div class="scene-head">
          <button class="tag scene-nav-trigger" id="sceneReviewBtn" title="查看已解锁章节">${scene.no}</button>
          <div>
            <h2>${scene.title}</h2>
            <p class="small">${scene.chapter} · NodeID: ${scene.id}</p>
          </div>
        </div>
        ${renderReviewPanel()}
        <h3>画面描述</h3>
        <div class="description">${scene.description}</div>
        <h3>当前目标</h3>
        <p>${scene.goal}</p>
        ${scene.dialogue.length ? `<h3>NPC / 内心文本</h3><div class="dialogue">${scene.dialogue.map(line => `<p>${line}</p>`).join("")}</div>` : ""}
        ${scene.clickables.length ? `<h3>可点击物 <span class="small">已调查 ${clickedCount}/${scene.clickables.length}</span></h3>
          <div class="button-grid">
            ${scene.clickables.map(renderClickableCard).join("")}
          </div>` : ""}
        ${scene.requiredEvidence ? `<p class="small">本场景还有 ${scene.requiredEvidence.length} 个关键细节需要收入证据包；名称会在推理台和证据包里逐步确认。</p>` : ""}
        ${scene.breakScene ? renderChapterOneSummary() : ""}
        ${choiceHtml}
        <div class="feedback">${state.latestFeedback}</div>
        <div class="next-row">
          <button class="primary" id="nextBtn" ${ready ? "" : "disabled"}>${nextText}</button>
        </div>
      `;

      document.querySelectorAll("[data-clickable]").forEach(button => {
        button.addEventListener("click", () => handleClickable(button.dataset.clickable));
      });
      document.querySelectorAll("[data-choice]").forEach(button => {
        button.addEventListener("click", () => handleChoice(Number(button.dataset.choice)));
      });
      document.getElementById("sceneReviewBtn").addEventListener("click", toggleReviewPanel);
      document.querySelectorAll("[data-review-scene]").forEach(button => {
        button.addEventListener("click", () => showReviewScene(button.dataset.reviewScene));
      });
      document.getElementById("nextBtn").addEventListener("click", goNext);
    }

    function getUnlockedScenes() {
      const currentLimit = state.ended ? scenes.length - 1 : state.sceneIndex;
      return scenes
        .map((scene, index) => ({ scene, index }))
        .filter(item => item.index <= currentLimit && !item.scene.chapterIntro && !item.scene.breakScene);
    }

    function renderReviewPanel() {
      if (!state.reviewOpen) return "";
      const unlocked = getUnlockedScenes();
      const selected = scenes.find(scene => scene.id === state.reviewSceneId) || currentScene();
      return `
        <div class="review-panel">
          <strong>已解锁章节回看</strong>
          <p class="small">只回看画面和对话，不改变变量、证据和当前进度。</p>
          <div class="review-grid">
            ${unlocked.map(({ scene }) => `<button data-review-scene="${scene.id}">${scene.no} ${scene.title}</button>`).join("")}
          </div>
          <div class="review-detail">
            <h3>${selected.no} ${selected.title}</h3>
            <p>${selected.description}</p>
            ${selected.dialogue && selected.dialogue.length ? `<div class="dialogue">${selected.dialogue.map(line => `<p>${line}</p>`).join("")}</div>` : ""}
          </div>
        </div>
      `;
    }

    function toggleReviewPanel() {
      state.reviewOpen = !state.reviewOpen;
      if (state.reviewOpen && !state.reviewSceneId) state.reviewSceneId = currentScene().id;
      render();
    }

    function showReviewScene(id) {
      state.reviewSceneId = id;
      render();
    }

    function renderChapterOneSummary() {
      const v = state.vars;
      let title = "谨慎调查型";
      let desc = "证据、信任和嫌疑较平衡，第二章更容易发现釉料粉末不是直接证据。";
      if (v.LuTrust >= 3) {
        title = "陆景川依赖型";
        desc = "陆景川会更主动带路，玩家更容易接受他对沈月娥的暗示。";
      } else if (v.OutsiderTrust >= 3 && v.SelfDoubt >= 2) {
        title = "文旅顺从型";
        desc = "行动阻力小，但更容易把周启明死亡理解成商业纠纷。";
      } else if (v.FatherClue >= 4 || v.EvidenceScore >= 5) {
        title = "旧案敏感型";
        desc = "更快怀疑账本与二十年前有关，但村庄沉默压力可能上升。";
      }
      return `<h3>第一章状态</h3><div class="status-card"><strong>${title}</strong><p>${desc}</p></div>`;
    }

    function evidenceName(id) {
      const found = state.evidence.find(x => x.id === id);
      if (found) return found.name;
      for (const scene of scenes) {
        const item = scene.clickables.find(x => x.evidence && x.evidence.id === id);
        if (item) return item.evidence.name;
      }
      return id;
    }

    function clickableLabel(item) {
      return item.surfaceName || item.name;
    }

    function clickableFeedback(item) {
      return item.surfaceText || item.text || item.name;
    }

    function renderClickableCard(item) {
      const clicked = Boolean(state.clicked[item.id]);
      const meta = [
        `变量：${formatEffects(item.effects)}`,
        item.evidence || item.evidenceList ? "记录：已加入证据包" : "记录：无新增证据"
      ];
      return `
        <div class="clickable-card ${clicked ? "is-clicked" : ""}">
          <button ${clicked ? "disabled" : ""} data-clickable="${item.id}">${clickableLabel(item)}</button>
          ${clicked ? `
            <div class="item-hint">
              <b>观察</b>
              <p>${clickableFeedback(item)}</p>
              ${meta.map(line => `<span class="hint-meta">${line}</span>`).join("")}
            </div>
          ` : ""}
        </div>
      `;
    }

    function handleClickable(id) {
      const scene = currentScene();
      const item = scene.clickables.find(x => x.id === id);
      if (!item || state.clicked[id]) return;
      state.clicked[id] = true;
      const changes = applyEffects(item.effects);
      const evidenceLine = collectEvidence(item);
      state.latestFeedback = [
        `<strong>已调查：${clickableLabel(item)}</strong>`,
        "观察内容已显示在对应物件下方。",
        changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无",
        evidenceLine ? `记录：${evidenceLine}` : "记录：已记录或无新增线索"
      ].join("<br>");
      addLog(`${scene.no} 调查：${clickableLabel(item)}`);
      render();
    }

    function handleChoice(index) {
      const scene = currentScene();
      const choice = scene.choices[index];
      if (!choice || state.selected) return;
      state.selected = true;
      const changes = applyEffects(choice.effects);
      const evidenceLine = collectEvidence(choice);
      if (choice.flag) state.flags[choice.flag] = true;
      if (choice.wrong) state.wrongCombos += 1;
      state.latestFeedback = [
        `<strong>${choice.label}. ${choice.text}</strong>`,
        changes.length ? `变量变化：${changes.join("；")}` : "变量变化：无",
        evidenceLine ? `记录：${evidenceLine}` : "记录：无新增线索",
        choice.short ? `结果：${choice.short}` : ""
      ].filter(Boolean).join("<br>");
      addLog(`${scene.no} 选择：${choice.label}`);
      render();
    }

    function goNext() {
      const scene = currentScene();
      if (!isSceneReady(scene)) return;
      if (scene.next === "END") {
        state.ended = true;
        state.latestFeedback = "六章试玩结束，进入结局判定。";
        render();
        return;
      }
      const nextIndex = scenes.findIndex(item => item.id === scene.next);
      if (nextIndex < 0) return;
      state.sceneIndex = nextIndex;
      state.selected = false;
      state.pendingNext = false;
      state.chapterIntroIndex = 0;
      state.latestFeedback = scene.breakScene ? "进入下一章引子。变量和证据包已继承。" : "进入下一场景。";
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderSide() {
      if (state.mode === "intro") {
        document.getElementById("progressFill").style.width = `${Math.round((state.introIndex + 1) / introSteps.length * 100)}%`;
        document.getElementById("progressText").textContent = `前情提示 ${state.introIndex + 1}/${introSteps.length}`;
        document.getElementById("evidenceBox").innerHTML = `
          <details class="evidence-group" open>
            <summary>可公开线索（${publicClues.length}）</summary>
            <div class="evidence-item">
              <ul class="public-clues">${publicClues.map(x => `<li>${x}</li>`).join("")}</ul>
            </div>
          </details>
        `;
        document.getElementById("focusList").innerHTML = ["先确认玩家身份和公开信息。", "进入第一章后，证据不会一次性全部给出。", "点击空白处推进前情文本。"].map(item => `<li>${item}</li>`).join("");
        document.getElementById("deductionBox").innerHTML = `<p class="small">正式调查开始后，这里会提示哪些线索可以试着放在一起看。</p>`;
        document.getElementById("logList").innerHTML = `<li class="small">前情提示阶段。</li>`;
        return;
      }
      const current = state.ended ? scenes.length : state.sceneIndex + 1;
      const total = scenes.length;
      document.getElementById("progressFill").style.width = `${Math.round(current / total * 100)}%`;
      document.getElementById("progressText").textContent = state.ended ? "已进入结局" : `${current}/${total} · ${currentScene().chapter} ${currentScene().title}`;

      document.getElementById("evidenceBox").innerHTML = Object.keys(evidenceTypes).map(type => {
        const items = state.evidence.filter(item => item.type === type);
        const open = type === "core" || type === "clue";
        return `
          <details class="evidence-group" ${open ? "open" : ""}>
            <summary>${evidenceTypes[type]}（${items.length}）</summary>
            ${items.length ? items.map(item => `
              <div class="evidence-item">
                <b>${item.name}</b>
                <p>${item.detail}</p>
              </div>
            `).join("") : `<div class="evidence-item"><p>暂无。</p></div>`}
          </details>
        `;
      }).join("");

      document.getElementById("deductionBox").innerHTML = renderDeductionBox();
      document.getElementById("focusList").innerHTML = getFocus().map(item => `<li>${item}</li>`).join("");
      document.getElementById("logList").innerHTML = state.logs.length
        ? state.logs.map(item => `<li>${item}</li>`).join("")
        : `<li class="small">暂无记录。</li>`;
    }

    function renderDeductionBox() {
      const suggestions = getDeductionSuggestions();
      if (!suggestions.length) {
        return `<p class="small">暂时还差关键线索。先调查可点击物，别急着把“最像凶手的人”当成答案。</p>`;
      }
      return `
        <p class="small">可以试着把这些线索放在一起看：</p>
        <ul>
          ${suggestions.map(item => `<li>${item}</li>`).join("")}
        </ul>
      `;
    }

    function getDeductionSuggestions() {
      const suggestions = [];
      const has = id => hasEvidence(id);
      if (!state.flags.glazeFrame && has("glaze_powder_trace") && has("tea_cup_moved") && (has("lu_knows_shen_materials") || has("lu_hints_shen_glaze"))) {
        suggestions.push("釉料粉末 + 茶杯位置 + 陆景川懂窑料：这撮粉末是不是摆给你看的？");
      }
      if (!state.flags.oldDebt && has("burned_ledger") && has("remittance_slip") && has("unsent_sms")) {
        suggestions.push("烧焦账本 + 汇款单 + 未发送短信：周启明死前压着的不是普通项目账。");
      }
      if (!state.flags.autopsyTruth && has("old_autopsy_report") && has("chen_confession_recorder")) {
        suggestions.push("旧尸检报告 + 陈伯远录音：二十年前的死因可能被改写。");
      }
      if (!state.flags.childIdentityLine && has("lu_last_words_child") && (has("lu_baby_photo") || has("altered_genealogy_photo"))) {
        suggestions.push("陆怀民遗言 + 抱婴照片 / 族谱改痕：“孩子”可能不是目击者。");
      }
      if (!state.flags.luIdentityProof && has("birth_certificate") && (has("lu_baby_photo") || has("lu_last_words_child"))) {
        suggestions.push("出生证明 + 抱婴照片 + 遗言：陆景川的名字也许不是他的第一份身份。");
      }
      if (state.sceneIndex >= scenes.findIndex(item => item.id === "CH6_S01") && !state.flags.fullOldCase) {
        suggestions.push("最后对质前，把死因、账本、身份、证词四条线都放上桌。");
      }
      return suggestions.slice(0, 4);
    }

    function getFocus() {
      const focus = [];
      if (!state.flags.oldDebt) focus.push("周启明死亡是否与二十年前旧账有关？");
      if (!state.flags.glazeFrame) focus.push("釉料粉末是凶手证据，还是摆放出来的栽赃线？");
      if (!state.flags.autopsyTruth) focus.push("何青山是不是起火前已经死亡？");
      if (!state.flags.childIdentityLine) focus.push("陆怀民遗言里的“孩子”到底是谁？");
      if (!state.flags.luIdentityProof) focus.push("陆景川的身份能否被证据坐实？");
      if (!state.flags.fullOldCase && state.sceneIndex >= scenes.findIndex(item => item.id === "CH6_S01")) focus.push("最终对质需要完整旧案链条，而不只是当前凶手。");
      if (state.vars.LuTrust >= 2) focus.push("陆景川提供便利，但他是否正在引导调查方向？");
      if (state.vars.ShenSuspicion >= 3) focus.push("沈月娥嫌疑偏高，注意区分异常反应和作案证据。");
      if (state.vars.FatherClue >= 3) focus.push("父亲旧调查正在指向尸检报告。");
      return focus.slice(0, 4);
    }

    function hasEvidence(id) {
      return state.evidence.some(item => item.id === id);
    }

    function renderVars() {
      document.getElementById("varsGrid").innerHTML = Object.keys(variableNames).map(key => `
        <div class="var-card" data-hint="${variableHints[key] || ""}" title="${variableHints[key] || ""}">
          <span>${variableNames[key]}</span><b>${state.vars[key]}</b>
        </div>
      `).join("");
    }

    function renderFinal() {
      const ending = getEndingState();
      state.analytics = state.analytics || {};
      if (!state.analytics.gameCompleteSent) {
        trackEvent("game_complete", {
          final_ending: ending.code || "",
          evidence_score: state.vars?.EvidenceScore ?? state.EvidenceScore ?? "",
          shen_suspicion: state.vars?.ShenSuspicion ?? state.ShenSuspicion ?? "",
          revenge_timer: state.vars?.RevengeTimer ?? state.RevengeTimer ?? ""
        });
        state.analytics.gameCompleteSent = true;
      }
      if (!state.analytics.endingReachedSent) {
        trackEvent("ending_reached", {
          ending: ending.code || ending.title || ""
        });
        state.analytics.endingReachedSent = true;
      }
      document.getElementById("scenePanel").innerHTML = `
        <div class="scene-head">
          <div class="tag">END</div>
          <div>
            <h2>${ending.title}</h2>
            <p class="small">《雾窑》六章试玩结局 · ${ending.code}</p>
          </div>
        </div>
        <div class="description">${ending.text}</div>
        <h3>判定原因</h3>
        <div class="status-card">
          <strong>${ending.reason}</strong>
          <p>${ending.desc}</p>
        </div>
        <h3>最终变量</h3>
        <ul>
          ${Object.keys(variableNames).map(key => `<li>${variableNames[key]}：${state.vars[key]}</li>`).join("")}
        </ul>
        <div class="next-row"><button class="secondary" id="againBtn">重新开始</button></div>
      `;
      document.getElementById("againBtn").addEventListener("click", clearSave);
    }

    function getEndingState() {
      const v = state.vars;
      const hasIdentity = state.flags.luIdentityProof || hasEvidence("birth_certificate") || hasEvidence("lu_is_he_child");
      const hasAutopsy = state.flags.autopsyTruth || hasEvidence("autopsy_modified_proof") || hasEvidence("old_autopsy_report");
      const hasMotive = state.flags.oldDebt || hasEvidence("he_report_letter") || hasEvidence("zhou_old_debt_link");
      const hasBabyPhoto = hasEvidence("lu_baby_photo");
      const hasEscape = hasEvidence("secret_path_map") || state.flags.secretPathMapped;
      const hasWitness = hasEvidence("father_full_audio") || hasEvidence("villagers_counter_evidence") || state.flags.witnessesSpeak;
      const enoughForTruth = v.EvidenceScore >= 14 && hasIdentity && hasAutopsy && hasMotive;
      const hiddenReady = v.EvidenceScore >= 17 && v.FatherClue >= 7 && v.ShenSuspicion <= 3 && v.VillageSilence <= 3 && v.RevengeTimer <= 6 && hasWitness && state.flags.finalUnderstand;

      if (state.flags.accuseShen && (v.ShenSuspicion >= 5 || (!hasIdentity && !hasBabyPhoto))) {
        return {
          code: "B",
          title: "B 替罪羊",
          reason: "沈月娥嫌疑过高，且陆景川身份线没有被坐实。",
          desc: "玩家把异常反应和釉料粉末过早等同于作案证据。",
          text: "沈月娥被误认为凶手。陆景川离开。复仇未停。林知夏意识到自己写下了第二份假证词。"
        };
      }

      if ((v.RevengeTimer >= 8 || state.flags.finalDeny) && !hasEscape && (state.wrongCombos >= 2 || v.SelfDoubt >= 4 || state.flags.finalDeny)) {
        return {
          code: "D",
          title: "D 困死废窑",
          reason: "暗流已经绷到极限，缺少废窑暗道图，并且最后对质失控。",
          desc: "玩家多次激怒陆景川或推理失败，废窑风险没有被解除。",
          text: "林知夏被困废窑。她的笔记本最后一页写着：“青瓷庄的火，不是火先烧起来的。”"
        };
      }

      if (hiddenReady && state.flags.fullOldCase && state.flags.accuseLu) {
        return {
          code: "E",
          title: "E 隐藏结局：窑火未熄，证词重燃",
          reason: "证据完整，父亲线完整，沈月娥未被误判，村庄沉默被打破，且最终理解但不纵容陆景川。",
          desc: "这是需要证据、证词和最终选择同时满足的隐藏结局。",
          text: "林知夏不仅查明真相，还让沈月娥、陆景川和沉默者开口。火没有再次烧起来，证词替死者说话。"
        };
      }

      if (state.flags.finalLetRevenge || state.flags.currentCaseOnly || (state.flags.accuseLu && !enoughForTruth)) {
        return {
          code: "C",
          title: "C 复仇继续",
          reason: "知道陆景川可疑，但证据不足，或玩家选择放任复仇 / 只公开当前命案。",
          desc: "当前命案没有带出完整旧案结构。",
          text: "陆景川消失在雨后的山路。青瓷庄对外仍说旧案是事故。真相再次被埋。"
        };
      }

      if ((state.flags.finalStop || state.flags.finalUnderstand || state.flags.accuseLu) && enoughForTruth && v.ShenSuspicion <= 5) {
        return {
          code: "A",
          title: "A 真相公开",
          reason: "旧案证据较完整，沈月娥没有被最终当成替罪羊，陆景川被成功指认并被阻止。",
          desc: "完整旧案可以进入重查，当前复仇被压住。",
          text: "林知夏公开真相，旧案重查。沈月娥被洗清，废窑暂停改造，成为纪念空间。"
        };
      }

      return {
        code: "C",
        title: "C 复仇继续",
        reason: "证据链没有达到公开完整旧案的强度。",
        desc: "玩家知道有问题，但真相仍无法稳定落地。",
        text: "陆景川消失在雨后的山路。青瓷庄对外仍说旧案是事故。真相再次被埋。"
      };
    }

    document.getElementById("resetBtn").addEventListener("click", clearSave);
    render();
  </script>
</body>
</html>
